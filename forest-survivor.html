<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forest Guardian - Survivor</title>
<style>
:root {
  --bg:#ffffff;
  --panel:#f0f5e8;
  --border:#b8d48a;
  --gold:#c8920a;
  --hp:#3ddc52;
  --mana:#4a9eff;
  --text:#1a3a08;
  --accent:#4a8a10;
  --danger:#e84a4a;
  --ui-font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#e8f0d8;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:var(--ui-font);overflow:hidden;}
#gc{position:relative;width:400px;height:700px;background:var(--bg);display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:0 0 40px rgba(60,180,30,0.25);}
#ga{position:relative;width:100%;height:540px;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* HUD Layer */
#hud{position:absolute;top:0;left:0;width:100%;padding:10px;pointer-events:none;z-index:10;display:flex;flex-direction:column;gap:8px;}
.hud-card{background:linear-gradient(135deg,rgba(255,248,226,.92),rgba(224,239,199,.86));border:1px solid rgba(84,57,27,.28);border-radius:16px;padding:9px 10px;box-shadow:0 8px 20px rgba(45,32,16,.22),inset 0 1px 0 rgba(255,255,255,.9);backdrop-filter:blur(4px);}
.hud-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.hud-val{background:rgba(60,44,22,.1);border:1px solid rgba(75,53,28,.16);border-radius:999px;color:#23420d;font-size:12px;font-weight:800;padding:4px 8px;text-shadow:0 1px 1px rgba(255,255,255,0.7);}
.hud-val.gold{color:#8f5e00;background:rgba(255,218,118,.28);}
.hud-val.wave{color:#27540c;font-size:11px;max-width:142px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.hud-bars{display:grid;grid-template-columns:1fr;gap:7px;margin-top:8px;}
.bar-wrap{position:relative;height:17px;border-radius:999px;overflow:hidden;background:linear-gradient(180deg,rgba(48,36,22,.35),rgba(28,21,13,.22));border:1px solid rgba(255,255,255,.45);box-shadow:inset 0 2px 5px rgba(0,0,0,.28),0 1px 0 rgba(255,255,255,.5);}
.bar-fill{height:100%;border-radius:999px;transition:width 0.15s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 0 10px rgba(255,255,255,.16);}
.bar-fill::after{content:'';display:block;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0));border-radius:999px;}
.bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:rgba(16,17,8,0.82);text-shadow:0 1px 2px rgba(255,255,255,0.85);letter-spacing:.4px;}
#hp-fill{background:linear-gradient(90deg,#247a35,#60dd68,#a8f071);}
#threat-fill{background:linear-gradient(90deg,#9d6b24,#d99935,#f1c86b);}
#armor-fill{background:linear-gradient(90deg,#1b4f91,#4a9eff,#9fd0ff);}

.stat-chips{display:flex;gap:5px;pointer-events:none;flex-wrap:wrap;}
.chip{background:rgba(255,249,231,0.84);border:1px solid rgba(74,52,24,0.18);border-radius:999px;box-shadow:0 2px 6px rgba(30,22,10,.12);padding:3px 7px;font-size:10px;color:#24460d;font-weight:700;}
.chip span{color:#0d1d07;font-weight:900;}

/* Alert */
#alert{position:absolute;top:28%;width:100%;text-align:center;color:#cc0000;font-size:28px;font-weight:900;text-shadow:0 0 15px rgba(255,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .3s;z-index:20;letter-spacing:1px;}

/* Bottom Panel */
#bp{width:100%;height:160px;background:linear-gradient(180deg,#f8fbf4,#eef6e7);border-top:2px solid #111;display:flex;flex-direction:row;justify-content:space-around;align-items:center;padding:8px;gap:6px;z-index:15;}
.sbtn{background:linear-gradient(180deg,#ffffff,#f3f8ef);border:2px solid #111;border-radius:12px;box-shadow:0 3px 0 rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.95);flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:var(--text);cursor:pointer;transition:all .18s;padding:6px 4px;gap:3px;}
.sbtn:active{transform:scale(.94);box-shadow:0 1px 0 rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.95);}
.sbtn.off{opacity:.42;cursor:not-allowed;border-color:#111;background:linear-gradient(180deg,#fafafa,#edf1ea);}
.sbtn:not(.off):hover{border-color:#111;background:linear-gradient(180deg,#ffffff,#eaf7df);box-shadow:0 3px 0 rgba(0,0,0,.24),0 0 0 2px rgba(200,146,10,.18) inset;}
.si{font-size:22px;line-height:1;}
.st{font-size:10px;font-weight:700;text-align:center;color:#2a6010;line-height:1.2;}
.sv{font-size:11px;color:#1a4a08;font-weight:600;}
.sc{color:#b07800;font-size:12px;font-weight:800;}

/* Modals */
.modal{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.92);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:30;padding:20px;}
.modal.on{display:flex;}
.modal-title{color:var(--accent);font-size:22px;font-weight:900;margin-bottom:18px;text-shadow:0 0 10px rgba(74,138,16,.3);letter-spacing:1px;}
.mbtn{background:var(--accent);color:#f8fff4;border:none;padding:14px 32px;font-size:16px;font-weight:900;border-radius:8px;cursor:pointer;margin-top:14px;letter-spacing:.5px;}
.mbtn:hover{background:#5aaa20;}

/* Stats panel in game-over */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin:12px 0;}
.stat-box{background:rgba(235,248,220,.9);border:1px solid #8abf5a;border-radius:8px;padding:10px;text-align:center;}
.stat-box .sbl{font-size:10px;color:#3a7020;margin-bottom:4px;}
.stat-box .sbv{font-size:18px;font-weight:900;color:var(--text);}

/* Wave announcement overlay */
#wave-announce{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:300px;background:rgba(10,30,8,0.92);border:3px solid #7ecb3f;border-radius:16px;padding:20px 24px;text-align:center;z-index:25;pointer-events:none;opacity:0;transition:opacity 0.2s;}
#wave-announce.show{opacity:1;}
#wave-announce .wa-label{font-size:12px;color:#9ecb7a;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
#wave-announce .wa-num{font-size:52px;font-weight:900;color:#7ecb3f;text-shadow:0 0 20px rgba(126,203,63,0.8);line-height:1;}
#wave-announce .wa-sub{font-size:13px;color:#c8e8a0;margin-top:6px;}
#wave-announce.boss-warn{border-color:#ff4444;background:rgba(40,0,0,0.95);}
#wave-announce.boss-warn .wa-num{color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,0.8);}
#wave-announce.boss-warn .wa-sub{color:#ffaaaa;}
#wave-announce.boss-warn .wa-label{color:#ff8888;}
</style>
</head>
<body>
<div id="gc">
  <div id="ga">
    <canvas id="cv" width="400" height="540"></canvas>
    <div id="hud">
      <div class="hud-card">
        <div class="hud-row">
          <span class="hud-val" id="tdisp">00:00</span>
          <span class="hud-val gold" id="gdisp">💰 0</span>
          <span class="hud-val wave" id="wdisp">Bosque Tranquilo</span>
        </div>
        <div class="hud-bars">
          <div class="bar-wrap">
            <div class="bar-fill" id="hp-fill" style="width:100%"></div>
            <div class="bar-label" id="hplbl">100 / 100 HP</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-fill" id="threat-fill" style="width:0%"></div>
            <div class="bar-label" id="threatlbl">Amenaza tranquila</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-fill" id="armor-fill" style="width:100%"></div>
            <div class="bar-label" id="armorlbl">Escudo 0</div>
          </div>
        </div>
      </div>
      <div class="stat-chips">
        <div class="chip">⚔️ <span id="c-dmg">20</span></div>
        <div class="chip">💨 <span id="c-spd">1.0x</span></div>
        <div class="chip">🔥 <span id="c-crit">5%</span></div>
        <div class="chip">🛡️ <span id="c-arm">0</span></div>
        <div class="chip">☠️ <span id="c-kills">0</span></div>
      </div>
    </div>
    <div id="alert">⚠ HORDA ENTRANTE ⚠</div>
    <div id="wave-announce">
      <div class="wa-label">OLA</div>
      <div class="wa-num" id="wa-num">1</div>
      <div class="wa-sub" id="wa-sub">¡Prepárate!</div>
    </div>

    <!-- Game Over Modal -->
    <div id="gom" class="modal">
      <div class="modal-title" id="goTitle">🌲 CAÍDO EN EL BOSQUE</div>
      <div class="stats-grid" id="goStats"></div>
      <button class="mbtn" onclick="G.restart()">Reintentar</button>
    </div>
  </div>

  <div id="bp">
    <div class="sbtn" id="bDmg" onclick="G.buy('dmg')">
      <div class="si">⚔️</div>
      <div class="st" id="tDmg">Fuerza</div>
      <div class="sv" id="vDmg">+5 DMG</div>
      <div class="sc" id="cDmg">💰 10</div>
    </div>
    <div class="sbtn" id="bHp" onclick="G.buy('hp')">
      <div class="si">🌿</div>
      <div class="st" id="tHp">Vitalidad</div>
      <div class="sv" id="vHp">+25 HP Máx</div>
      <div class="sc" id="cHp">💰 15</div>
    </div>
    <div class="sbtn" id="bArmor" onclick="G.buy('armor')">
      <div class="si">🛡️</div>
      <div class="st" id="tArmor">Armadura</div>
      <div class="sv" id="vArmor">+2 ARM</div>
      <div class="sc" id="cArmor">💰 18</div>
    </div>
    <div class="sbtn" id="bRegen" onclick="G.buy('regen')">
      <div class="si">💚</div>
      <div class="st" id="tRegen">Regeneración</div>
      <div class="sv" id="vRegen">+2 HP/s</div>
      <div class="sc" id="cRegen">💰 25</div>
    </div>
    <div class="sbtn" id="bCrit" onclick="G.buy('crit')">
      <div class="si">🔥</div>
      <div class="st" id="tCrit">Crítico</div>
      <div class="sv" id="vCrit">+5% Crit</div>
      <div class="sc" id="cCrit">💰 20</div>
    </div>
  </div>
</div>

<script>
const CW=400,CH=540,FPS=60;

// ─── SCREEN SHAKE ─────────────────────────────────────────────────────────────
let shakeX=0,shakeY=0,shakeMag=0,shakeDuration=0;
function triggerShake(mag,dur){
  if(mag>shakeMag){shakeMag=mag;shakeDuration=dur;}
}
function updateShake(){
  if(shakeDuration>0){
    shakeDuration--;
    shakeX=(Math.random()-.5)*shakeMag*2;
    shakeY=(Math.random()-.5)*shakeMag*2;
    shakeMag*=.88;
    if(shakeMag<.2){shakeMag=0;shakeDuration=0;}
  } else {shakeX=0;shakeY=0;}
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
class Particle{
  constructor(x,y,col,spd,sz,life,grav=0){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*spd*2;
    this.vy=(Math.random()-.5)*spd*2-grav;
    this.col=col;this.sz=sz;this.life=life;this.maxLife=life;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.08;this.life--;}
  draw(ctx){
    ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
    ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);
    ctx.fillStyle=this.col;ctx.fill();ctx.globalAlpha=1;
  }
}

// Text floaters
class FloatText{
  constructor(x,y,txt,col,sz=13){
    this.x=x;this.y=y;this.txt=txt;this.col=col;this.sz=sz;
    this.life=50;this.maxLife=50;this.vy=-1.2;
  }
  update(){this.y+=this.vy;this.vy*=.97;this.life--;}
  draw(ctx){
    ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
    ctx.font=`bold ${this.sz}px 'Segoe UI',sans-serif`;
    ctx.fillStyle=this.col;
    ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=3;
    ctx.strokeText(this.txt,this.x,this.y);
    ctx.fillText(this.txt,this.x,this.y);
    ctx.globalAlpha=1;
  }
}

// ─── PLAYER SPRITE ───────────────────────────────────────────────────────────
class Player{
  constructor(x,y){
    this.x=x;this.y=y;this.radius=22;
    this.baseMaxHp=120;this.baseDmg=22;
    this.regenRate=0;this.armor=10;this.maxArmor=10;this.critChance=0.05;this.critMult=2.0;
    this.lifesteal=0;this.slowChance=0;
    this.maxHp=this.baseMaxHp;this.hp=this.maxHp;
    this.dmgMult=1.0;this.atkSpdMult=1.0;
    this.baseAtk=50;this.atkTimer=0;
    this.pierce=0;this.multishot=false;
    this.drones=[];this.kills=0;
    this.shieldHp=0;this.maxShield=0;
    this.anim=0;this.hitFlash=0;this.shootAnim=0;
    this.lastShootAngle=0;
  }
  get dmg(){return this.baseDmg*this.dmgMult;}
  get atkCd(){return Math.max(8,this.baseAtk/this.atkSpdMult);}

  takeDamage(raw){
    let dmg=raw;
    if(this.armor>0){
      this.armor=Math.max(0,this.armor-1);
      dmg=0;
    } else if(this.shieldHp>0){
      this.shieldHp-=dmg;
      if(this.shieldHp<0){dmg=-this.shieldHp;this.shieldHp=0;}
      else dmg=0;
    }
    this.hp=Math.max(0,this.hp-dmg);
    this.hitFlash=8;
  }

  update(game){
    this.anim++;
    if(this.hitFlash>0)this.hitFlash--;
    if(this.shootAnim>0)this.shootAnim--;
    if(this.regenRate>0&&this.hp<this.maxHp){
      this.hp=Math.min(this.maxHp,this.hp+this.regenRate/FPS);
    }
    if(this.atkTimer<=0&&game.enemies.length>0){
      this.shoot(game);this.atkTimer=this.atkCd;this.shootAnim=8;
    }
    if(this.atkTimer>0)this.atkTimer--;
    this.drones.forEach(d=>d.update(game,this.x,this.y));
  }

  shoot(game){
    const t=this.nearest(game.enemies);if(!t)return;
    const ang=Math.atan2(t.y-this.y,t.x-this.x);
    this.lastShootAngle=ang;
    const crit=Math.random()<this.critChance;
    const d=this.dmg*(crit?this.critMult:1);
    game.projs.push(new Proj(this.x,this.y,ang,d,this.pierce,crit,this.slowChance>0,this.lifesteal));
    if(this.multishot){
      game.projs.push(new Proj(this.x,this.y,ang+.22,d*.8,this.pierce,false,this.slowChance>0,this.lifesteal));
    }
  }

  nearest(enemies){
    let n=null,md=Infinity;
    enemies.forEach(e=>{const d=Math.hypot(this.x-e.x,this.y-e.y);if(d<md){md=d;n=e;}});
    return n;
  }

  draw(ctx){
    this.drones.forEach(d=>d.draw(ctx));
    const t=Date.now()/1000;
    const bob=Math.sin(this.anim*.08)*2;

    if(this.shieldHp>0){
      ctx.beginPath();ctx.arc(this.x,this.y,this.radius+8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(74,158,255,${.3+Math.sin(t*3)*.2})`;
      ctx.lineWidth=3;ctx.stroke();
    }

    ctx.beginPath();ctx.ellipse(this.x,this.y+this.radius,14,5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();

    const bodyY=this.y+bob;
    ctx.beginPath();
    ctx.moveTo(this.x-14,bodyY-4);ctx.lineTo(this.x-10,bodyY+20);
    ctx.lineTo(this.x+10,bodyY+20);ctx.lineTo(this.x+14,bodyY-4);
    ctx.closePath();
    ctx.fillStyle=this.hitFlash>0?'#ff8888':'#2a5a12';ctx.fill();
    ctx.strokeStyle='#1a3a08';ctx.lineWidth=1.5;ctx.stroke();

    ctx.beginPath();ctx.roundRect(this.x-10,bodyY-10,20,22,4);
    ctx.fillStyle=this.hitFlash>0?'#ffaaaa':'#4a8a22';ctx.fill();
    ctx.strokeStyle='#2a5a12';ctx.lineWidth=1.2;ctx.stroke();

    ctx.beginPath();ctx.rect(this.x-10,bodyY+6,20,4);ctx.fillStyle='#3d2a0a';ctx.fill();
    ctx.beginPath();ctx.rect(this.x-3,bodyY+5,6,6);ctx.fillStyle='#c8a020';ctx.fill();

    ctx.beginPath();ctx.arc(this.x,bodyY-16,11,0,Math.PI*2);
    ctx.fillStyle=this.hitFlash>0?'#ffcccc':'#d4a870';ctx.fill();
    ctx.strokeStyle='#a07840';ctx.lineWidth=1.2;ctx.stroke();

    ctx.beginPath();ctx.ellipse(this.x,bodyY-20,12,9,0,Math.PI,0);
    ctx.fillStyle='#2a5a12';ctx.fill();ctx.strokeStyle='#1a3a08';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(this.x+8,bodyY-22);
    ctx.quadraticCurveTo(this.x+16,bodyY-32,this.x+10,bodyY-38);
    ctx.quadraticCurveTo(this.x+5,bodyY-28,this.x+8,bodyY-22);
    ctx.fillStyle='#7ecb3f';ctx.fill();

    ctx.beginPath();ctx.arc(this.x-4,bodyY-16,2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
    ctx.beginPath();ctx.arc(this.x+4,bodyY-16,2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
    ctx.beginPath();ctx.arc(this.x-3,bodyY-17,.8,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
    ctx.beginPath();ctx.arc(this.x+5,bodyY-17,.8,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();

    const armSwing=Math.sin(this.anim*.12)*12;
    ctx.beginPath();ctx.moveTo(this.x-10,bodyY-5);ctx.lineTo(this.x-18,bodyY+5+armSwing);
    ctx.strokeStyle=this.hitFlash>0?'#ffaaaa':'#4a8a22';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(this.x+10,bodyY-5);ctx.lineTo(this.x+18,bodyY+5-armSwing);
    ctx.strokeStyle=this.hitFlash>0?'#ffaaaa':'#4a8a22';ctx.lineWidth=5;ctx.stroke();

    const bx=this.x+18,by=bodyY+5-armSwing;
    ctx.save();ctx.translate(bx,by);
    ctx.rotate(this.lastShootAngle-.2);
    ctx.beginPath();ctx.arc(0,0,10,-.8,.8);
    ctx.strokeStyle='#6a3a10';ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.moveTo(Math.cos(-.8)*10,Math.sin(-.8)*10);
    ctx.lineTo(Math.cos(.8)*10,Math.sin(.8)*10);
    ctx.strokeStyle='#c8a88a';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();

    const legSwing=Math.sin(this.anim*.12)*8;
    ctx.beginPath();ctx.moveTo(this.x-5,bodyY+20);ctx.lineTo(this.x-7,bodyY+32+legSwing);
    ctx.strokeStyle='#2a4a10';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(this.x+5,bodyY+20);ctx.lineTo(this.x+7,bodyY+32-legSwing);ctx.stroke();
    ctx.beginPath();ctx.ellipse(this.x-7,bodyY+33+legSwing,5,3,0,0,Math.PI*2);ctx.fillStyle='#3a1a08';ctx.fill();
    ctx.beginPath();ctx.ellipse(this.x+7,bodyY+33-legSwing,5,3,0,0,Math.PI*2);ctx.fill();

    if(this.shootAnim>0){
      const a=this.shootAnim/8;
      ctx.beginPath();ctx.arc(this.x,bodyY,this.radius+4,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,255,100,${a*.6})`;ctx.lineWidth=2;ctx.stroke();
    }
  }
}

// ─── DRONE ────────────────────────────────────────────────────────────────────
class Drone{
  constructor(idx){this.angle=idx*Math.PI;this.dist=50;this.cd=0;this.dmg=12;this.x=0;this.y=0;this.glowPhase=Math.random()*Math.PI*2;}
  update(game,cx,cy){
    this.angle+=.04;this.glowPhase+=.08;
    this.x=cx+Math.cos(this.angle)*this.dist;
    this.y=cy+Math.sin(this.angle)*this.dist;
    if(this.cd<=0&&game.enemies.length>0){
      const t=game.player.nearest(game.enemies);
      if(t){const ang=Math.atan2(t.y-this.y,t.x-this.x);game.projs.push(new Proj(this.x,this.y,ang,this.dmg,0,false,false,0,'#88ffcc'));this.cd=80;}
    }
    if(this.cd>0)this.cd--;
  }
  draw(ctx){
    const g=.5+Math.sin(this.glowPhase)*.4;
    ctx.beginPath();ctx.arc(this.x,this.y,5+g*2,0,Math.PI*2);ctx.fillStyle=`rgba(100,255,180,${g*.8})`;ctx.fill();
    ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fillStyle='#ccffee';ctx.fill();
    for(let i=1;i<=3;i++){
      const ta=this.angle-i*.08;
      ctx.beginPath();ctx.arc(this.x+Math.cos(ta-this.angle)*i*4,this.y+Math.sin(ta-this.angle)*i*4,2-i*.4,0,Math.PI*2);
      ctx.fillStyle=`rgba(100,255,180,${.3/i})`;ctx.fill();
    }
  }
}

function hashName(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return h;}
function animalGroup(name){
  if(/Águilas|Halcones|Búhos|Cuervos|Buitres|Cóndores|Garzas|Gaviotas|Pelícanos|Flamencos|Cisnes|Patos|Pingüinos/.test(name))return'bird';
  if(/Tiburones|Pirañas|Barracudas|Mantarrayas|Orcas|Delfines|Cangrejos|Calamares|Pulpos|Medusas|Morenas|Anguilas|Focas|Morsas/.test(name))return'aquatic';
  if(/Culebras|Caimanes|Víboras|Iguanas|Serpientes|Salamandras|Sapos|Ranas|Camaleones|Lagartos|Geckos|Tortugas|Cocodrilos/.test(name))return'reptile';
  if(/Arañas|Escorpiones|Escolopendras|Avispas|Alacranes/.test(name))return'bug';
  return'mammal';
}
function hsl(h,s,l){return`hsl(${h},${s}%,${l}%)`;}
function animalPalette(name,group){
  const h=hashName(name);
  if(group==='bird')return[hsl(18+h%45,45,34),hsl(35+h%35,58,62),'#24150a'];
  if(group==='aquatic')return[hsl(188+h%55,50,40),hsl(195+h%45,65,66),'#062837'];
  if(group==='reptile')return[hsl(78+h%62,45,34),hsl(95+h%45,55,50),'#18320c'];
  if(group==='bug')return[hsl(8+h%42,38,27),hsl(22+h%55,62,48),'#160907'];
  return[hsl(22+h%34,40,38),hsl(28+h%42,45,58),'#2b180a'];
}
function makeAnimalEnemyDef(name){
  const group=animalGroup(name), h=hashName(name), pal=animalPalette(name,group);
  const small=/Ratas|Murcielagos|Arañas|Escorpiones|Víboras|Pirañas|Iguanas|Escolopendras|Avispas|Alacranes|Anguilas|Sapos|Ranas|Geckos|Gatos|Conejos|Liebres|Ardillas|Patos/.test(name);
  const large=/Tiburones|Leones|Tigres|Caimanes|Jaguares|Osos|Orcas|Cocodrilos|Caballos|Alces|Búfalos|Morsas/.test(name);
  const r=small?10+h%4:large?17+h%7:13+h%5;
  const spdBase=group==='bird'?2.05:group==='aquatic'?1.55:group==='bug'?1.8:group==='reptile'?1.45:1.6;
  return{r,hp:(small?28:large?82:48)+(h%24),spd:spdBase+(h%7)*.06,col:pal[0],dmg:(small?5:large?13:8)+(h%6),gold:small?2:large?5:3,
    draw(ctx,x,y,hp,maxHp,t){
      const hurt=hp<maxHp*.3, bob=Math.sin(t*7+h%5)*1.5, flap=Math.sin(t*12+h%3)*8;
      ctx.save();ctx.translate(x,y+bob);
      ctx.shadowColor='rgba(0,0,0,.18)';ctx.shadowBlur=2;
      const main=hurt?'#e86a5a':pal[0], light=pal[1], dark=pal[2];
      if(group==='bird'){
        ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-r*2.2,-r*.7+flap,-r*2.8,r*.25);ctx.quadraticCurveTo(-r*1.25,r*.05,0,r*.45);ctx.fillStyle=main;ctx.fill();ctx.strokeStyle=dark;ctx.lineWidth=1.2;ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(r*2.2,-r*.7+flap,r*2.8,r*.25);ctx.quadraticCurveTo(r*1.25,r*.05,0,r*.45);ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.ellipse(0,0,r*.72,r*.95,0,0,Math.PI*2);ctx.fillStyle=light;ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.arc(r*.18,-r*.95,r*.45,0,Math.PI*2);ctx.fillStyle=main;ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.moveTo(r*.55,-r*.95);ctx.lineTo(r*1.05,-r*.78);ctx.lineTo(r*.55,-r*.62);ctx.closePath();ctx.fillStyle='#d99a19';ctx.fill();
        ctx.beginPath();ctx.arc(r*.25,-r*1.03,1.7,0,Math.PI*2);ctx.fillStyle='#050505';ctx.fill();
      } else if(group==='aquatic'){
        ctx.beginPath();ctx.moveTo(-r*1.2,0);ctx.quadraticCurveTo(0,-r*.9,r*1.35,-r*.12);ctx.quadraticCurveTo(0,r*.9,-r*1.2,0);ctx.fillStyle=main;ctx.fill();ctx.strokeStyle=dark;ctx.lineWidth=1.3;ctx.stroke();
        ctx.beginPath();ctx.moveTo(-r*1.2,0);ctx.lineTo(-r*2,-r*.65);ctx.lineTo(-r*1.8,0);ctx.lineTo(-r*2,r*.65);ctx.closePath();ctx.fillStyle=light;ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.moveTo(-r*.05,-r*.65);ctx.lineTo(r*.35,-r*1.35);ctx.lineTo(r*.45,-r*.38);ctx.closePath();ctx.fill();ctx.stroke();
        if(/Pulpos|Calamares|Medusas/.test(name)){for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(-r*.25+i*r*.18,r*.55);ctx.quadraticCurveTo(i*r*.35,r*1.35+Math.sin(t*8+i)*3,i*r*.28,r*1.8);ctx.strokeStyle=light;ctx.lineWidth=2;ctx.stroke();}}
        ctx.beginPath();ctx.arc(r*.82,-r*.18,2,0,Math.PI*2);ctx.fillStyle='#050505';ctx.fill();
      } else if(group==='reptile'){
        if(/Culebras|Víboras|Serpientes|Anguilas/.test(name)){ctx.strokeStyle=main;ctx.lineWidth=r*.72;ctx.lineCap='round';ctx.beginPath();for(let i=0;i<5;i++){const px=-r*1.8+i*r*.85,py=Math.sin(t*6+i)*r*.35;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();ctx.strokeStyle=dark;ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.ellipse(r*1.7,0,r*.65,r*.45,0,0,Math.PI*2);ctx.fillStyle=light;ctx.fill();ctx.stroke();}
        else{ctx.beginPath();ctx.ellipse(0,0,r*1.25,r*.62,0,0,Math.PI*2);ctx.fillStyle=main;ctx.fill();ctx.strokeStyle=dark;ctx.lineWidth=1.4;ctx.stroke();ctx.beginPath();ctx.ellipse(r*1.15,-r*.12,r*.55,r*.38,0,0,Math.PI*2);ctx.fillStyle=light;ctx.fill();ctx.stroke();for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-r*.7+i*r*.45,r*.45);ctx.lineTo(-r*.95+i*r*.55,r*.95);ctx.strokeStyle=dark;ctx.lineWidth=2;ctx.stroke();}}
        ctx.beginPath();ctx.arc(r*1.32,-r*.25,2,0,Math.PI*2);ctx.fillStyle='#f7d23b';ctx.fill();
      } else if(group==='bug'){
        ctx.beginPath();ctx.ellipse(0,0,r*.9,r*.75,0,0,Math.PI*2);ctx.fillStyle=main;ctx.fill();ctx.strokeStyle=dark;ctx.lineWidth=1.2;ctx.stroke();
        ctx.beginPath();ctx.ellipse(r*.78,-r*.05,r*.55,r*.48,0,0,Math.PI*2);ctx.fillStyle=light;ctx.fill();ctx.stroke();
        for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(i*r*.22,r*.35);ctx.lineTo(i*r*.35,r*.95+Math.abs(i));ctx.moveTo(i*r*.22,-r*.35);ctx.lineTo(i*r*.35,-r*.95-Math.abs(i));ctx.strokeStyle=dark;ctx.lineWidth=1.4;ctx.stroke();}
        if(/Escorpiones|Alacranes/.test(name)){ctx.beginPath();ctx.moveTo(-r*.8,0);ctx.quadraticCurveTo(-r*1.8,-r*1.2,-r*.7,-r*1.7);ctx.strokeStyle=dark;ctx.lineWidth=3;ctx.stroke();}
        if(/Avispas/.test(name)){ctx.globalAlpha=.55;ctx.beginPath();ctx.ellipse(-r*.25,-r*.85,r*.75,r*.35,-.4,0,Math.PI*2);ctx.fillStyle='#dff6ff';ctx.fill();ctx.beginPath();ctx.ellipse(r*.25,-r*.85,r*.75,r*.35,.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
        ctx.beginPath();ctx.arc(r*1.05,-r*.15,1.8,0,Math.PI*2);ctx.fillStyle='#050505';ctx.fill();
      } else {
        ctx.beginPath();ctx.ellipse(0,0,r*1.25,r*.72,0,0,Math.PI*2);ctx.fillStyle=main;ctx.fill();ctx.strokeStyle=dark;ctx.lineWidth=1.4;ctx.stroke();
        ctx.beginPath();ctx.ellipse(r*1.15,-r*.18,r*.62,r*.48,0,0,Math.PI*2);ctx.fillStyle=light;ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.moveTo(r*.82,-r*.55);ctx.lineTo(r*.72,-r*1.05);ctx.lineTo(r*1.08,-r*.62);ctx.closePath();ctx.fillStyle=dark;ctx.fill();
        ctx.beginPath();ctx.moveTo(r*1.18,-r*.55);ctx.lineTo(r*1.32,-r*1.0);ctx.lineTo(r*1.42,-r*.50);ctx.closePath();ctx.fill();
        for(let i=0;i<4;i++){const lx=-r*.8+i*r*.5, sw=Math.sin(t*8+i)*2;ctx.beginPath();ctx.moveTo(lx,r*.48);ctx.lineTo(lx+sw,r*1.05);ctx.strokeStyle=dark;ctx.lineWidth=2.6;ctx.lineCap='round';ctx.stroke();}
        ctx.beginPath();ctx.moveTo(-r*1.15,-r*.05);ctx.quadraticCurveTo(-r*1.85,-r*.75,-r*1.55,-r*1.15);ctx.strokeStyle=dark;ctx.lineWidth=3;ctx.stroke();
        ctx.beginPath();ctx.arc(r*1.38,-r*.28,2,0,Math.PI*2);ctx.fillStyle='#050505';ctx.fill();
      }
      ctx.restore();
    }
  };
}
ANIMAL_ENEMY_NAMES.forEach(name=>{ENEMY_DEFS[name]=makeAnimalEnemyDef(name);});

// ─── Infinite wave rotation: each wave chooses 2 or 3 animals ───────────────
const WAVE_ENEMY_POOL=[...ANIMAL_ENEMY_NAMES];

class Enemy{
  constructor(x,y,type,waveMult=1){
    this.x=x;this.y=y;this.type=type;
    const def=ENEMY_DEFS[type];
    this.radius=def.r;
    this.hp=Math.floor(def.hp*waveMult);
    this.maxHp=this.hp;
    this.speed=def.spd*(type==='boss'?.82:(.68+waveMult*.075));
    this.damage=Math.floor(def.dmg*waveMult);
    this.gold=def.gold;
    this.slowed=0;
    this.anim=Math.random()*Math.PI*2;
    if(type==='boss')this.bossTimer=0;
    this.knockVx=0;this.knockVy=0;
    this.shieldHp=0;this.maxShield=0;this.attackCd=0;
  }
  update(player){
    this.anim+=.016;
    const spd=this.slowed>0?this.speed*.45:this.speed;
    if(this.slowed>0)this.slowed--;
    if(this.attackCd>0)this.attackCd--;
    if(this.knockVx||this.knockVy){
      this.x+=this.knockVx;this.y+=this.knockVy;
      this.knockVx*=.8;this.knockVy*=.8;
      if(Math.abs(this.knockVx)<.1)this.knockVx=0;
      if(Math.abs(this.knockVy)<.1)this.knockVy=0;
      return;
    }
    if(this.type==='boss'){
      this.bossTimer++;
      const sway=Math.sin(this.bossTimer*.04)*1.2;
      const ang=Math.atan2(player.y-this.y,player.x-this.x)+sway;
      this.x+=Math.cos(ang)*spd;this.y+=Math.sin(ang)*spd;
    } else {
      const ang=Math.atan2(player.y-this.y,player.x-this.x);
      this.x+=Math.cos(ang)*spd;this.y+=Math.sin(ang)*spd;
    }
  }
  draw(ctx){
    ENEMY_DEFS[this.type].draw(ctx,this.x,this.y,this.hp,this.maxHp,this.anim);
    if(this.type!=='boss'&&this.hp<this.maxHp){
      const bw=this.radius*2+4,bh=4;
      ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(this.x-bw/2,this.y-this.radius-8,bw,bh);
      ctx.fillStyle='#44ee55';ctx.fillRect(this.x-bw/2,this.y-this.radius-8,bw*(this.hp/this.maxHp),bh);
    }
  }
}

// ─── PROJECTILE ──────────────────────────────────────────────────────────────
class Proj{
  constructor(x,y,ang,dmg,pierce=0,crit=false,slow=false,ls=0,col='#d4ff88'){
    this.x=x;this.y=y;
    const spd=10;
    this.vx=Math.cos(ang)*spd;this.vy=Math.sin(ang)*spd;
    this.dmg=dmg;this.pierce=pierce;this.crit=crit;this.slow=slow;this.ls=ls;
    this.col=col;this.radius=5;this.active=true;
    this.hit=new Set();this.ang=ang;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>6)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-60||this.x>CW+60||this.y<-60||this.y>CH+60)this.active=false;
  }
  draw(ctx){
    for(let i=0;i<this.trail.length;i++){
      const a=i/this.trail.length*.5;
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,this.radius*(i/this.trail.length),0,Math.PI*2);
      ctx.fillStyle=this.crit?`rgba(255,160,30,${a})`:`rgba(180,255,80,${a})`;ctx.fill();
    }
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.ang);
    ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-8,0);
    ctx.strokeStyle=this.crit?'#ff8820':this.col;ctx.lineWidth=this.crit?3:2;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(4,-3);ctx.lineTo(4,3);ctx.closePath();
    ctx.fillStyle=this.crit?'#ffaa30':this.col;ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,-2);ctx.lineTo(-10,-5);ctx.lineTo(-8,0);ctx.closePath();ctx.fillStyle='#8ab040';ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,2);ctx.lineTo(-10,5);ctx.lineTo(-8,0);ctx.closePath();ctx.fill();
    ctx.restore();
    if(this.crit){ctx.beginPath();ctx.arc(this.x,this.y,7,0,Math.PI*2);ctx.strokeStyle='rgba(255,150,20,.4)';ctx.lineWidth=2;ctx.stroke();}
  }
}

// ─── FOREST BACKGROUND (REALISTIC DAY CLEARING) ───────────────────────────────
class Forest{
  constructor(){
    this.trees=[
      {x:42,y:142,h:92,w:44,layer:0,sway:.2},
      {x:348,y:468,h:104,w:48,layer:1,sway:2.7},
      {x:314,y:106,h:74,w:36,layer:0,sway:4.4}
    ];
    this.rocks=[];this.leaves=[];this.fireflies=[];
    // Small rocks scattered on the earth floor
    for(let i=0;i<18;i++){
      this.rocks.push({
        x:(i*73+27)%CW,y:(i*47+92)%CH,
        rx:4+((i*5)%9),ry:3+((i*7)%5),
        rot:(i*.73)%Math.PI
      });
    }
    // Dry leaves and twigs make the ground feel less flat
    for(let i=0;i<58;i++){
      this.leaves.push({
        x:(i*61+19)%CW,y:(i*89+33)%CH,
        r:2+((i*3)%5),rot:(i*.51)%Math.PI,
        col:['#8b5a2b','#a66b2f','#c28a3a','#6f7f32'][i%4]
      });
    }
    // A few subtle fireflies, kept sparse so the clearing feels natural
    for(let i=0;i<3;i++){
      this.fireflies.push({
        x:(i*83+42)%CW,y:(i*71+120)%CH,
        vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.2,
        phase:Math.random()*Math.PI*2,speed:.15+Math.random()*.2
      });
    }
    this.trees.sort((a,b)=>a.layer-b.layer);
  }
  update(t){
    this.fireflies.forEach(f=>{
      f.phase+=.04;
      f.x+=f.vx+Math.sin(f.phase*.7)*.3;f.y+=f.vy+Math.cos(f.phase*.5)*.2;
      if(f.x<0)f.x=CW;if(f.x>CW)f.x=0;if(f.y<0)f.y=CH;if(f.y>CH)f.y=0;
    });
  }
  drawBg(ctx,t){
    // Real earth floor: layered soil with darker borders and a worn central path
    const grd=ctx.createLinearGradient(0,0,0,CH);
    grd.addColorStop(0,'#766342');grd.addColorStop(.48,'#8b7350');grd.addColorStop(1,'#665137');
    ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);

    // Patchy grass around the edges, leaving a compacted earth floor in the middle
    for(let gx=0;gx<CW;gx+=20){
      for(let gy=0;gy<CH;gy+=20){
        const edge=Math.min(gx,CW-gx,gy,CH-gy);
        const path=Math.abs(gx-CW/2)+Math.sin(gy*.035)*34;
        const noise=Math.sin(gx*.11+gy*.067)*.5+.5;
        if(edge<70 || path>132){
          ctx.fillStyle=`rgba(${62+noise*18},${105+noise*38},${38+noise*16},${.26+noise*.18})`;
          ctx.fillRect(gx,gy,22,22);
        }
      }
    }

    // Worn walkable dirt lane with soft shadows and irregular edges
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(145,0);
    for(let y=0;y<=CH;y+=36)ctx.lineTo(136+Math.sin(y*.027)*18,y);
    ctx.lineTo(254,CH);
    for(let y=CH;y>=0;y-=36)ctx.lineTo(264+Math.cos(y*.031)*20,y);
    ctx.closePath();
    const pathGrd=ctx.createLinearGradient(0,0,0,CH);
    pathGrd.addColorStop(0,'#9d8154');pathGrd.addColorStop(.5,'#b19260');pathGrd.addColorStop(1,'#80643e');
    ctx.fillStyle=pathGrd;ctx.fill();
    ctx.globalAlpha=.18;ctx.strokeStyle='#4a351f';ctx.lineWidth=16;ctx.stroke();
    ctx.restore();

    // Soil grains, tiny stones and shallow cracks
    ctx.save();
    for(let i=0;i<210;i++){
      const x=(i*47+13)%CW,y=(i*83+29)%CH;
      const a=.12+((i*7)%10)/100;
      ctx.fillStyle=i%3===0?`rgba(50,34,20,${a})`:`rgba(225,199,145,${a})`;
      ctx.fillRect(x,y,1+((i*5)%3),1+((i*11)%2));
    }
    ctx.globalAlpha=.18;ctx.strokeStyle='#4e3924';ctx.lineWidth=1;
    for(let i=0;i<12;i++){
      const x=(i*91+30)%CW,y=(i*59+75)%CH;
      ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+8,y+5,x+18,y+2);ctx.stroke();
    }
    ctx.restore();

    // Sparse grass blades, mostly on the borders
    ctx.save();ctx.globalAlpha=0.34;
    for(let i=0;i<95;i++){
      const gx=((i*97)%CW),gy=((i*53)%CH);
      if(Math.abs(gx-CW/2)<70 && gy>55 && gy<CH-30)continue;
      const gh=4+((i*37)%8);
      ctx.beginPath();ctx.moveTo(gx,gy);ctx.quadraticCurveTo(gx+(Math.sin(i)*.5)*3,gy-gh*.65,gx+(Math.sin(i*.7+t*.4)*1.5),gy-gh);
      ctx.strokeStyle=i%4?'#315f1e':'#5d7a2b';ctx.lineWidth=1.1;ctx.lineCap='round';ctx.stroke();
    }
    ctx.restore();

    // Dry leaves and twigs
    this.leaves.forEach(l=>{
      ctx.save();ctx.translate(l.x,l.y);ctx.rotate(l.rot);
      ctx.beginPath();ctx.ellipse(0,0,l.r,l.r*.45,0,0,Math.PI*2);
      ctx.fillStyle=l.col;ctx.fill();
      if(l.r>4){ctx.beginPath();ctx.moveTo(-l.r*.7,0);ctx.lineTo(l.r*.7,0);ctx.strokeStyle='rgba(60,35,16,.35)';ctx.lineWidth=.7;ctx.stroke();}
      ctx.restore();
    });

    // Rocks
    this.rocks.forEach(r=>{
      ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.rot);
      ctx.beginPath();ctx.ellipse(0,0,r.rx,r.ry,0,0,Math.PI*2);
      ctx.fillStyle='#9f9a88';ctx.fill();
      ctx.strokeStyle='#686356';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.ellipse(-r.rx*.2,-r.ry*.3,r.rx*.4,r.ry*.3,-.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fill();
      ctx.restore();
    });
  }
  drawTrees(ctx,t,layer){
    this.trees.filter(tr=>tr.layer===layer).forEach(tr=>{
      ctx.save();ctx.translate(tr.x,tr.y);
      const sw=Math.sin(t*.35+tr.sway)*tr.h*.018;

      // Ground shadow anchors each of the few trees to the scene
      ctx.beginPath();ctx.ellipse(4,3,tr.w*.45,tr.w*.16,0,0,Math.PI*2);
      ctx.fillStyle='rgba(30,22,12,.26)';ctx.fill();

      // Textured trunk with bark line and root flare
      const bark=ctx.createLinearGradient(-tr.w*.12,0,tr.w*.16,0);
      bark.addColorStop(0,'#4b311d');bark.addColorStop(.45,'#7a5733');bark.addColorStop(1,'#2f2115');
      ctx.beginPath();
      ctx.moveTo(-tr.w*.13,0);ctx.lineTo(-tr.w*.09,-tr.h*.5);
      ctx.quadraticCurveTo(0+sw,-tr.h*.58,tr.w*.11,-tr.h*.5);
      ctx.lineTo(tr.w*.15,0);ctx.closePath();
      ctx.fillStyle=bark;ctx.fill();
      ctx.strokeStyle='#2f2115';ctx.lineWidth=1.1;ctx.stroke();
      ctx.beginPath();ctx.moveTo(-tr.w*.16,-2);ctx.lineTo(-tr.w*.34,7);ctx.moveTo(tr.w*.15,-2);ctx.lineTo(tr.w*.34,7);ctx.stroke();
      ctx.globalAlpha=.38;ctx.strokeStyle='#1f160d';ctx.lineWidth=.8;
      for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-tr.w*.04+i*tr.w*.04,-8);ctx.lineTo(-tr.w*.08+i*tr.w*.04,-tr.h*.45);ctx.stroke();}
      ctx.globalAlpha=1;

      // Rounded, layered canopy instead of cartoon triangles
      const blobs=[[-.28,-.78,.42],[.12,-.86,.48],[.36,-.68,.38],[-.05,-.61,.5],[-.43,-.58,.34]];
      blobs.forEach((b,i)=>{
        ctx.beginPath();
        ctx.ellipse(b[0]*tr.w+sw*(1-i*.12),b[1]*tr.h,tr.w*b[2],tr.h*b[2]*.42,0,0,Math.PI*2);
        ctx.fillStyle=`hsl(${102+i*4},${38+i*4}%,${25+i*3}%)`;ctx.fill();
        ctx.strokeStyle='rgba(22,56,18,.25)';ctx.lineWidth=.8;ctx.stroke();
      });
      ctx.restore();
    });
  }
  drawFireflies(ctx,t){
    this.fireflies.forEach(f=>{
      const br=.3+Math.sin(f.phase*2)*.5;
      if(br>.35){
        ctx.beginPath();ctx.arc(f.x,f.y,2.5+br,0,Math.PI*2);ctx.fillStyle=`rgba(180,255,120,${br*.5})`;ctx.fill();
        ctx.beginPath();ctx.arc(f.x,f.y,1,0,Math.PI*2);ctx.fillStyle=`rgba(220,255,180,${br*.8})`;ctx.fill();
      }
    });
  }
  drawFog(ctx){
    // Soft daylight vignette, warmer and less fantastical
    const vgn=ctx.createRadialGradient(CW/2,CH/2,110,CW/2,CH/2,280);
    vgn.addColorStop(0,'rgba(255,244,210,0)');vgn.addColorStop(1,'rgba(70,48,25,0.22)');
    ctx.fillStyle=vgn;ctx.fillRect(0,0,CW,CH);
  }
  drawClearing(ctx,px,py){
    const clr=ctx.createRadialGradient(px,py,18,px,py,118);
    clr.addColorStop(0,'rgba(255,236,190,.1)');clr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=clr;ctx.fillRect(0,0,CW,CH);
    ctx.beginPath();ctx.ellipse(px,py+20,58,18,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(54,38,22,.16)';ctx.lineWidth=1.4;ctx.stroke();
  }
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
class Game{
  constructor(){
    this.cv=document.getElementById('cv');
    this.ctx=this.cv.getContext('2d');
    this.forest=new Forest();
    this.costs={dmg:10,hp:15,armor:18,regen:25,crit:20};
    this.permStats={baseDmg:22,baseMaxHp:120,armor:10,maxArmor:10,regenRate:0,critChance:.05};
    this.gold=0;
    this.waveAnnounceEl=document.getElementById('wave-announce');
    this.waNumEl=document.getElementById('wa-num');
    this.waSubEl=document.getElementById('wa-sub');
    this.init();
  }

  init(){
    this.player=new Player(CW/2,CH/2);
    this.player.baseDmg=this.permStats.baseDmg;
    this.player.baseMaxHp=this.permStats.baseMaxHp;
    this.player.armor=this.permStats.armor;
    this.player.maxArmor=this.permStats.maxArmor;
    this.player.regenRate=this.permStats.regenRate;
    this.player.critChance=this.permStats.critChance;
    this.player.maxHp=this.permStats.baseMaxHp;
    this.player.hp=this.permStats.baseMaxHp;

    this.enemies=[];this.projs=[];this.parts=[];this.floats=[];
    this.frames=0;this.bossUp=false;this.bossWarned=false;this.paused=false;this.over=false;
    this.waveMult=1;this.waveNum=0;this.killCount=0;
    // Wave system
    this.waveActive=false;this.waveEnemiesLeft=0;this.waveTotalEnemies=0;this.waveSpawnTimer=0;
    this.waveSpawnQueue=[];
    // Shield scaling per wave
    this.shieldWaveBonus=0;
    this.lastWaveKills=0;

    document.getElementById('gom').classList.remove('on');
    this.updateShopUI();
    if(this.rid)cancelAnimationFrame(this.rid);
    this.loop();
  }
  restart(){this.init();}

  addGold(n){this.gold+=n;this.updateShopUI();}

  buy(type){
    if(this.paused||this.over)return;
    const cost=this.costs[type];
    if(this.gold<cost)return;
    this.gold-=cost;
    if(type==='dmg'){this.permStats.baseDmg+=5;this.player.baseDmg=this.permStats.baseDmg;this.costs.dmg=Math.floor(this.costs.dmg*1.55);}
    else if(type==='hp'){this.permStats.baseMaxHp+=25;this.player.baseMaxHp=this.permStats.baseMaxHp;this.player.maxHp=this.permStats.baseMaxHp;this.player.hp=Math.min(this.player.hp+25,this.player.maxHp);this.costs.hp=Math.floor(this.costs.hp*1.5);}
    else if(type==='armor'){this.permStats.maxArmor+=2;this.player.maxArmor+=2;this.player.armor+=2;this.permStats.armor=this.permStats.maxArmor;this.costs.armor=Math.floor(this.costs.armor*1.6);}
    else if(type==='regen'){this.permStats.regenRate+=2;this.player.regenRate=this.permStats.regenRate;this.costs.regen=Math.floor(this.costs.regen*1.55);}
    else if(type==='crit'){this.permStats.critChance=Math.min(.95,this.permStats.critChance+.05);this.player.critChance=this.permStats.critChance;this.costs.crit=Math.floor(this.costs.crit*1.6);}
    this.updateShopUI();
  }

  updateShopUI(){
    const p=this.player,c=this.costs;
    const set=(id,title,val,cost)=>{
      document.getElementById('t'+id).innerText=title;
      document.getElementById('v'+id).innerText=val;
      document.getElementById('c'+id).innerText=`💰 ${cost}`;
      document.getElementById('b'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('off',this.gold<cost);
    };
    set('Dmg','Fuerza',`DMG: ${p.baseDmg}`,c.dmg);
    set('Hp','Vitalidad',`HP: ${p.baseMaxHp}`,c.hp);
    set('Armor','Armadura',`ESC: ${p.armor}`,c.armor);
    set('Regen','Regeneración',`+${p.regenRate}HP/s`,c.regen);
    set('Crit','Crítico',`${Math.round(p.critChance*100)}% Crit`,c.crit);
  }

  spawnEnemy(type){
    let x,y;
    const side=Math.floor(Math.random()*4);
    if(side===0){x=Math.random()*CW;y=-35;}
    else if(side===1){x=CW+35;y=Math.random()*CH;}
    else if(side===2){x=Math.random()*CW;y=CH+35;}
    else{x=-35;y=Math.random()*CH;}
    const e=new Enemy(x,y,type,this.waveMult);
    // Apply shield scaling - stronger each wave
    if(this.shieldWaveBonus>0){
      const shBonus=Math.floor(e.maxHp*0.08*this.shieldWaveBonus);
      e.maxShield=shBonus;e.shieldHp=shBonus;
    }
    this.enemies.push(e);
  }

  showWaveAnnounce(num,isBoss=false){
    const el=this.waveAnnounceEl;
    el.className='';
    if(isBoss){
      el.classList.add('boss-warn');
      this.waNumEl.textContent='⚠';
      this.waSubEl.textContent='¡EL ANCIANO DESPIERTA!';
      document.getElementById('wa-label')||el.querySelector('.wa-label');
      el.querySelector('.wa-label').textContent='BOSS';
    } else {
      this.waNumEl.textContent=num;
      this.waSubEl.textContent=this.getWaveSubtitle(num);
      el.querySelector('.wa-label').textContent='OLA';
    }
    // Animate in
    el.style.transition='none';
    el.style.opacity='0';
    el.style.transform='translate(-50%,-50%) scale(0.6)';
    el.classList.add('show');
    requestAnimationFrame(()=>{
      el.style.transition='opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.opacity='1';
      el.style.transform='translate(-50%,-50%) scale(1)';
    });
    setTimeout(()=>{
      el.style.transition='opacity 0.4s ease, transform 0.4s ease';
      el.style.opacity='0';
      el.style.transform='translate(-50%,-50%) scale(0.8)';
      setTimeout(()=>el.classList.remove('show'),400);
    },2200);
    if(isBoss)triggerShake(6,60);
    else triggerShake(3,20);
  }

  getWaveSubtitle(n){
    if(n<=2)return'Los enemigos se acercan...';
    if(n<=5)return'¡La oscuridad crece!';
    if(n<=9)return'¡Las hordas no paran!';
    if(n%10===0)return`🔥 ¡${n} olas infinitas! 🔥`;
    return'¡Prepárate para luchar!';
  }

  startNextWave(){
    this.waveNum++;
    this.shieldWaveBonus=0;
    const totalCount=3+Math.floor((this.waveNum-1)*0.55)+Math.floor((this.waveNum-1)/8);
    const pool=[...WAVE_ENEMY_POOL];
    const waveTypes=[];
    const numTypes=Math.min(pool.length,2+Math.floor(Math.random()*2));
    for(let i=0;i<numTypes;i++){
      const idx=Math.floor(Math.random()*pool.length);
      waveTypes.push(pool.splice(idx,1)[0]);
    }
    const queue=[];
    for(let i=0;i<totalCount;i++)queue.push(waveTypes[Math.floor(Math.random()*waveTypes.length)]);
    const spawnGap=Math.max(780,1350-this.waveNum*16);
    this.waveSpawnQueue=queue.map((type,i)=>({type,delay:i*spawnGap}));
    this.waveActive=true;
    this.waveEnemiesLeft=totalCount;
    this.waveTotalEnemies=totalCount;
    this.waveSpawnTimer=0;
    this.waveMult=1+this.waveNum*0.055;
    this.showWaveAnnounce(this.waveNum);
    document.getElementById('wdisp').innerText=`Ola ${this.waveNum} ∞`;
    document.getElementById('wdisp').style.color='#2a6a08';
  }

  handleSpawns(){
    const sec=Math.floor(this.frames/FPS);

    // Start first wave with a calm opening so the player is not overwhelmed.
    if(this.waveNum===0&&sec>=6){
      this.startNextWave();return;
    }

    // Infinite waves: when a wave is fully cleared, rest briefly and continue forever.
    if(this.waveActive&&this.waveEnemiesLeft<=0&&this.enemies.length===0&&this.waveSpawnQueue.length===0){
      this.waveActive=false;
      setTimeout(()=>{if(!this.over)this.startNextWave();},5200);
    }

    // Spawn from queue at a controlled pace.
    if(this.waveActive&&this.waveSpawnQueue.length>0){
      this.waveSpawnTimer++;
      while(this.waveSpawnQueue.length>0&&this.waveSpawnTimer*1000/FPS>=this.waveSpawnQueue[0].delay){
        const item=this.waveSpawnQueue.shift();
        this.spawnEnemy(item.type);
        this.waveEnemiesLeft--;
      }
    }
  }

  checkCollisions(){
    for(let i=this.projs.length-1;i>=0;i--){
      const p=this.projs[i];
      for(let j=this.enemies.length-1;j>=0;j--){
        const e=this.enemies[j];
        if(p.hit.has(e))continue;
        if(Math.hypot(p.x-e.x,p.y-e.y)<e.radius+p.radius){
          // Handle shield on enemy
          if(e.shieldHp>0){
            e.shieldHp-=p.dmg;
            if(e.shieldHp<0){e.hp+=e.shieldHp;e.shieldHp=0;}
            // Shield hit effect
            for(let k=0;k<4;k++)this.parts.push(new Particle(p.x,p.y,'#aaddff',3,2,12));
          } else {
            e.hp-=p.dmg;
          }
          p.hit.add(e);
          if(p.ls>0)this.player.hp=Math.min(this.player.maxHp,this.player.hp+p.dmg*p.ls);
          if(p.slow)e.slowed=80;
          if(p.crit){const ka=Math.atan2(e.y-this.player.y,e.x-this.player.x);e.knockVx=Math.cos(ka)*4;e.knockVy=Math.sin(ka)*4;}
          const col=p.crit?'#ffaa30':'#88ee44';
          for(let k=0;k<(p.crit?10:5);k++)this.parts.push(new Particle(p.x,p.y,col,3,2,12));
          const dmgStr=p.crit?`✦${Math.round(p.dmg)}`:`${Math.round(p.dmg)}`;
          this.floats.push(new FloatText(e.x+(Math.random()-.5)*20,e.y-e.radius,dmgStr,p.crit?'#ffcc44':'#d4ff88',p.crit?15:11));
          if(p.pierce<=0){p.active=false;}else{p.pierce--;}
          if(e.hp<=0){
            this.addGold(e.gold);this.killCount++;this.player.kills=this.killCount;
            const dcol=ENEMY_DEFS[e.type].col;
            for(let k=0;k<18;k++)this.parts.push(new Particle(e.x,e.y,dcol,5,3,28,1));
            this.floats.push(new FloatText(e.x,e.y,'💰+'+e.gold,'#f0c030',12));
            this.enemies.splice(j,1);
          }
          if(!p.active)break;
        }
      }
    }

    // Enemy → player - screen shake on hit
    for(let i=0;i<this.enemies.length;i++){
      const e=this.enemies[i];
      if(Math.hypot(e.x-this.player.x,e.y-this.player.y)<e.radius+this.player.radius){
        if(e.attackCd<=0){
          const armorBlocked=this.player.armor>0;
          this.player.takeDamage(e.damage);
          e.attackCd=50;
          const shakePower=Math.min(8, 2+e.damage/12);
          triggerShake(shakePower,22);
          const txt=armorBlocked?'🛡️ -1':`-${e.damage}`;
          this.floats.push(new FloatText(this.player.x-12,this.player.y-this.player.radius-10,txt,armorBlocked?'#4a9eff':'#ff5555',13));
          for(let k=0;k<3;k++)this.parts.push(new Particle(this.player.x,this.player.y,armorBlocked?'#4a9eff':'#ff3333',3,2,15));
        }
      }
    }

    this.projs=this.projs.filter(p=>p.active);
  }

  updateHUD(){
    const p=this.player;
    const sec=Math.floor(this.frames/FPS);
    document.getElementById('tdisp').innerText=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
    document.getElementById('gdisp').innerText=`💰 ${this.gold}`;
    const hpPct=(p.hp/p.maxHp*100).toFixed(0);
    document.getElementById('hp-fill').style.width=hpPct+'%';
    document.getElementById('hplbl').innerText=`${Math.ceil(p.hp)} / ${p.maxHp} HP`;
    const hpEl=document.getElementById('hp-fill');
    if(p.hp/p.maxHp<.25)hpEl.style.background='linear-gradient(90deg,#8c1c1c,#e83a3a)';
    else if(p.hp/p.maxHp<.5)hpEl.style.background='linear-gradient(90deg,#8c6c1c,#e8b83a)';
    else hpEl.style.background='linear-gradient(90deg,#2d8c3e,#5dd46e)';
    const pendingThreat=this.waveEnemiesLeft+this.enemies.length;
    const threatPct=this.waveActive?Math.max(5,Math.min(100,100-pendingThreat*100/Math.max(1,this.waveTotalEnemies))):0;
    document.getElementById('threat-fill').style.width=threatPct+'%';
    document.getElementById('threatlbl').innerText=this.waveActive?`Amenaza: ${Math.round(threatPct)}% contenida`:'Amenaza tranquila';
    const armorPct=p.maxArmor>0?(p.armor/p.maxArmor*100):0;
    document.getElementById('armor-fill').style.width=armorPct+'%';
    document.getElementById('armorlbl').innerText=`🛡️ ${Math.ceil(p.armor)} / ${p.maxArmor} Armadura`;
    document.getElementById('c-dmg').innerText=Math.round(p.dmg);
    document.getElementById('c-spd').innerText=(p.atkSpdMult).toFixed(1)+'x';
    document.getElementById('c-crit').innerText=Math.round(p.critChance*100)+'%';
    document.getElementById('c-arm').innerText=p.armor;
    document.getElementById('c-kills').innerText=this.killCount;
    if(p.hp<=0&&!this.over)this.triggerGameOver();
  }

  triggerGameOver(){
    this.over=true;this.paused=true;
    const sec=Math.floor(this.frames/FPS);
    document.getElementById('goTitle').innerText='🌲 CAÍDO EN EL BOSQUE';
    document.getElementById('goTitle').style.color='#e84a4a';
    const sg=document.getElementById('goStats');
    sg.innerHTML=`
      <div class="stat-box"><div class="sbl">TIEMPO</div><div class="sbv">${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}</div></div>
      <div class="stat-box"><div class="sbl">ELIMINADOS</div><div class="sbv">${this.killCount}</div></div>
      <div class="stat-box"><div class="sbl">ORO FINAL</div><div class="sbv" style="color:#b07800">💰${this.gold}</div></div>
      <div class="stat-box"><div class="sbl">OLEADA</div><div class="sbv">${this.waveNum}</div></div>
      <div class="stat-box"><div class="sbl">DAÑO</div><div class="sbv">${Math.round(this.player.dmg)}</div></div>
    `;
    document.getElementById('gom').classList.add('on');
  }

  triggerWin(){
    this.over=true;this.paused=true;
    const sec=Math.floor(this.frames/FPS);
    document.getElementById('goTitle').innerText='🌲 BOSQUE LIBERADO';
    document.getElementById('goTitle').style.color='#4a8a10';
    const sg=document.getElementById('goStats');
    sg.innerHTML=`
      <div class="stat-box"><div class="sbl">TIEMPO</div><div class="sbv">${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}</div></div>
      <div class="stat-box"><div class="sbl">ELIMINADOS</div><div class="sbv">${this.killCount}</div></div>
      <div class="stat-box"><div class="sbl">ORO FINAL</div><div class="sbv" style="color:#b07800">💰${this.gold}</div></div>
    `;
    document.getElementById('gom').classList.add('on');
  }

  loop=()=>{
    if(this.paused)return;
    this.frames++;
    const t=this.frames/FPS;

    this.handleSpawns();
    this.player.update(this);
    this.enemies.forEach(e=>e.update(this.player));
    this.projs.forEach(p=>p.update());
    this.parts.forEach(p=>p.update());
    this.parts=this.parts.filter(p=>p.life>0);
    this.floats.forEach(f=>f.update());
    this.floats=this.floats.filter(f=>f.life>0);
    this.forest.update(t);
    this.checkCollisions();
    updateShake();
    this.updateHUD();

    const ctx=this.ctx;
    ctx.clearRect(0,0,CW,CH);

    // Apply screen shake
    ctx.save();
    ctx.translate(shakeX,shakeY);

    this.forest.drawBg(ctx,t);
    this.forest.drawTrees(ctx,t,0);
    this.forest.drawClearing(ctx,this.player.x,this.player.y);

    this.parts.forEach(p=>p.draw(ctx));
    this.projs.forEach(p=>p.draw(ctx));

    // Draw enemy shields
    this.enemies.forEach(e=>{
      if(e.shieldHp>0&&e.maxShield>0){
        ctx.beginPath();ctx.arc(e.x,e.y,e.radius+6,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,180,255,${0.4+Math.sin(t*4)*.2})`;ctx.lineWidth=3;ctx.stroke();
        ctx.beginPath();ctx.arc(e.x,e.y,e.radius+8,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,180,255,${0.15})`;ctx.lineWidth=6;ctx.stroke();
      }
      e.draw(ctx);
    });

    this.player.draw(ctx);
    this.floats.forEach(f=>f.draw(ctx));

    this.forest.drawTrees(ctx,t,1);
    this.forest.drawFireflies(ctx,t);
    this.forest.drawFog(ctx);

    ctx.restore();

    if(!this.over)this.rid=requestAnimationFrame(this.loop);
  }
}

window.addEventListener('load',()=>{window.G=new Game();});
</script>
