<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Vertical Android</title>
    <style>
        /* Estilos para centrar el modelo en tu navegador */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222; /* Fondo gris oscuro fuera del modelo para contrastar */
            font-family: sans-serif;
            color: #fff;
        }

        /* Contenedor principal con las medidas exactas del dispositivo */
        .android-mockup {
            width: 393px;
            height: 793px;
            background-color: #000000; /* Fondo negro absoluto solicitado */
            outline: 2px solid #444; /* Borde visual sin restar pixeles al contenido */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* INICIO HUD – MODIFICACIÓN SOLICITADA */
        .hud-superior {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            width: 100%;
            height: 54px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 88px 1fr;
            align-items: stretch;
            gap: 6px;
            padding: 6px 8px;
            background: #000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
            pointer-events: none;
        }

        .hud-seccion {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            box-sizing: border-box;
        }

        .hud-hp {
            justify-content: flex-start;
            gap: 7px;
            padding: 0 7px;
        }

        .hud-hp-barra {
            flex: 1;
            height: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;
            background: #2a0000;
        }

        .hud-hp-relleno {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #b90000, #ff3030);
            transition: width 0.2s ease;
        }

        .hud-hp-texto,
        .hud-recurso {
            white-space: nowrap;
            font-weight: 700;
            text-shadow: 0 1px 2px #000;
        }

        .hud-identidad {
            flex-direction: column;
            gap: 2px;
            line-height: 1;
        }

        .hud-nombre {
            color: #f5f5f5;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .hud-nivel {
            color: #d8d8d8;
            font-size: 11px;
            font-weight: 700;
        }

        .hud-recursos {
            gap: 12px;
            padding: 0 8px;
        }
        /* FIN HUD */

        /* NUEVO: Barra superior negra independiente */
        .barra-superior-negra {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9;
            width: 100%;
            height: 18px;
            background: #000;
            pointer-events: none;
        }

        /* Primera división: exactamente 490px de alto */
        .seccion-superior {
            height: 490px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .escenario-recorte {
            --inicio-x: 7px;
            --inicio-y: 7px;
            --fin-x: 399px;
            --fin-y: 496px;
            width: calc(var(--fin-x) - var(--inicio-x) + 1px);
            height: calc(var(--fin-y) - var(--inicio-y) + 1px);
            position: relative;
            overflow: hidden;
            flex: none;
        }

        .escenario-recorte img {
            position: absolute;
            left: calc(-1 * var(--inicio-x));
            top: calc(-1 * var(--inicio-y));
            max-width: none;
            width: auto;
            height: auto;
        }

        /* MODIFICADO: Panel inferior dividido en dos subsecciones sin línea visible */
        .seccion-inferior {
            height: 303px;
            width: 100%;
            box-sizing: border-box;
            display: grid;
            grid-template-rows: 1fr 1fr;
            background: linear-gradient(180deg, #080b12 0%, #0b0d13 48%, #08090d 100%);
        }

        /* NUEVO: Barra de navegación inferior */
        .navegacion-inferior {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            padding: 16px 8px 12px;
            box-sizing: border-box;
            align-content: center;
        }

        .boton-navegacion {
            min-width: 0;
            min-height: 66px;
            border: 1px solid rgba(126, 159, 255, 0.28);
            border-radius: 12px;
            background: linear-gradient(145deg, #151a25 0%, #0e121b 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 7px 14px rgba(0, 0, 0, 0.32);
            color: #f4f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 7.5px;
            font-weight: 800;
            letter-spacing: 0.25px;
            text-transform: uppercase;
            text-shadow: 0 1px 3px #000;
        }

        .boton-navegacion .icono-navegacion {
            font-size: 18px;
            line-height: 1;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.7));
        }

        /* NUEVO: Mitad inferior del panel, conservada como área disponible */
        .contenido-inferior {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Texto opcional para identificar las áreas */
        .etiqueta {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="android-mockup">
        <!-- NUEVO: Barra superior negra independiente -->
        <div class="barra-superior-negra" aria-hidden="true"></div>

        <!-- INICIO HUD – MODIFICACIÓN SOLICITADA -->
        <div class="hud-superior" aria-label="Estado del personaje">
            <div class="hud-seccion hud-hp" aria-label="Salud del personaje">
                <div class="hud-hp-barra" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
                    <div class="hud-hp-relleno"></div>
                </div>
                <span class="hud-hp-texto">100 HP</span>
            </div>

            <div class="hud-seccion hud-identidad" aria-label="Identidad del personaje">
                <span class="hud-nombre">SASUKE</span>
                <span class="hud-nivel">Lv. 1</span>
            </div>

            <div class="hud-seccion hud-recursos" aria-label="Recursos económicos del personaje">
                <span class="hud-recurso hud-oro">💰 0</span>
                <span class="hud-recurso hud-diamantes">💎 0</span>
            </div>
        </div>
        <!-- FIN HUD -->

        <!-- División hasta los 490px -->
        <div class="seccion-superior">
            <div class="escenario-recorte" aria-label="Recorte del escenario desde X 7, Y 7 hasta X 399, Y 496">
                <img src="assets/images/escenario/a1.webp" alt="Escenario recortado">
            </div>
        </div>
        
        <!-- MODIFICADO: División con el espacio restante separada en dos mitades -->
        <div class="seccion-inferior">
            <!-- NUEVO: Barra de navegación inferior -->
            <nav class="navegacion-inferior" aria-label="Navegación principal del juego">
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">⚔️</span><span>Combate</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">🥷</span><span>Personaje</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">🛡️</span><span>Equipo</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">✨</span><span>Habilidades</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">⛩️</span><span>Clanes</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">💎</span><span>Recursos</span></div>
            </nav>

            <!-- NUEVO: Subsección inferior separada sin divisor visible -->
            <div class="contenido-inferior">
                <span class="etiqueta">Sección Inferior (303px)</span>
            </div>
        </div>
    </div>

    <script>
        // INICIO HUD – MODIFICACIÓN SOLICITADA
        const hudElementos = {
            barraHp: document.querySelector('.hud-hp-relleno'),
            barraHpAccesible: document.querySelector('.hud-hp-barra'),
            textoHp: document.querySelector('.hud-hp-texto'),
            nivel: document.querySelector('.hud-nivel'),
            oro: document.querySelector('.hud-oro'),
            diamantes: document.querySelector('.hud-diamantes')
        };

        function obtenerEstadoPersonajeHUD() {
            return window.estadoPersonaje || window.personaje || window.sasuke || window.player || {};
        }

        function obtenerValorHUD(claves, valorPorDefecto) {
            const estadoPersonajeHUD = obtenerEstadoPersonajeHUD();

            for (const clave of claves) {
                if (estadoPersonajeHUD[clave] !== undefined) {
                    return estadoPersonajeHUD[clave];
                }

                if (window[clave] !== undefined) {
                    return window[clave];
                }
            }

            return valorPorDefecto;
        }

        function renderizarHUDPersonaje() {
            const hpActual = Number(obtenerValorHUD(['hp', 'salud', 'vida'], 100));
            const hpMaximo = Number(obtenerValorHUD(['hpMax', 'saludMaxima', 'vidaMaxima'], 100));
            const nivel = obtenerValorHUD(['nivel', 'level'], 1);
            const oro = obtenerValorHUD(['oro', 'gold'], 0);
            const diamantes = obtenerValorHUD(['diamantes', 'diamonds'], 0);
            const porcentajeHp = hpMaximo > 0 ? Math.max(0, Math.min(100, (hpActual / hpMaximo) * 100)) : 0;

            hudElementos.barraHp.style.width = `${porcentajeHp}%`;
            hudElementos.barraHpAccesible.setAttribute('aria-valuenow', String(Math.round(porcentajeHp)));
            hudElementos.textoHp.textContent = `${hpActual} HP`;
            hudElementos.nivel.textContent = `Lv. ${nivel}`;
            hudElementos.oro.textContent = `💰 ${oro}`;
            hudElementos.diamantes.textContent = `💎 ${diamantes}`;

            requestAnimationFrame(renderizarHUDPersonaje);
        }

        renderizarHUDPersonaje();
        // FIN HUD
    </script>
</body>
</html>
