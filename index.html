<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mine Crusher - Idle Clicker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="status-level">
      <span class="level-label" id="level-label">⭐ NIV 1</span>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-bar"></div></div>
    </div>
    <div class="status-currencies">
      <div class="currency-item">
        <span class="currency-icon">💰</span>
        <span class="currency-val" id="gold-display">0</span>
      </div>
      <div class="currency-item">
        <span class="currency-icon special">💲</span>
        <span class="currency-val special" id="special-display">0</span>
      </div>
    </div>
    <div class="status-dps">
      <div class="dps-label" id="dps-display">1 DPS</div>
      <div class="dps-sub">⚡ AUTO</div>
    </div>
  </div>

  <!-- CAVE -->
  <div id="cave" onclick="handleCaveClick(event)">

    <!-- Stalactites -->
    <div class="stalactite" style="left:6%;  border-left-width:9px;border-right-width:9px;border-top-width:30px;"></div>
    <div class="stalactite" style="left:16%; border-left-width:5px;border-right-width:5px;border-top-width:20px;"></div>
    <div class="stalactite" style="left:28%; border-left-width:12px;border-right-width:12px;border-top-width:38px;"></div>
    <div class="stalactite" style="left:52%; border-left-width:7px;border-right-width:7px;border-top-width:26px;"></div>
    <div class="stalactite" style="left:66%; border-left-width:5px;border-right-width:5px;border-top-width:17px;"></div>
    <div class="stalactite" style="left:78%; border-left-width:11px;border-right-width:11px;border-top-width:34px;"></div>
    <div class="stalactite" style="left:90%; border-left-width:6px;border-right-width:6px;border-top-width:22px;"></div>

    <!-- Ambient -->
    <div style="position:absolute;top:28%;left:10%;font-size:clamp(9px,2.2vw,13px);opacity:0.5;filter:drop-shadow(0 0 4px #00E5FF);z-index:3;">💎</div>
    <div style="position:absolute;top:44%;left:7%;font-size:clamp(7px,1.8vw,10px);opacity:0.35;filter:drop-shadow(0 0 4px #AA00FF);z-index:3;">🔮</div>
    <div style="position:absolute;top:33%;right:9%;font-size:clamp(9px,2.2vw,13px);opacity:0.4;filter:drop-shadow(0 0 4px #FF6D00);z-index:3;">🪨</div>
    <div style="position:absolute;top:52%;right:7%;font-size:clamp(7px,1.8vw,10px);opacity:0.35;filter:drop-shadow(0 0 4px #00E5FF);z-index:3;">💎</div>

    <!-- Torch Left -->
    <div class="torch torch-left">
      <div class="flame"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="torch-head"></div><div class="torch-stick"></div><div class="torch-glow"></div>
    </div>
    <!-- Torch Right -->
    <div class="torch torch-right">
      <div class="flame"><div class="flame-outer"></div><div class="flame-inner"></div></div>
      <div class="torch-head"></div><div class="torch-stick"></div><div class="torch-glow"></div>
    </div>

    <!-- Miner — small minimalist cartoon -->
    <svg id="miner" viewBox="0 0 44 68" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="66" rx="12" ry="3" fill="rgba(0,0,0,0.35)"/>
      <rect x="13" y="46" width="7"  height="14" rx="3" fill="#37474F"/>
      <rect x="24" y="46" width="7"  height="14" rx="3" fill="#37474F"/>
      <ellipse cx="16" cy="60" rx="6" ry="4" fill="#3E2723"/>
      <ellipse cx="28" cy="60" rx="6" ry="4" fill="#3E2723"/>
      <rect x="11" y="28" width="22" height="20" rx="5" fill="#4CAF50"/>
      <rect x="11" y="43" width="22" height="4" rx="2" fill="#2E7D32"/>
      <rect x="19" y="42" width="6"  height="6" rx="1" fill="#FFD740"/>
      <line x1="33" y1="34" x2="42" y2="26" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/>
      <line x1="42" y1="26" x2="40" y2="16" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="40" cy="15" rx="7" ry="3" fill="#90A4AE" transform="rotate(-30,40,15)"/>
      <polygon points="46,10 33,14 43,19" fill="#B0BEC5"/>
      <line x1="11" y1="34" x2="4"  y2="40" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/>
      <circle cx="22" cy="22" r="11" fill="#FFCC80"/>
      <path d="M11,20 Q11,8 22,8 Q33,8 33,20 Z" fill="#F57F17"/>
      <path d="M13,18 Q13,10 22,10 Q31,10 31,18 Z" fill="#FFB300"/>
      <circle cx="22" cy="13" r="3.5" fill="#FFF9C4"/>
      <circle cx="22" cy="13" r="2"   fill="#FFD740"/>
      <ellipse cx="18" cy="22" rx="2.2" ry="2.5" fill="#1A0A00"/>
      <ellipse cx="26" cy="22" rx="2.2" ry="2.5" fill="#1A0A00"/>
      <circle  cx="18.8" cy="21.3" r="0.9" fill="white"/>
      <circle  cx="26.8" cy="21.3" r="0.9" fill="white"/>
      <path d="M18,27 Q22,30 26,27" stroke="#7B3F00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

    <div class="cave-ground"></div>

    <div id="rock-container">
      <div class="hp-bars">
        <div class="hp-bar-bg">
          <div class="hp-fill-red" id="hp-red" style="width:100%"></div>
          <div class="hp-text" id="hp-text">30 / 30</div>
        </div>
      </div>
      <svg id="rock" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg" onclick="clickRock(event)">
        <ellipse cx="60" cy="96" rx="50" ry="5" fill="rgba(0,0,0,0.35)"/>
        <polygon points="12,80 4,50 18,22 42,8 76,6 100,16 116,42 112,76 88,95 32,97" fill="url(#rg)"/>
        <polygon points="18,76 8,48 22,26 44,13 74,11 98,20 110,44 104,70" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.4"/>
        <polygon points="4,50 18,22 42,8 46,36 22,55"   fill="rgba(255,255,255,0.08)"/>
        <polygon points="76,6 100,16 116,42 94,32 72,16" fill="rgba(255,255,255,0.1)"/>
        <polygon points="88,95 112,76 116,42 104,68 84,88" fill="rgba(0,0,0,0.16)"/>
        <g id="rock-cracks"></g>
        <defs>
          <radialGradient id="rg" cx="35%" cy="30%" r="65%">
            <stop offset="0%"   stop-color="#8f8f9f"/>
            <stop offset="55%"  stop-color="#6d6d7e"/>
            <stop offset="100%" stop-color="#4a4a5a"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <div id="particle-layer"></div>
  </div>

  <div id="section-panel">
    <div class="section-title" id="section-title">⚔️ BATALLA</div>
    <div class="section-sub"  id="section-sub">Modo PvE activo</div>
    <div class="section-content" id="section-content"></div>
    <div class="section-coming">PRÓXIMAMENTE</div>
  </div>

  <div id="nav-menu">
    <button class="nav-btn btn-picks"    onclick="toggleSection(this,'⛏️ PICOS','Mejora tu pico para más daño','picks')">
      <span class="btn-index">1</span><span class="btn-icon">⛏️</span><span class="btn-label">Picos</span>
      <span class="notif-dot"></span>
    </button>
    <button class="nav-btn btn-clans"    onclick="toggleSection(this,'🛡️ CLANES','Únete o crea tu clan','clans')">
      <span class="btn-index">2</span><span class="btn-icon">🛡️</span><span class="btn-label">Clanes</span>
    </button>
    <button class="nav-btn btn-battle"   onclick="toggleSection(this,'⚔️ BATALLA','Modo PvE activo','battle')">
      <span class="btn-index">3</span><span class="btn-icon">⚔️</span><span class="btn-label">Batalla</span>
      <span class="notif-dot"></span>
    </button>
    <button class="nav-btn btn-attrs"    onclick="toggleSection(this,'📊 ATRIBUTOS','Distribuye tus puntos de estadística','attrs')">
      <span class="btn-index">4</span><span class="btn-icon">📊</span><span class="btn-label">Atributos</span>
    </button>
    <button class="nav-btn btn-arena"    onclick="toggleSection(this,'🏟️ ARENA PvP','Reta a otros jugadores','arena')">
      <span class="btn-index">5</span><span class="btn-icon">🏟️</span><span class="btn-label">Arena</span>
    </button>
    <button class="nav-btn btn-events"   onclick="toggleSection(this,'🎉 EVENTOS','Evento especial activo: Doble oro','events')">
      <span class="btn-index">6</span><span class="btn-icon">🎉</span><span class="btn-label">Eventos</span>
      <span class="notif-dot"></span>
    </button>
    <button class="nav-btn btn-prestige" onclick="toggleSection(this,'🌟 PRESTIGIO','Reinicia para bonificaciones permanentes','prestige')">
      <span class="btn-index">7</span><span class="btn-icon">🌟</span><span class="btn-label">Prestigio</span>
    </button>
    <button class="nav-btn btn-pets"     onclick="toggleSection(this,'🐉 MASCOTAS','Tus compañeros de aventura','pets')">
      <span class="btn-index">8</span><span class="btn-icon">🐉</span><span class="btn-label">Mascotas</span>
    </button>
    <button class="nav-btn btn-settings" onclick="toggleSection(this,'⚙️ AJUSTES','Configuración del juego','settings')">
      <span class="btn-index">9</span><span class="btn-icon">⚙️</span><span class="btn-label">Ajustes</span>
    </button>
  </div>

</div>
<script src="botonpicos.js"></script>
<script src="script.js"></script>
</body>
</html>
