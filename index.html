<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GYM HERO - Entrenamiento</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0b0d17;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif}
  body{display:flex;align-items:center;justify-content:center}

  /* ===== ESCALADO: el juego se diseña a 400x780 px exactos y escala al dispositivo ===== */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#1a1f38,#0b0d17)}
  #game{
    width:400px;height:780px;position:relative;flex:none;
    background:#141833;overflow:hidden;border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);transform-origin:center center;
    display:flex;flex-direction:column;
  }

  /* ===================== PARTE SUPERIOR (400 x 440) ===================== */
  #top{width:400px;height:440px;position:relative;flex:none;display:flex;flex-direction:column}

  /* -- Barra de recursos (50px) -- */
  #resources{
    width:400px;height:50px;flex:none;display:flex;align-items:center;gap:6px;
    padding:0 8px;background:linear-gradient(180deg,#20254a,#151838);
    border-bottom:2px solid #2e3470;box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:5;
  }
  .res{
    flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
    background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.06);
    border-radius:10px;height:34px;font-weight:800;color:#fff;font-size:13px;
    text-shadow:0 1px 2px rgba(0,0,0,.6);letter-spacing:.3px;
  }
  .res .ico{font-size:16px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
  .res.power{background:linear-gradient(180deg,#3a2a55,#241a3a);border-color:#6b4ba0;color:#ffd9f0}

  /* -- Sala de entrenamiento (390px) -- */
  #room{width:400px;height:390px;flex:none;position:relative;overflow:hidden;cursor:default}
  #room-svg{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* Máquinas */
  .machine{position:absolute;cursor:pointer;transition:filter .2s,transform .2s;filter:drop-shadow(0 6px 5px rgba(0,0,0,.45))}
  .machine:hover{filter:drop-shadow(0 8px 6px rgba(0,0,0,.5)) brightness(1.08)}
  .machine.touched{animation:tap .25s ease}
  @keyframes tap{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}

  #weight-machine{left:6px;bottom:16px;width:118px}
  #treadmill{left:170px;bottom:14px;width:132px}
  #boxing-bag{left:300px;bottom:14px;width:78px;height:230px}

  /* Etiquetas flotantes de las máquinas */
  .hint{
    position:absolute;background:rgba(10,12,26,.82);color:#fff;font-size:9px;font-weight:700;
    padding:2px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.15);pointer-events:none;
    white-space:nowrap;letter-spacing:.3px;
  }

  /* Personaje */
  #character{
    position:absolute;left:118px;bottom:18px;width:46px;height:74px;z-index:6;
    transition:transform .6s cubic-bezier(.4,0,.2,1);transform:translate(0,0);
  }
  #char-shadow{position:absolute;left:50%;bottom:-2px;width:42px;height:10px;
    background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);transform:translateX(-50%)}
  #char-svg{width:100%;height:100%;display:block;animation:breathe 3s ease-in-out infinite;overflow:visible}
  @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.2px)}}

  /* Pivotes de extremidades (top-center de su bbox) */
  .limb{transform-box:fill-box;transform-origin:50% 0%}
  #torso{transform-box:fill-box;transform-origin:50% 100%}
  #bag-swing{transform-box:fill-box;transform-origin:50% 0%}

  /* Animaciones de acciones */
  .punching #arm-right{animation:punchR var(--punch-speed,.42s) ease-in-out infinite}
  .punching #arm-left{animation:punchL var(--punch-speed,.42s) ease-in-out infinite}
  .punching #torso{animation:torsoP var(--punch-speed,.42s) ease-in-out infinite}
  .punching #leg-right{animation:boxStepR var(--punch-speed,.42s) ease-in-out infinite}
  .punching #leg-left{animation:boxStepL var(--punch-speed,.42s) ease-in-out infinite}
  @keyframes punchR{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(58deg)}}
  @keyframes punchL{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-28deg)}}
  @keyframes torsoP{0%,100%{transform:rotate(0) translateY(0)}50%{transform:rotate(5deg) translateY(-1px)}}
  @keyframes boxStepR{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-4deg)}}
  @keyframes boxStepL{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(4deg)}}

  .swinging #bag-swing{animation:swing var(--punch-speed,.42s) ease-in-out infinite}
  @keyframes swing{0%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}100%{transform:rotate(-8deg)}}

  .lifting #arm-right{animation:liftR .9s ease-in-out infinite}
  .lifting #arm-left{animation:liftL .9s ease-in-out infinite}
  @keyframes liftR{0%,100%{transform:rotate(42deg)}50%{transform:rotate(-32deg)}}
  @keyframes liftL{0%,100%{transform:rotate(-42deg)}50%{transform:rotate(32deg)}}
  .lifting #torso{animation:torsoLift .9s ease-in-out infinite}
  @keyframes torsoLift{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
  .lifting #leg-right{animation:braceR .9s ease-in-out infinite}
  .lifting #leg-left{animation:braceL .9s ease-in-out infinite}
  @keyframes braceR{0%,100%{transform:rotate(4deg)}50%{transform:rotate(-3deg)}}
  @keyframes braceL{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(3deg)}}
  .dumbbell{opacity:0;transition:opacity .2s}
  .lifting .dumbbell{opacity:1}

  .walking #leg-right{animation:walkR var(--walk-speed,.36s) linear infinite}
  .walking #leg-left{animation:walkL var(--walk-speed,.36s) linear infinite}
  .walking #arm-right{animation:walkAr var(--walk-speed,.36s) linear infinite}
  .walking #arm-left{animation:walkAl var(--walk-speed,.36s) linear infinite}
  @keyframes walkR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-20deg)}}
  @keyframes walkL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
  @keyframes walkAr{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
  @keyframes walkAl{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}

  .running-man #leg-right{animation:runR var(--run-speed,.24s) linear infinite}
  .running-man #leg-left{animation:runL var(--run-speed,.24s) linear infinite}
  .running-man #arm-right{animation:runAr var(--run-speed,.24s) linear infinite}
  .running-man #arm-left{animation:runAl var(--run-speed,.24s) linear infinite}
  .running-man #torso{animation:torsoRun var(--run-speed,.24s) ease-in-out infinite}
  @keyframes runR{0%,100%{transform:rotate(34deg)}50%{transform:rotate(-34deg)}}
  @keyframes runL{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(34deg)}}
  @keyframes runAr{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(34deg)}}
  @keyframes runAl{0%,100%{transform:rotate(34deg)}50%{transform:rotate(-34deg)}}
  @keyframes torsoRun{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}

  .running #belt-stripes{animation:beltmove var(--belt-speed,.3s) linear infinite}
  @keyframes beltmove{from{transform:translateX(0)}to{transform:translateX(-22px)}}

  /* Textos flotantes (daño / repeticiones) */
  #float-layer{position:absolute;inset:0;pointer-events:none;z-index:8;overflow:hidden}
  .float-txt{
    position:absolute;font-weight:900;color:#fff;font-size:22px;text-shadow:0 2px 4px rgba(0,0,0,.7),0 0 2px #000;
    transform:translate(-50%,0);animation:floatUp 1.4s ease-out forwards;white-space:nowrap;letter-spacing:.5px;
  }
  .float-txt.crit{font-size:30px;color:#ffe14d;text-shadow:0 2px 5px rgba(0,0,0,.7),0 0 10px #ff8a00}
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,6px) scale(.6)}
    18%{opacity:1;transform:translate(-50%,-4px) scale(1.1)}
    100%{opacity:0;transform:translate(-50%,-46px) scale(1)}}

  /* Contadores persistentes (km / reps) */
  .counter-pill{
    position:absolute;z-index:7;background:rgba(8,10,22,.85);color:#fff;font-weight:800;font-size:13px;
    padding:4px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.18);
    text-shadow:0 1px 2px #000;transform:translateX(-50%);box-shadow:0 3px 8px rgba(0,0,0,.4);
    animation:popIn .2s ease;
  }
  @keyframes popIn{from{transform:translateX(-50%) scale(.7);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

  /* Botón cancelar */
  #cancel-btn{
    position:absolute;top:8px;right:8px;z-index:9;display:none;
    background:linear-gradient(180deg,#e0473e,#b22f28);color:#fff;border:none;
    padding:7px 14px;border-radius:20px;font-weight:800;font-size:12px;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.4);letter-spacing:.5px;
  }
  #cancel-btn:active{transform:translateY(1px)}
  #cancel-btn.show{display:block;animation:popIn .2s ease}

  /* ===================== PARTE INFERIOR (400 x 340) ===================== */
  #bottom{width:400px;height:340px;flex:none;position:relative;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#11152e,#0c0f24);border-top:2px solid #2e3470}

  /* -- Rejilla de estadísticas (270px) -- */
  #stats-grid{
    height:270px;flex:none;padding:12px 10px 10px;display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:repeat(2,1fr);
    gap:10px;align-items:center;justify-items:center;
  }
  .stat-card{
    --stat-main:#fff;--stat-glow:rgba(255,255,255,.18);
    width:100%;max-width:116px;height:108px;
    background:
      linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,0) 26%),
      linear-gradient(180deg,#1b2145,#12162f);
    border:1px solid rgba(255,255,255,.08);border-radius:16px;
    padding:7px 8px 8px;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;transition:transform .15s,border-color .2s,box-shadow .2s;
    box-shadow:0 12px 24px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .stat-card::before{
    content:'';position:absolute;top:-18px;left:-12px;width:84px;height:84px;border-radius:50%;
    background:var(--stat-glow);filter:blur(10px);opacity:.85;pointer-events:none;
  }
  .stat-card::after{
    content:'';position:absolute;left:10px;right:10px;top:0;height:2px;border-radius:999px;
    background:linear-gradient(90deg,transparent,var(--stat-main),transparent);opacity:.68;
  }
  .stat-card:hover{transform:translateY(-2px)}
  .stat-card.gain{animation:cardPulse .5s ease}
  @keyframes cardPulse{0%{transform:scale(1)}40%{transform:scale(1.04);box-shadow:0 0 18px rgba(255,225,77,.45)}100%{transform:scale(1)}}
  .stat-top{display:flex;align-items:center;gap:7px;position:relative;z-index:1}
  .stat-card .stat-ico{
    width:25px;height:25px;border-radius:10px;display:grid;place-items:center;font-size:13px;opacity:1;
    background:rgba(8,10,22,.42);border:1px solid rgba(255,255,255,.08);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  }
  .stat-meta{display:flex;flex-direction:column;gap:2px}
  .stat-card .name{font-size:9.5px;font-weight:900;color:#eef2ff;letter-spacing:.55px;line-height:1}
  .stat-card .lvl{font-size:8px;color:#8f97c7;font-weight:700;line-height:1}
  .stat-mid{display:flex;flex-direction:column;align-items:flex-start;gap:2px;position:relative;z-index:1}
  .stat-card .val{font-size:21px;font-weight:900;color:var(--stat-main);line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.45)}
  .stat-card .val.flash{animation:valFlash .5s ease}
  @keyframes valFlash{0%{color:#ffe14d;transform:scale(1.18)}100%{color:var(--stat-main);transform:scale(1)}}
  .stat-desc{font-size:8px;font-weight:700;color:#a9b1db;letter-spacing:.35px;text-transform:uppercase}
  .stat-foot{position:relative;z-index:1}
  .xp-wrap{width:100%;height:7px;background:#090c19;border-radius:999px;overflow:hidden;border:1px solid rgba(0,0,0,.45);margin-top:1px}
  .xp-fill{height:100%;width:0;background:linear-gradient(90deg,#ffd000,#ffe96b);border-radius:999px;transition:width .35s ease;
    box-shadow:0 0 6px rgba(255,208,0,.6)}

  /* color por estadística */
  .stat-card[data-s="ATAQUE"]{border-color:#7a2f2f;--stat-main:#ff7a6b;--stat-glow:rgba(255,122,107,.24)}
  .stat-card[data-s="DEFENSA"]{border-color:#2f527a;--stat-main:#6bb8ff;--stat-glow:rgba(107,184,255,.22)}
  .stat-card[data-s="HP"]{border-color:#2f7a4a;--stat-main:#6bff9b;--stat-glow:rgba(107,255,155,.22)}
  .stat-card[data-s="VELOCIDAD"]{border-color:#7a6f2f;--stat-main:#ffe06b;--stat-glow:rgba(255,224,107,.22)}
  .stat-card[data-s="CRITICO"]{border-color:#6f2f7a;--stat-main:#e06bff;--stat-glow:rgba(224,107,255,.22)}
  .stat-card[data-s="EVASION"]{border-color:#2f7a72;--stat-main:#6bffe6;--stat-glow:rgba(107,255,230,.22)}

  /* -- Menú principal lineal (70px) -- */
  #menu{height:70px;flex:none;display:flex;border-top:2px solid #2e3470;background:linear-gradient(180deg,#0c0f24,#070914)}
  .menu-btn{
    flex:1;background:transparent;border:none;border-top:3px solid transparent;color:#6a72a8;
    font-size:9.5px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;letter-spacing:.4px;transition:color .2s,border-color .2s,background .2s;
  }
  .menu-btn .m-ico{font-size:19px;filter:grayscale(.5);opacity:.65;transition:.2s}
  .menu-btn.active{color:#ffd000;border-top-color:#ffd000;background:linear-gradient(180deg,rgba(255,208,0,.12),transparent)}
  .menu-btn.active .m-ico{filter:none;opacity:1}
  .menu-btn:not(.active):active{color:#9aa3d6}

  /* -- Panel del COLISEO -- */
  #room.coliseo-mode > :not(#coliseo-panel):not(#lucha-panel){visibility:hidden}
  #coliseo-panel{
    position:absolute;inset:0;z-index:20;display:none;
    grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:10px;
    padding:12px;background:linear-gradient(180deg,#11152e,#0c0f24);visibility:visible;
  }
  #coliseo-panel.show{display:grid}
  .coliseo-card{
    width:100%;height:100%;border:1px solid rgba(255,255,255,.1);border-radius:16px;
    background:linear-gradient(180deg,#1b2145,#12162f);color:#eef2ff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:inherit;font-size:14px;font-weight:900;letter-spacing:.7px;
    box-shadow:0 12px 24px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06);
  }
  button.coliseo-card{cursor:pointer}
  button.coliseo-card:active{transform:scale(.98)}
  .coliseo-ico{font-size:32px;margin-bottom:8px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .coliseo-empty{pointer-events:none}
  #lucha-panel{
    position:absolute;inset:0;z-index:21;display:none;
    background:linear-gradient(180deg,#11152e,#0c0f24);
    border:1px solid rgba(255,255,255,.08);visibility:visible;
  }
  #lucha-panel.show{display:block}

  /* Toast */
  #toast{
    position:absolute;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:rgba(10,12,26,.95);color:#fff;padding:9px 18px;border-radius:24px;font-weight:700;font-size:12px;
    border:1px solid rgba(255,255,255,.15);z-index:50;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="stage">
  <div id="game">

    <!-- ====================== PARTE SUPERIOR ====================== -->
    <div id="top">
      <!-- Barra de recursos -->
      <div id="resources">
        <div class="res"><span class="ico">💰</span><span id="gold">0</span></div>
        <div class="res"><span class="ico">💎</span><span id="crystal">0</span></div>
        <div class="res"><span class="ico">💲</span><span id="dollar">0</span></div>
        <div class="res power"><span class="ico">💪</span><span id="power">0</span></div>
      </div>

      <!-- Sala de entrenamiento -->
      <div id="room">
        <!-- Fondo: suelo, paredes, luces -->
        <svg id="room-svg" viewBox="0 0 400 350" preserveAspectRatio="none">
          <defs>
            <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#41527a"/><stop offset="1" stop-color="#2c3958"/>
            </linearGradient>
            <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#9a6634"/><stop offset="1" stop-color="#c98a48"/>
            </linearGradient>
            <radialGradient id="glow"><stop offset="0" stop-color="#fff4c2" stop-opacity=".85"/><stop offset="1" stop-color="#fff4c2" stop-opacity="0"/></radialGradient>
            <linearGradient id="win" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd0ff"/><stop offset="1" stop-color="#cfeaff"/></linearGradient>
          </defs>

          <!-- Pared -->
          <rect x="0" y="0" width="400" height="186" fill="url(#wall)"/>
          <!-- Paneles de pared -->
          <g stroke="#243150" stroke-width="1.5" opacity=".5">
            <line x1="100" y1="0" x2="100" y2="186"/><line x1="200" y1="0" x2="200" y2="186"/>
            <line x1="300" y1="0" x2="300" y2="186"/><line x1="0" y1="93" x2="400" y2="93"/>
          </g>
          <!-- Ventana -->
          <rect x="34" y="34" width="74" height="66" rx="4" fill="url(#win)" stroke="#243150" stroke-width="3"/>
          <line x1="71" y1="34" x2="71" y2="100" stroke="#243150" stroke-width="3"/>
          <line x1="34" y1="67" x2="108" y2="67" stroke="#243150" stroke-width="3"/>
          <!-- Cartel de gimnasio -->
          <rect x="170" y="40" width="96" height="52" rx="6" fill="#1b2240" stroke="#3a4480" stroke-width="2"/>
          <text x="220" y="64" text-anchor="middle" font-size="15" font-weight="900" fill="#ffd000" font-family="Trebuchet MS">GYM</text>
          <text x="220" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#ff7a6b" font-family="Trebuchet MS">HERO</text>

          <!-- Luces de techo -->
          <circle cx="90" cy="14" r="26" fill="url(#glow)"/>
          <circle cx="210" cy="14" r="26" fill="url(#glow)"/>
          <circle cx="330" cy="14" r="26" fill="url(#glow)"/>
          <g fill="#2a3354" stroke="#1a2038" stroke-width="1.5">
            <rect x="78" y="0" width="24" height="10" rx="2"/><rect x="198" y="0" width="24" height="10" rx="2"/><rect x="318" y="0" width="24" height="10" rx="2"/>
          </g>
          <!-- Espejo -->
          <rect x="350" y="50" width="70" height="80" rx="3" fill="#aab8d8" opacity=".35" stroke="#243150" stroke-width="2"/>

          <!-- Zócalo -->
          <rect x="0" y="180" width="400" height="9" fill="#6b4423"/>
          <!-- Suelo -->
          <rect x="0" y="189" width="400" height="161" fill="url(#floor)"/>
          <!-- Tablones del suelo -->
          <g stroke="#7a4f24" stroke-width="1.5" opacity=".6">
            <line x1="0" y1="214" x2="400" y2="214"/><line x1="0" y1="244" x2="400" y2="244"/>
            <line x1="0" y1="278" x2="400" y2="278"/><line x1="0" y1="316" x2="400" y2="316"/>
          </g>
          <g stroke="#b07a43" stroke-width="1" opacity=".5">
            <line x1="60" y1="189" x2="60" y2="214"/><line x1="180" y1="189" x2="180" y2="214"/>
            <line x1="300" y1="189" x2="300" y2="214"/>
            <line x1="40" y1="214" x2="40" y2="244"/><line x1="150" y1="214" x2="150" y2="244"/>
            <line x1="270" y1="214" x2="270" y2="244"/><line x1="350" y1="214" x2="350" y2="244"/>
            <line x1="90" y1="244" x2="90" y2="278"/><line x1="220" y1="244" x2="220" y2="278"/>
            <line x1="330" y1="244" x2="330" y2="278"/>
          </g>
          <!-- Viñeta -->
          <rect x="0" y="0" width="400" height="350" fill="url(#vig)" opacity="0"/>
        </svg>

        <!-- MÁQUINA DE PESAS -->
        <div id="weight-machine" class="machine" data-action="weights">
          <svg viewBox="0 0 118 132" width="100%">
            <!-- Rack -->
            <rect x="20" y="20" width="8" height="92" rx="3" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <rect x="90" y="20" width="8" height="92" rx="3" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <!-- Barra con pesas -->
            <rect x="10" y="30" width="98" height="6" rx="3" fill="#5a6070" stroke="#11141f" stroke-width="2"/>
            <g stroke="#11141f" stroke-width="2">
              <circle cx="14" cy="33" r="11" fill="#3a3f55"/><circle cx="14" cy="33" r="6" fill="#2b3047"/>

<script>
/* ============================================================
   ESTADO DEL JUEGO
   ============================================================ */
const ICONOS = {ATAQUE:'⚔️', DEFENSA:'🛡️', HP:'❤️', VELOCIDAD:'💨', CRITICO:'🎯', EVASION:'🌀'};
const STAT_HELP = {
  ATAQUE:'Daño base',
  DEFENSA:'Reducción',
  HP:'Vida máxima',
  VELOCIDAD:'Golpe y paso',
  CRITICO:'Doble daño',
  EVASION:'Esquiva'
};
const PERCENT_STATS = new Set(['CRITICO','EVASION']);
const BATTLE_THRESHOLDS = { CRITICO:93, EVASION:94 };

const game = {
  gold: 0, crystal: 0, dollar: 0,
  battle: { player: null },
  stats: {
    // Cada slot: estadística inicial muy baja, xp requerida DISTINTA y creciente por nivel
    ATAQUE:   { level:1, value:5,    xp:0, xpNext:95,  gain:3,    xpGrowth:1.70 },
    CRITICO:  { level:1, value:0.15, xp:0, xpNext:130, gain:0.15, xpGrowth:1.75 },
    DEFENSA:  { level:1, value:5,    xp:0, xpNext:145, gain:3,    xpGrowth:1.80 },
    HP:       { level:1, value:30,   xp:0, xpNext:180, gain:12,   xpGrowth:1.85 },
    VELOCIDAD:{ level:1, value:4,    xp:0, xpNext:220, gain:2,    xpGrowth:2.15 },
    EVASION:  { level:1, value:0.15, xp:0, xpNext:210, gain:0.15, xpGrowth:2.15 }
  }
};

const ORDER = ["ATAQUE","DEFENSA","HP","VELOCIDAD","CRITICO","EVASION"];

/* ============================================================
   REFERENCIAS DOM
   ============================================================ */
const room = document.getElementById('room');
const character = document.getElementById('character');
const charSvg = document.getElementById('char-svg');
const boxingBag = document.getElementById('boxing-bag');
const treadmillEl = document.getElementById('treadmill');
const weightMachine = document.getElementById('weight-machine');
const cancelBtn = document.getElementById('cancel-btn');
const floatLayer = document.getElementById('float-layer');
const statsGrid = document.getElementById('stats-grid');
const coliseoPanel = document.getElementById('coliseo-panel');
const luchaPanel = document.getElementById('lucha-panel');
const luchaBtn = document.getElementById('lucha-btn');

let currentAction = null;   // 'punch' | 'weights' | 'treadmill' | null
let actionTimer = null;     // intervalo activo
let repCount = 0;
let kmCount = 0;
let kmLabel = null;

/* ============================================================
   ESCALADO AL DISPOSITIVO (diseño exacto 400x740)
   ============================================================ */
const gameEl = document.getElementById('game');
function fit(){
  const s = Math.min(window.innerWidth/400, window.innerHeight/780);
  gameEl.style.transform = `scale(${s})`;
}
function getScale(){
  const m = gameEl.style.transform.match(/scale\(([\d.]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}
window.addEventListener('resize', fit); fit();

function roundStat(num){
  return Math.round(num * 100) / 100;
}
function formatNumber(num, digits=2){
  return Number.isInteger(num) ? String(num) : parseFloat(num.toFixed(digits)).toString();
}
function formatStatValue(key, value){
  if(PERCENT_STATS.has(key)) return roundStat(value).toFixed(2) + '%';
  return formatNumber(value, 2);
}
function formatGain(key, value){
  return PERCENT_STATS.has(key) ? roundStat(value).toFixed(2) + '%' : formatNumber(value, 2);
}
function getPowerValue(){
  let power = 0;
  ORDER.forEach(k=> power += game.stats[k].value);
  return roundStat(power);
}
function getMoveDurationMs(){
  return Math.max(260, Math.round(600 - (game.stats.VELOCIDAD.value * 18)));
}
function getPunchIntervalMs(){
  return Math.max(230, Math.round(430 - (game.stats.VELOCIDAD.value * 12)));
}
function getWalkCycleMs(){
  return Math.max(220, Math.round(360 - (game.stats.VELOCIDAD.value * 6)));
}
function getBeltSpeedMs(){
  return Math.max(180, Math.round(300 - (game.stats.VELOCIDAD.value * 5)));
}
function applyCharacterSpeed(){
  const moveDuration = getMoveDurationMs();
  const walkCycle = getWalkCycleMs();
  character.style.transitionDuration = moveDuration + 'ms';
  charSvg.style.setProperty('--punch-speed', getPunchIntervalMs() + 'ms');
  charSvg.style.setProperty('--walk-speed', walkCycle + 'ms');
  charSvg.style.setProperty('--run-speed', Math.max(160, Math.round(walkCycle * 0.72)) + 'ms');
  treadmillEl.style.setProperty('--belt-speed', getBeltSpeedMs() + 'ms');
  return moveDuration;
}
function getDefenseReduction(defenseValue){
  return Math.min(0.30, defenseValue * 0.006);
}
function rollWindowChance(chance, threshold){
  const roll = Math.random() * 100;
  const upperLimit = Math.min(100, threshold + chance);
  return roll > threshold && roll <= upperLimit;
}
function rollCriticalHit(fighter = game.battle.player || syncPlayerBattleStats()){
  return rollWindowChance(fighter.critChance ?? 0, fighter.critThreshold ?? BATTLE_THRESHOLDS.CRITICO);
}
function rollEvasion(fighter = game.battle.player || syncPlayerBattleStats()){
  return rollWindowChance(fighter.evasionChance ?? 0, fighter.evasionThreshold ?? BATTLE_THRESHOLDS.EVASION);
}
function resolveBattleHit(attacker, defender){
  if(rollEvasion(defender)) return { damage:0, critical:false, evaded:true, remainingHp:defender.currentHp };
  let damage = Math.max(1, Math.round(attacker.attack));
  const critical = rollCriticalHit(attacker);
  if(critical) damage *= 2;
  const defenseReduction = typeof defender.defenseReduction === 'number'
    ? defender.defenseReduction
    : getDefenseReduction(defender.defense || 0);
  damage = Math.max(1, Math.round(damage * (1 - defenseReduction)));
  defender.currentHp = Math.max(0, defender.currentHp - damage);
  return { damage, critical, evaded:false, remainingHp:defender.currentHp };
}
function syncPlayerBattleStats(){
  const player = {
    attack: roundStat(game.stats.ATAQUE.value),
    defense: roundStat(game.stats.DEFENSA.value),
    maxHp: Math.max(1, Math.round(game.stats.HP.value)),
    currentHp: Math.max(1, Math.round(game.stats.HP.value)),
    moveSpeed: roundStat(1 + game.stats.VELOCIDAD.value * 0.05),
    hitSpeedMs: getPunchIntervalMs(),
    critChance: roundStat(game.stats.CRITICO.value),
    evasionChance: roundStat(game.stats.EVASION.value),
    critThreshold: BATTLE_THRESHOLDS.CRITICO,
    evasionThreshold: BATTLE_THRESHOLDS.EVASION,
    defenseReduction: roundStat(getDefenseReduction(game.stats.DEFENSA.value))
  };
  game.battle.player = player;
  window.GYM_HERO_BATTLE = {
    syncPlayer: syncPlayerBattleStats,
    getPlayer: () => ({...game.battle.player}),
    resolveHit: resolveBattleHit,
    rollCritical: rollCriticalHit,
    rollEvasion: rollEvasion
  };
  return player;
}

/* ============================================================
   CONSTRUCCIÓN DE TARJETAS DE ESTADÍSTICAS
   ============================================================ */
function buildStatCards(){
  statsGrid.innerHTML = '';
  ORDER.forEach(key=>{
    const s = game.stats[key];
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.dataset.s = key;
    card.innerHTML = `
      <div class="stat-top">
        <span class="stat-ico">${ICONOS[key]}</span>
        <div class="stat-meta">
          <div class="name">${key}</div>
          <div class="lvl">Nv. <span class="lvl-n">${s.level}</span></div>
        </div>
      </div>
      <div class="stat-mid">
        <div class="val" data-val="${key}">${formatStatValue(key, s.value)}</div>
        <div class="stat-desc">${STAT_HELP[key]}</div>
      </div>
      <div class="stat-foot">
        <div class="xp-wrap"><div class="xp-fill" data-xp="${key}"></div></div>
      </div>`;
    statsGrid.appendChild(card);
  });
  refreshStats();
}

/* ============================================================
   ACTUALIZACIÓN DE UI
   ============================================================ */
function refreshStats(){
  // Recursos
  document.getElementById('gold').textContent = Math.floor(game.gold);
  document.getElementById('crystal').textContent = Math.floor(game.crystal);
  document.getElementById('dollar').textContent = Math.floor(game.dollar);
  // Poder global = sumatoria de todas las estadísticas
  document.getElementById('power').textContent = formatNumber(getPowerValue(), 2);
  // Tarjetas
  ORDER.forEach(k=>{
    const s = game.stats[k];
    const card = statsGrid.querySelector(`[data-s="${k}"]`);
    if(!card) return;
    card.querySelector('.val').textContent = formatStatValue(k, s.value);
    card.querySelector('.lvl-n').textContent = s.level;
    const pct = Math.min(100, (s.xp / s.xpNext) * 100);
    card.querySelector('.xp-fill').style.width = pct + '%';
  });
  applyCharacterSpeed();
  syncPlayerBattleStats();
}

/* ============================================================
   EXPERIENCIA Y SUBIDA DE NIVEL
   ============================================================ */
function addXP(key, amount){
  const s = game.stats[key];
  s.xp += amount;
  while(s.xp >= s.xpNext){
    s.xp -= s.xpNext;
    s.level++;
    s.value = roundStat(s.value + s.gain);
    // Cada nivel exige más experiencia (factor propio por slot)
    s.xpNext = Math.floor(s.xpNext * s.xpGrowth + 12);
    // Recompensas (dinero desactivado por ahora)
    // game.crystal += 1.2;
    // game.dollar += 0.6;
    // Feedback visual
    const card = statsGrid.querySelector(`[data-s="${key}"]`);
    if(card){
      card.classList.remove('gain'); void card.offsetWidth; card.classList.add('gain');
      const valEl = card.querySelector('.val');
      valEl.classList.remove('flash'); void valEl.offsetWidth; valEl.classList.add('flash');
    }
    toast('⬆️ ' + key + ' subió a Nv.' + s.level + '  (+' + formatGain(key, s.gain) + ')');
  }
  refreshStats();
}

/* Flotante en la sala (daño / repeticiones) */
function floatTextInRoom(x, y, text, crit){
  const t = document.createElement('div');
  t.className = 'float-txt' + (crit?' crit':'');
  t.textContent = text;
  t.style.left = x + 'px';
  t.style.top = y + 'px';
  floatLayer.appendChild(t);
  setTimeout(()=> t.remove(), 1400);
}

/* ============================================================
   MOVIMIENTO DEL PERSONAJE
   ============================================================ */
const HOME = {x:0, y:0};
const TARGETS = {
  punch:    {x:170, y:94},
  weights:  {x:-76, y:96},
  treadmill:{x:100, y:76}
};
function moveCharTo(pos){
  character.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
}
function goHome(){
  character.style.transform = `translate(${HOME.x}px, ${HOME.y}px)`;
}

/* ============================================================
   GESTIÓN DE ACCIONES
   ============================================================ */
function clearActionClasses(){
  charSvg.classList.remove('punching','lifting','walking','running-man');
  boxingBag.classList.remove('swinging');
  treadmillEl.classList.remove('running');
}

function startAction(type){
  if(currentAction === type) return;
  stopAction(true);             // detiene cualquier acción previa
  currentAction = type;
  cancelBtn.classList.add('show');
  const moveDuration = applyCharacterSpeed();
  charSvg.classList.add('walking');
  moveCharTo(TARGETS[type]);

  // Pequeña espera para que llegue caminando (solo visual)
  setTimeout(()=>{
    if(currentAction !== type) return;
    charSvg.classList.remove('walking');
    if(type === 'punch') runPunch();
    else if(type === 'weights') runWeights();
    else if(type === 'treadmill') runTreadmill();
  }, Math.max(220, moveDuration - 20));
}

function stopAction(silent){
  if(actionTimer){ clearInterval(actionTimer); actionTimer = null; }
  clearActionClasses();
  currentAction = null;
  if(kmLabel){ kmLabel.remove(); kmLabel = null; }
  repCount = 0; kmCount = 0;
  cancelBtn.classList.remove('show');
  goHome();
  if(!silent) toast('Volviste al centro de la sala');
}

/* ---------- SACO DE BOXEO ---------- */
function runPunch(){
  charSvg.classList.add('punching');
  boxingBag.classList.add('swinging');
  const punchInterval = getPunchIntervalMs();
  actionTimer = setInterval(()=>{
    // Daño basado en ATAQUE + variación, con crítico sincronizado al personaje
    const playerBattle = syncPlayerBattleStats();
    const atk = playerBattle.attack;
    const isCrit = rollCriticalHit(playerBattle);
    let dmg = Math.max(1, Math.round(atk * (0.92 + Math.random()*0.16)));
    if(isCrit) dmg = Math.round(dmg * 2);
    // Oro por entrenar (desactivado por ahora)
    // game.gold += 0.6 + (isCrit?0.6:0);
    // Texto de daño sobre el saco
    const bagRect = boxingBag.getBoundingClientRect();
    const roomRect = room.getBoundingClientRect();
    const scale = getScale();
    const x = (bagRect.left + bagRect.width/2 - roomRect.left)/scale;
    const y = (bagRect.top + 40 - roomRect.top)/scale;
    floatTextInRoom(x, y, (isCrit?'¡CRIT! ':'') + dmg, isCrit);
    // Experiencia -> ATAQUE y CRITICO
    addXP('ATAQUE', 6);
    addXP('CRITICO', 5);
    refreshStats();
  }, punchInterval);
}

/* ---------- PESAS ---------- */
function runWeights(){
  charSvg.classList.add('lifting');
  repCount = 0;
  actionTimer = setInterval(()=>{
    repCount++;
    // Cada subida = repetición visible que aparece y se desvanece
    const charRect = character.getBoundingClientRect();
    const roomRect = room.getBoundingClientRect();
    const scale = getScale();
    const x = (charRect.left + charRect.width/2 - roomRect.left)/scale;
    const y = (charRect.top - 10 - roomRect.top)/scale;
    floatTextInRoom(x, y, '+' + repCount + ' rep', false);
    // Recompensas y experiencia -> HP y DEFENSA (dinero desactivado por ahora)
    // game.gold += 0.6;
    // if(repCount % 5 === 0) game.dollar += 0.6;
    addXP('HP', 7);
    addXP('DEFENSA', 6);
    refreshStats();
  }, 900);
}

/* ---------- CAMINADORA ---------- */
function runTreadmill(){
  charSvg.classList.add('running-man');
  treadmillEl.classList.add('running');
  kmCount = 0;
  // Etiqueta persistente de kilómetros
  kmLabel = document.createElement('div');
  kmLabel.className = 'counter-pill';
  kmLabel.innerHTML = '🏃 <span class="km">0.00</span> km';
  const tmRect = treadmillEl.getBoundingClientRect();
  const roomRect = room.getBoundingClientRect();
  const scale = getScale();
  kmLabel.style.left = ((tmRect.left + tmRect.width/2 - roomRect.left)/scale) + 'px';
  kmLabel.style.top = ((tmRect.top - 18 - roomRect.top)/scale) + 'px';
  room.appendChild(kmLabel);

  actionTimer = setInterval(()=>{
    kmCount += 0.04;
    if(kmLabel) kmLabel.querySelector('.km').textContent = kmCount.toFixed(2);
    // Recompensas y experiencia -> VELOCIDAD y EVASION (dinero desactivado por ahora)
    // game.gold += 0.6;
    // if(kmCount % 1 < 0.04) game.dollar += 0.6;
    addXP('VELOCIDAD', 4);
    addXP('EVASION', 4);
    refreshStats();
  }, 300);
}

/* ============================================================
   EVENTOS DE CLIC
   ============================================================ */
function bindMachine(el, action){
  el.addEventListener('click', ()=>{
    el.classList.remove('touched'); void el.offsetWidth; el.classList.add('touched');
    startAction(action);
  });
}
bindMachine(boxingBag, 'punch');
bindMachine(weightMachine, 'weights');
bindMachine(treadmillEl, 'treadmill');

cancelBtn.addEventListener('click', ()=> stopAction(false));

/* ============================================================
   COLISEO: ocultar/mostrar el contenido de los dos cuadros centrales
   (sala de entrenamiento y rejilla de estadísticas)
   ============================================================ */
let coliseoActive = false;
function setColiseoHidden(hidden){
  // Cuadro central superior: sala de entrenamiento
  room.classList.toggle('coliseo-mode', hidden);
  if(hidden){
    coliseoPanel.classList.add('show');
    luchaPanel.classList.remove('show');
  }else{
    coliseoPanel.classList.remove('show');
    luchaPanel.classList.remove('show');
  }
  // Cuadro central inferior: rejilla de estadísticas
  statsGrid.style.visibility = hidden ? 'hidden' : '';
  coliseoActive = hidden;
}

function openLuchaPanel(){
  if(!coliseoActive) return;
  coliseoPanel.classList.remove('show');
  luchaPanel.classList.add('show');
  toast('🥊 LUCHA');
}

luchaBtn.addEventListener('click', openLuchaPanel);

/* Menú principal */
document.querySelectorAll('.menu-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const name = btn.dataset.menu;

    if(name === 'COLISEO'){
      // No se puede acceder si el personaje está entrenando en alguna máquina
      if(currentAction !== null){
        toast('⚠️ Tu personaje está entrenando');
        return; // no cambia de pestaña ni vacía los cuadros
      }
      // Personaje libre: entrar al COLISEO y vaciar los dos cuadros centrales
      document.querySelectorAll('.menu-btn').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      setColiseoHidden(true);
      toast('⚔️ COLISEO');
      return;
    }

    document.querySelectorAll('.menu-btn').forEach(b=> b.classList.remove('active'));
    btn.classList.add('active');

    if(name === 'ENTRENAR'){
      // Volver a mostrar el contenido de los dos cuadros centrales
      if(coliseoActive) setColiseoHidden(false);
      toast('🏋️ Modo ENTRENAR activo');
    }else{
      // Cualquier otra opción restaura los cuadros si venías del COLISEO
      if(coliseoActive) setColiseoHidden(false);
      toast(name + ': próximamente 🔒');
      // vuelve a marcar ENTRENAR como activo
      setTimeout(()=>{
        document.querySelectorAll('.menu-btn').forEach(b=> b.classList.remove('active'));
        document.querySelector('[data-menu="ENTRENAR"]').classList.add('active');
      }, 1400);
    }
  });
});

/* Toast */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1600);
}

/* ============================================================
   INICIO
   ============================================================ */
buildStatCards();
refreshStats();
</script>
