<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GYM HERO - Entrenamiento</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div id="stage">
  <div id="game">

    <!-- ====================== PARTE SUPERIOR ====================== -->
    <div id="top">
      <!-- Barra de recursos -->
      <div id="resources">
        <div class="res"><span class="ico">💰</span><span id="gold">0</span></div>
        <div class="res"><span class="ico">💎</span><span id="crystal">0</span></div>
        <div class="res"><span class="ico">💲</span><span id="dollar">0</span></div>
        <div class="res power"><span class="ico">💪</span><span id="power">0</span></div>
      </div>

      <!-- Sala de entrenamiento -->
      <div id="room">
        <div id="fps-counter"><span class="fps-label">FPS</span><span id="fps-value">60</span></div>

        <!-- Fondo: suelo, paredes, luces -->
        <svg id="room-svg" viewBox="0 0 400 350" preserveAspectRatio="none">
          <defs>
            <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#41527a"/><stop offset="1" stop-color="#2c3958"/>
            </linearGradient>
            <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#9a6634"/><stop offset="1" stop-color="#c98a48"/>
            </linearGradient>
            <radialGradient id="glow"><stop offset="0" stop-color="#fff4c2" stop-opacity=".85"/><stop offset="1" stop-color="#fff4c2" stop-opacity="0"/></radialGradient>
            <linearGradient id="win" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd0ff"/><stop offset="1" stop-color="#cfeaff"/></linearGradient>
          </defs>

          <!-- Pared -->
          <rect x="0" y="0" width="400" height="186" fill="url(#wall)"/>
          <!-- Paneles de pared -->
          <g stroke="#243150" stroke-width="1.5" opacity=".5">
            <line x1="100" y1="0" x2="100" y2="186"/><line x1="200" y1="0" x2="200" y2="186"/>
            <line x1="300" y1="0" x2="300" y2="186"/><line x1="0" y1="93" x2="400" y2="93"/>
          </g>
          <!-- Ventana -->
          <rect x="34" y="34" width="74" height="66" rx="4" fill="url(#win)" stroke="#243150" stroke-width="3"/>
          <line x1="71" y1="34" x2="71" y2="100" stroke="#243150" stroke-width="3"/>
          <line x1="34" y1="67" x2="108" y2="67" stroke="#243150" stroke-width="3"/>
          <!-- Cartel de gimnasio -->
          <rect x="170" y="40" width="96" height="52" rx="6" fill="#1b2240" stroke="#3a4480" stroke-width="2"/>
          <text x="220" y="64" text-anchor="middle" font-size="15" font-weight="900" fill="#ffd000" font-family="Trebuchet MS">GYM</text>
          <text x="220" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#ff7a6b" font-family="Trebuchet MS">HERO</text>

          <!-- Luces de techo -->
          <circle cx="90" cy="14" r="26" fill="url(#glow)"/>
          <circle cx="210" cy="14" r="26" fill="url(#glow)"/>
          <circle cx="330" cy="14" r="26" fill="url(#glow)"/>
          <g fill="#2a3354" stroke="#1a2038" stroke-width="1.5">
            <rect x="78" y="0" width="24" height="10" rx="2"/><rect x="198" y="0" width="24" height="10" rx="2"/><rect x="318" y="0" width="24" height="10" rx="2"/>
          </g>
          <!-- Espejo -->
          <rect x="350" y="50" width="70" height="80" rx="3" fill="#aab8d8" opacity=".35" stroke="#243150" stroke-width="2"/>

          <!-- Zócalo -->
          <rect x="0" y="180" width="400" height="9" fill="#6b4423"/>
          <!-- Suelo -->
          <rect x="0" y="189" width="400" height="161" fill="url(#floor)"/>
          <!-- Tablones del suelo -->
          <g stroke="#7a4f24" stroke-width="1.5" opacity=".6">
            <line x1="0" y1="214" x2="400" y2="214"/><line x1="0" y1="244" x2="400" y2="244"/>
            <line x1="0" y1="278" x2="400" y2="278"/><line x1="0" y1="316" x2="400" y2="316"/>
          </g>
          <g stroke="#b07a43" stroke-width="1" opacity=".5">
            <line x1="60" y1="189" x2="60" y2="214"/><line x1="180" y1="189" x2="180" y2="214"/>
            <line x1="300" y1="189" x2="300" y2="214"/>
            <line x1="40" y1="214" x2="40" y2="244"/><line x1="150" y1="214" x2="150" y2="244"/>
            <line x1="270" y1="214" x2="270" y2="244"/><line x1="350" y1="214" x2="350" y2="244"/>
            <line x1="90" y1="244" x2="90" y2="278"/><line x1="220" y1="244" x2="220" y2="278"/>
            <line x1="330" y1="244" x2="330" y2="278"/>
          </g>
          <!-- Viñeta -->
          <rect x="0" y="0" width="400" height="350" fill="url(#vig)" opacity="0"/>
        </svg>

        <!-- MÁQUINA DE PESAS -->
        <div id="weight-machine" class="machine" data-action="weights">
          <svg viewBox="0 0 118 132" width="100%">
            <!-- Rack -->
            <rect x="20" y="20" width="8" height="92" rx="3" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <rect x="90" y="20" width="8" height="92" rx="3" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <!-- Barra con pesas -->
            <rect x="10" y="30" width="98" height="6" rx="3" fill="#5a6070" stroke="#11141f" stroke-width="2"/>
            <g stroke="#11141f" stroke-width="2">
              <circle cx="14" cy="33" r="11" fill="#3a3f55"/><circle cx="14" cy="33" r="6" fill="#2b3047"/>
              <circle cx="104" cy="33" r="11" fill="#3a3f55"/><circle cx="104" cy="33" r="6" fill="#2b3047"/>
            </g>
            <!-- Banco -->
            <rect x="22" y="74" width="74" height="16" rx="6" fill="#3a2a22" stroke="#11141f" stroke-width="2"/>
            <rect x="22" y="74" width="74" height="6" rx="3" fill="#5a4034"/>
            <!-- Patas -->
            <rect x="26" y="88" width="7" height="34" rx="2" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <rect x="85" y="88" width="7" height="34" rx="2" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <!-- Soporte de pesas con mancuernas -->
            <rect x="40" y="104" width="38" height="6" rx="2" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <g stroke="#11141f" stroke-width="1.5">
              <rect x="44" y="98" width="3" height="8" rx="1" fill="#444a60"/>
              <circle cx="45.5" cy="98" r="4" fill="#3a3f55"/><circle cx="45.5" cy="98" r="2" fill="#2b3047"/>
              <rect x="71" y="98" width="3" height="8" rx="1" fill="#444a60"/>
              <circle cx="72.5" cy="98" r="4" fill="#3a3f55"/><circle cx="72.5" cy="98" r="2" fill="#2b3047"/>
            </g>
          </svg>
          <div class="hint" style="left:50%;top:-2px;transform:translateX(-50%)">🏋️ Pesas</div>
        </div>

        <!-- CAMINADORA -->
        <div id="treadmill" class="machine" data-action="treadmill">
          <svg viewBox="0 0 132 110" width="100%">
            <!-- Consola -->
            <rect x="86" y="2" width="40" height="44" rx="5" fill="#1c2238" stroke="#0e111c" stroke-width="2"/>
            <rect x="92" y="8" width="28" height="18" rx="3" fill="#2a3354"/>
            <text x="106" y="21" text-anchor="middle" font-size="8" font-weight="800" fill="#6bff9b" font-family="Trebuchet MS">0.0</text>
            <rect x="94" y="32" width="10" height="8" rx="2" fill="#3a4480"/><rect x="108" y="32" width="10" height="8" rx="2" fill="#3a4480"/>
            <!-- Soporte consola -->
            <rect x="98" y="44" width="16" height="22" fill="#2b3047" stroke="#0e111c" stroke-width="2"/>
            <!-- Barra -->
            <rect x="84" y="40" width="44" height="7" rx="3" fill="#3a3f55" stroke="#0e111c" stroke-width="2"/>
            <!-- Base / cinta -->
            <rect x="2" y="62" width="118" height="38" rx="10" fill="#15192a" stroke="#0e111c" stroke-width="2"/>
            <!-- Cinta (banda) -->
            <rect x="8" y="68" width="106" height="22" rx="6" fill="#2b3047" stroke="#0e111c" stroke-width="1.5"/>
            <clipPath id="beltclip"><rect x="9" y="69" width="104" height="20" rx="6"/></clipPath>
            <g clip-path="url(#beltclip)">
              <g id="belt-stripes">
                <g fill="#1a1f33">
                  <rect x="-20" y="69" width="8" height="20"/><rect x="2" y="69" width="8" height="20"/>
                  <rect x="24" y="69" width="8" height="20"/><rect x="46" y="69" width="8" height="20"/>
                  <rect x="68" y="69" width="8" height="20"/><rect x="90" y="69" width="8" height="20"/>
                  <rect x="112" y="69" width="8" height="20"/><rect x="134" y="69" width="8" height="20"/>
                </g>
              </g>
            </g>
            <!-- Ruedas -->
            <circle cx="16" cy="100" r="7" fill="#3a3f55" stroke="#0e111c" stroke-width="2"/>
            <circle cx="106" cy="100" r="7" fill="#3a3f55" stroke="#0e111c" stroke-width="2"/>
          </svg>
          <div class="hint" style="left:calc(50% - 20px);top:-2px;transform:translateX(-50%)">🏃 Caminadora</div>
        </div>

        <!-- SACO DE BOXEO -->
        <div id="boxing-bag" class="machine" data-action="punch">
          <svg viewBox="0 0 78 230" width="100%" height="100%" style="overflow:visible">
            <!-- Soporte de techo -->
            <rect x="30" y="-16" width="18" height="16" rx="3" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <!-- Cadenas -->
            <g stroke="#777" stroke-width="2.5">
              <line x1="34" y1="0" x2="34" y2="20"/><line x1="44" y1="0" x2="44" y2="20"/>
            </g>
            <rect x="30" y="16" width="18" height="6" rx="2" fill="#2b3047" stroke="#11141f" stroke-width="2"/>
            <!-- Saco (balanceable) -->
            <g id="bag-swing">
              <g stroke="#7a1f1f" stroke-width="2.5">
                <path d="M22 22 Q39 14 56 22 L58 150 Q39 168 20 150 Z" fill="#c92f2f"/>
              </g>
              <!-- Brillo -->
              <path d="M28 30 Q26 80 30 140" stroke="#e85a5a" stroke-width="6" fill="none" opacity=".55" stroke-linecap="round"/>
              <!-- Cinta superior -->
              <rect x="24" y="24" width="30" height="9" fill="#1c1c28"/>
              <rect x="24" y="60" width="30" height="5" fill="#1c1c28" opacity=".8"/>
              <rect x="22" y="150" width="36" height="8" rx="3" fill="#1c1c28"/>
            </g>
          </svg>
          <div class="hint" style="left:50%;top:60px;transform:translateX(-50%)">🥊 Saco</div>
        </div>

        <!-- PERSONAJE -->
        <div id="character" style="width:59px;height:90px;left:125px;bottom:125px">
          <div id="char-shadow" style="width:48px"></div>
          <svg id="char-svg" viewBox="-12 -3 24 34" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">
            <ellipse class="boxer-shadow" cx="0" cy="18" rx="7" ry="2" fill="#000" fill-opacity="0.5"/>
            <g class="boxer-body">
              <rect class="leg-left" x="-4" y="20" width="4" height="8" rx="1" fill="#1a1a3a"/>
              <rect class="leg-right" x="0" y="20" width="4" height="8" rx="1" fill="#1a1a3a"/>
              <rect x="-5" y="8" width="10" height="12" rx="2" fill="#2255aa"/>
              <circle cx="0" cy="4" r="5" fill="#e0b090"/>
              <circle cx="-1.6" cy="2.3" r="1.1" fill="#fff" fill-opacity="0.22"/>
              <rect class="glove left"  x="-7" y="9" width="5" height="7" rx="2" fill="#1a3d80"/>
              <rect class="glove right" x="2"  y="9" width="5" height="7" rx="2" fill="#1a3d80"/>
            </g>
          </svg>
        </div>

        <!-- Capa de textos flotantes -->
        <div id="float-layer"></div>

        <!-- Botón cancelar -->
        <button id="cancel-btn">✕ DETENER</button>

        <!-- Panel del COLISEO -->
        <div id="coliseo-panel">
          <button id="lucha-btn" class="coliseo-card coliseo-option" type="button">
            <span class="coliseo-ico">🥊</span>
            <span>LUCHA</span>
          </button>
          <div class="coliseo-card coliseo-empty"></div>
          <div class="coliseo-card coliseo-empty"></div>
          <div class="coliseo-card coliseo-empty"></div>
        </div>

        <!-- Panel vacío de LUCHA -->
        <div id="lucha-panel"></div>
      </div>
    </div>

    <!-- ====================== PARTE INFERIOR ====================== -->
    <div id="bottom">
      <!-- Rejilla de estadísticas 3x2 -->
      <div id="stats-grid"></div>

      <!-- Menú principal -->
      <nav id="menu">
        <button class="menu-btn active" data-menu="ENTRENAR"><span class="m-ico">🏋️</span>ENTRENAR</button>
        <button class="menu-btn" data-menu="COLISEO"><span class="m-ico">⚔️</span>COLISEO</button>
        <button class="menu-btn" data-menu="EVENTOS"><span class="m-ico">🎉</span>EVENTOS</button>
        <button class="menu-btn" data-menu="CLANES"><span class="m-ico">🛡️</span>CLANES</button>
        <button class="menu-btn" data-menu="MISIONES"><span class="m-ico">📜</span>MISIONES</button>
        <button class="menu-btn" data-menu="TIENDA"><span class="m-ico">🛒</span>TIENDA</button>
      </nav>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script src="script.js" defer></script>
<script src="coliseo.js" defer></script>
<script src="lucha.js" defer></script>

</body>
</html>
