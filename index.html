<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Vertical Android</title>
    <style>
        /* Estilos para centrar el modelo en tu navegador */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222; /* Fondo gris oscuro fuera del modelo para contrastar */
            font-family: sans-serif;
            color: #fff;
        }

        /* Contenedor principal con las medidas exactas del dispositivo */
        .android-mockup {
            width: 393px;
            height: 793px;
            background-color: #000000; /* Fondo negro absoluto solicitado */
            outline: 2px solid #444; /* Borde visual sin restar pixeles al contenido */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* INICIO HUD – MODIFICACIÓN SOLICITADA */
        .hud-superior {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            width: 100%;
            height: 54px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 88px 1fr;
            align-items: stretch;
            gap: 6px;
            padding: 6px 8px;
            background: #000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
            pointer-events: none;
        }

        .hud-seccion {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            box-sizing: border-box;
        }

        .hud-hp {
            justify-content: flex-start;
            gap: 7px;
            padding: 0 7px;
        }

        .hud-hp-barra {
            flex: 1;
            height: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 8px;
            background: #2a0000;
        }

        .hud-hp-relleno {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #b90000, #ff3030);
            transition: width 0.2s ease;
        }

        .hud-hp-texto,
        .hud-recurso {
            white-space: nowrap;
            font-weight: 700;
            text-shadow: 0 1px 2px #000;
        }

        .hud-hp-texto {
            font-size: 12px;
            font-weight: 700;
        }

        .hud-identidad {
            flex-direction: column;
            gap: 2px;
            line-height: 1;
        }

        .hud-nombre {
            color: #f5f5f5;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .hud-nivel {
            color: #d8d8d8;
            font-size: 11px;
            font-weight: 700;
        }

        .hud-recursos {
            gap: 12px;
            padding: 0 8px;
        }
        /* FIN HUD */

        /* NUEVO: Barra superior negra independiente */
        .barra-superior-negra {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9;
            width: 100%;
            height: 18px;
            background: #000;
            pointer-events: none;
        }

        /* Primera división: exactamente 490px de alto */
        .seccion-superior {
            height: 490px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .escenario-recorte {
            --inicio-x: 7px;
            --inicio-y: 7px;
            --fin-x: 399px;
            --fin-y: 496px;
            width: calc(var(--fin-x) - var(--inicio-x) + 1px);
            height: calc(var(--fin-y) - var(--inicio-y) + 1px);
            position: relative;
            overflow: hidden;
            flex: none;
        }

        .escenario-recorte > img {
            position: absolute;
            left: calc(-1 * var(--inicio-x));
            top: calc(-1 * var(--inicio-y));
            max-width: none;
            width: auto;
            height: auto;
        }

        .personaje-recorte {
            --personaje-inicio-x: 5px;
            --personaje-inicio-y: 4px;
            --personaje-fin-x: 96px;
            --personaje-fin-y: 178px;
            position: absolute;
            left: 50%;
            top: 50%;
            width: calc(var(--personaje-fin-x) - var(--personaje-inicio-x) + 1px);
            height: calc(var(--personaje-fin-y) - var(--personaje-inicio-y) + 1px);
            overflow: hidden;
            transform: translate(-50%, calc(-50% + 60px));
            z-index: 1;
            pointer-events: none;
        }

        .personaje-recorte img {
            position: absolute;
            left: calc(-1 * var(--personaje-inicio-x));
            top: calc(-1 * var(--personaje-inicio-y));
            max-width: none;
            width: auto;
            height: auto;
        }

        /* MODIFICADO: Panel inferior con barra de info superior y 6 slots */
        .seccion-inferior {
            height: 303px;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(180deg, #080b12 0%, #0b0d13 48%, #08090d 100%);
            display: flex;
            flex-direction: column;
            padding: 10px 12px 12px 12px;
            gap: 10px;
        }

        /* NUEVO: Barra de información de zona/enemigo/nivel */
        .barra-info-inferior {
            width: 100%;
            height: 36px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: center;
            gap: 6px;
            padding: 0 8px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 2px #000;
            color: #e6ecf5;
        }

        .info-inferior-izquierda {
            justify-self: start;
            white-space: nowrap;
        }

        .info-inferior-centro {
            justify-self: center;
            white-space: nowrap;
            color: #ff6b6b;
        }

        .info-inferior-derecha {
            justify-self: end;
            white-space: nowrap;
        }

        .boton-proximamente {
            position: absolute;
            top: 73px;
            left: 50%;
            width: 56px;
            height: 56px;
            padding: 0;
            border: 2px solid rgba(255, 255, 255, 0.65);
            border-radius: 50%;
            background: linear-gradient(180deg, #31df61 0%, #148a34 100%);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.32), 0 5px 12px rgba(0, 0, 0, 0.45);
            color: #f4fff6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.2px;
            line-height: 1;
            transform: translateX(-50%);
            cursor: default;
        }

        /* MODIFICADO: Barra de navegación ocupa el espacio restante del panel inferior */
        .navegacion-inferior {
            width: 100%;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            box-sizing: border-box;
        }

        .boton-navegacion {
            min-width: 0;
            min-height: 0;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            background: var(--fondo-slot, linear-gradient(160deg, #1a2030 0%, #0f1420 100%));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 6px 14px rgba(0, 0, 0, 0.45);
            color: #e6ecf5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }

        .boton-navegacion:nth-child(1) { --fondo-slot: linear-gradient(160deg, #2a1420 0%, #140a10 100%); }
        .boton-navegacion:nth-child(2) { --fondo-slot: linear-gradient(160deg, #1c1a2e 0%, #0e0c1a 100%); }
        .boton-navegacion:nth-child(3) { --fondo-slot: linear-gradient(160deg, #14202e 0%, #0a121c 100%); }
        .boton-navegacion:nth-child(4) { --fondo-slot: linear-gradient(160deg, #2a2418 0%, #16120a 100%); }
        .boton-navegacion:nth-child(5) { --fondo-slot: linear-gradient(160deg, #142a1e 0%, #0a1610 100%); }
        .boton-navegacion:nth-child(6) { --fondo-slot: linear-gradient(160deg, #142630 0%, #0a141c 100%); }

        .boton-navegacion .icono-navegacion {
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 18px;
            line-height: 1;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.5));
        }



        /* Texto opcional para identificar las áreas */
        .etiqueta {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="android-mockup">
        <!-- NUEVO: Barra superior negra independiente -->
        <div class="barra-superior-negra" aria-hidden="true"></div>

        <!-- INICIO HUD – MODIFICACIÓN SOLICITADA -->
        <div class="hud-superior" aria-label="Estado del personaje">
            <div class="hud-seccion hud-hp" aria-label="Puntos de vida">
                <div class="hud-hp-barra">
                    <div class="hud-hp-relleno"></div>
                </div>
                <span class="hud-hp-texto">100/100</span>
            </div>

            <div class="hud-seccion hud-identidad" aria-label="Identidad del personaje">
                <span class="hud-nombre">SASUKE</span>
                <span class="hud-nivel">Lv. 1</span>
            </div>

            <button class="boton-proximamente" type="button" aria-label="Función aún no disponible">EMPEZAR</button>

            <div class="hud-seccion hud-recursos" aria-label="Recursos económicos del personaje">
                <span class="hud-recurso hud-oro">💰 0</span>
                <span class="hud-recurso hud-diamantes">💎 0</span>
            </div>
        </div>
        <!-- FIN HUD -->

        <!-- División hasta los 490px -->
        <div class="seccion-superior">
            <div class="escenario-recorte" aria-label="Recorte del escenario desde X 7, Y 7 hasta X 399, Y 496">
                <img src="assets/images/escenario/a1.webp" alt="Escenario recortado">
                <div class="personaje-recorte" aria-label="Personaje recortado desde X 5, Y 4 hasta X 96, Y 178">
                    <img src="assets/images/escenario/b1.webp" alt="Personaje recortado">
                </div>
            </div>
        </div>
        
        <!-- MODIFICADO: División con el espacio restante separada en dos mitades -->
        <div class="seccion-inferior">
            <!-- NUEVO: Barra de información de zona/enemigo/nivel -->
            <div class="barra-info-inferior" aria-label="Información de zona y enemigo">
                <span class="info-inferior-izquierda">🗺️ Zona 1</span>
                <span class="info-inferior-centro">ENEMIGO: 75 ⚔️</span>
                <span class="info-inferior-derecha">NIVEL: 1</span>
            </div>

            <!-- NUEVO: Barra de navegación inferior -->
            <nav class="navegacion-inferior" aria-label="Navegación principal del juego">
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">⚔️</span><span>Combate</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">🥷</span><span>Personaje</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">🛡️</span><span>Mazmorras</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">✨</span><span>Habilidades</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">⛩️</span><span>Clanes</span></div>
                <div class="boton-navegacion"><span class="icono-navegacion" aria-hidden="true">💎</span><span>Recursos</span></div>
            </nav>

        </div>
    </div>

    <script>
        // INICIO HUD – MODIFICACIÓN SOLICITADA
        const hudElementos = {
            barraVida: document.querySelector('.hud-hp-relleno'),
            textoVida: document.querySelector('.hud-hp-texto'),
            nivel: document.querySelector('.hud-nivel'),
            oro: document.querySelector('.hud-oro'),
            diamantes: document.querySelector('.hud-diamantes')
        };

        function obtenerEstadoPersonajeHUD() {
            return window.estadoPersonaje || window.personaje || window.sasuke || window.player || {};
        }

        function obtenerValorHUD(claves, valorPorDefecto) {
            const estadoPersonajeHUD = obtenerEstadoPersonajeHUD();

            for (const clave of claves) {
                if (estadoPersonajeHUD[clave] !== undefined) {
                    return estadoPersonajeHUD[clave];
                }

                if (window[clave] !== undefined) {
                    return window[clave];
                }
            }

            return valorPorDefecto;
        }

        function renderizarHUDPersonaje() {
            const estado = obtenerEstadoPersonajeHUD();

            const vida = obtenerValorHUD(['vida', 'hp', 'salud', 'vidaActual'], 100);
            const vidaMax = obtenerValorHUD(['vidaMax', 'vidaMaxima', 'hpMax', 'saludMax', 'maxHp'], 100);
            const nivel = obtenerValorHUD(['nivel', 'level'], 1);
            const oro = obtenerValorHUD(['oro', 'gold'], 0);
            const diamantes = obtenerValorHUD(['diamantes', 'diamonds'], 0);

            const porcentaje = Math.max(0, Math.min(100, (vida / vidaMax) * 100));

            if (hudElementos.barraVida) {
                hudElementos.barraVida.style.width = `${porcentaje}%`;
            }
            if (hudElementos.textoVida) {
                hudElementos.textoVida.textContent = `${vida}/${vidaMax}`;
            }
            hudElementos.nivel.textContent = `Lv. ${nivel}`;
            hudElementos.oro.textContent = `💰 ${oro}`;
            hudElementos.diamantes.textContent = `💎 ${diamantes}`;

            requestAnimationFrame(renderizarHUDPersonaje);
        }

        renderizarHUDPersonaje();
        // FIN HUD
    </script>
</body>
</html>
