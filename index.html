<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundo 3D - Exploración automática</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23167bd8'/%3E%3Ccircle cx='32' cy='34' r='22' fill='%234ba048'/%3E%3Cpath d='M10 42c12-7 31-7 44 0v10H10z' fill='%23d9c17b'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #071126;
      color: #f7fbff;
    }

    canvas {
      display: block;
    }

    /* El juego inicia sin elementos de interfaz ni cuadros de texto superpuestos. */
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7fc7ff);
    scene.fog = new THREE.FogExp2(0x8fd3ff, 0.0038);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1900);
    camera.position.set(0, 2.2, 14);

    const MAX_PIXEL_RATIO = 1.5;
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });

    function resizeRenderer() {
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    resizeRenderer();
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(36, 58, 22);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -420;
    sun.shadow.camera.right = 420;
    sun.shadow.camera.top = 420;
    sun.shadow.camera.bottom = -420;
    scene.add(sun);

    scene.add(new THREE.HemisphereLight(0xbce9ff, 0x55712e, 1.35));

    const world = new THREE.Group();
    scene.add(world);

    const ISLAND_SCALE = 0.75;
    const ISLAND_RADIUS = 321 * ISLAND_SCALE;
    const BEACH_START = 264 * ISLAND_SCALE;
    const COAST_START = 279 * ISLAND_SCALE;
    const OCEAN_RADIUS = 980;
    const WATER_LEVEL = -0.7;
    const HEIGHT_SCALE = 2.25;

    function scaled(value) {
      return value * ISLAND_SCALE;
    }

    function terrainSpace(x, z) {
      return { x: x / ISLAND_SCALE, z: z / ISLAND_SCALE };
    }

    function smoothstep(edge0, edge1, value) {
      const t = THREE.MathUtils.clamp((value - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function gaussian(x, z, centerX, centerZ, spread) {
      return Math.exp(-((x - centerX) ** 2 + (z - centerZ) ** 2) / spread);
    }

    function plainsBlend(x, z) {
      return Math.max(
        gaussian(x, z, -86, 50, 11600),
        gaussian(x, z, 118, 104, 15400),
        gaussian(x, z, 36, -140, 13900)
      );
    }

    function biomeBlend(x, z, centerX, centerZ, spread) {
      return gaussian(x, z, centerX, centerZ, spread);
    }

    function plateauBlend(x, z, centerX, centerZ, topRadius, edgeWidth) {
      const distance = Math.hypot(x - centerX, z - centerZ);
      return 1 - smoothstep(topRadius, topRadius + edgeWidth, distance);
    }

    function mountainRidge(x, z, centerX, centerZ, width, length, height, rotation = 0) {
      const cos = Math.cos(rotation);
      const sin = Math.sin(rotation);
      const localX = (x - centerX) * cos - (z - centerZ) * sin;
      const localZ = (x - centerX) * sin + (z - centerZ) * cos;
      const ridgeShape = Math.exp(-(localX ** 2) / width) * Math.exp(-(localZ ** 2) / length);
      const crags = 0.72 + Math.abs(Math.sin(localZ * 0.085)) * 0.36 + Math.max(0, Math.sin((localX - localZ) * 0.06)) * 0.22;
      return ridgeShape * crags * height;
    }

    function biomeAt(x, z) {
      const distance = Math.hypot(x, z);
      const height = terrainHeight(x, z);
      const { x: terrainX, z: terrainZ } = terrainSpace(x, z);
      if (distance > BEACH_START || height < WATER_LEVEL + 1.25) return 'beach';
      if (height > WATER_LEVEL + 36 || biomeBlend(terrainX, terrainZ, -130, 120, 7200) > 0.62) return 'alpine';
      if (height > WATER_LEVEL + 24) return 'rock';
      if (biomeBlend(terrainX, terrainZ, 162, 116, 9800) > 0.42) return 'desert';
      if (biomeBlend(terrainX, terrainZ, -166, -118, 10500) > 0.42) return 'swamp';
      if (biomeBlend(terrainX, terrainZ, -178, 152, 11200) > 0.38) return 'jungle';
      if (biomeBlend(terrainX, terrainZ, 128, -166, 8800) > 0.43) return 'tundra';
      if (x > scaled(62) && z < scaled(-42)) return 'savanna';
      if (x < scaled(-68) && z > scaled(36)) return 'forest';
      if (plainsBlend(terrainX, terrainZ) > 0.46) return 'plains';
      return 'grassland';
    }

    function terrainHeight(x, z) {
      const distance = Math.hypot(x, z);
      const { x: terrainX, z: terrainZ } = terrainSpace(x, z);
      const beachBlend = smoothstep(BEACH_START, ISLAND_RADIUS, distance);
      const inland = THREE.MathUtils.clamp((ISLAND_RADIUS - distance) / (ISLAND_RADIUS - COAST_START), 0, 1);
      const shorelineBlend = inland * inland * (3 - 2 * inland);
      const rollingHills = Math.sin(terrainX * 0.024) * 1.35 + Math.cos(terrainZ * 0.027) * 1.2 + Math.sin((terrainX + terrainZ) * 0.015) * 1.75;
      const sharpRidges = Math.abs(Math.sin((terrainX - terrainZ) * 0.035)) * 2.2 + Math.max(0, Math.sin((terrainX + terrainZ) * 0.03)) * 1.4;
      const mountainA = gaussian(terrainX, terrainZ, -118, 88, 2475) * 17.4;
      const mountainB = gaussian(terrainX, terrainZ, 108, -123, 2205) * 15.6;
      const mountainC = gaussian(terrainX, terrainZ, -196, 142, 3600) * 12.4;
      const mountainD = mountainRidge(terrainX, terrainZ, 42, 92, 940, 9800, 12.8, -0.55);
      const mountainE = mountainRidge(terrainX, terrainZ, -62, -178, 760, 7200, 10.6, 0.78);
      const plateauNorth = plateauBlend(terrainX, terrainZ, -36, 154, 25, 20);
      const plateauEast = plateauBlend(terrainX, terrainZ, 178, 24, 22, 18);
      const plateauSouth = plateauBlend(terrainX, terrainZ, -128, -132, 18, 16);
      const plateauShelves = plateauNorth * 9.8 + plateauEast * 7.6 + plateauSouth * 6.3;
      const valleyA = gaussian(terrainX, terrainZ, 15, 27, 11700) * 3.9;
      const canyonA = Math.exp(-((terrainX + terrainZ * 0.38 - 30) ** 2) / 105) * Math.exp(-((terrainX * 0.3 - terrainZ - 27) ** 2) / 37125) * 7.2;
      const wetlands = biomeBlend(terrainX, terrainZ, -166, -118, 10500) * 2.8;
      const dunes = biomeBlend(terrainX, terrainZ, 162, 116, 9800) * (Math.sin(terrainX * 0.052) + Math.cos(terrainZ * 0.047)) * 0.9;
      const plains = plainsBlend(terrainX, terrainZ);
      const roughTerrain = 2.5 + rollingHills + sharpRidges + mountainA + mountainB + mountainC + mountainD + mountainE + plateauShelves - valleyA - canyonA - wetlands + dunes;
      const plateauMask = Math.max(plateauNorth, plateauEast, plateauSouth);
      const plateauLevel = 12.2 + plateauNorth * 4.5 + plateauEast * 2.2 + plateauSouth * 1.2;
      const terracedTerrain = THREE.MathUtils.lerp(roughTerrain, plateauLevel, THREE.MathUtils.clamp(plateauMask * 0.86, 0, 0.86));
      const flatTerrain = 2.1 + Math.sin(terrainX * 0.018) * 0.35 + Math.cos(terrainZ * 0.016) * 0.28;
      const blendedTerrain = THREE.MathUtils.lerp(terracedTerrain, flatTerrain, THREE.MathUtils.clamp(plains * 0.82 * (1 - plateauMask), 0, 0.82));
      const beachShelf = 0.42 + Math.sin(terrainX * 0.018) * 0.12 + Math.cos(terrainZ * 0.017) * 0.1;
      const islandTerrain = THREE.MathUtils.lerp(blendedTerrain, beachShelf, beachBlend);
      const height = WATER_LEVEL + 0.32 + shorelineBlend * islandTerrain * HEIGHT_SCALE;
      return Math.max(WATER_LEVEL + 0.12, height);
    }

    function terrainSlope(x, z) {
      const sampleDistance = 2.8;
      const dx = Math.abs(terrainHeight(x + sampleDistance, z) - terrainHeight(x - sampleDistance, z));
      const dz = Math.abs(terrainHeight(x, z + sampleDistance) - terrainHeight(x, z - sampleDistance));
      return Math.max(dx, dz) / (sampleDistance * 2);
    }

    function groundY(x, z, offset = 0) {
      return terrainHeight(x, z) + offset;
    }

    function terrainColor(x, z) {
      const biome = biomeAt(x, z);
      const slope = terrainSlope(x, z);
      if (biome === 'beach') return new THREE.Color(0xd9c17b);
      if (biome === 'alpine') return new THREE.Color(0xdce8ee);
      if (biome === 'rock' || slope > 1.55) return new THREE.Color(0x80877d);
      if (biome === 'forest') return new THREE.Color(0x245f33);
      if (biome === 'jungle') return new THREE.Color(0x166b3d);
      if (biome === 'swamp') return new THREE.Color(0x456b3d);
      if (biome === 'desert') return new THREE.Color(0xd7ad59);
      if (biome === 'tundra') return new THREE.Color(0xb8c7bd);
      if (biome === 'savanna') return new THREE.Color(0xb6a34b);
      if (biome === 'plains') return new THREE.Color(0x72b957);
      return new THREE.Color(0x4ba048);
    }

    const oceanMaterial = new THREE.MeshStandardMaterial({
      color: 0x167bd8,
      roughness: 0.2,
      metalness: 0.18,
      transparent: true,
      opacity: 0.76
    });
    const water = new THREE.Mesh(new THREE.CircleGeometry(OCEAN_RADIUS, 192), oceanMaterial);
    water.rotation.x = -Math.PI / 2;
    water.position.y = WATER_LEVEL;
    water.receiveShadow = true;
    world.add(water);

    function createTerrainRingGeometry(innerRadius, outerRadius, rings = 12, segments = 192, offset = 0.035) {
      const vertices = [];
      const indices = [];
      for (let ring = 0; ring <= rings; ring++) {
        const radius = THREE.MathUtils.lerp(innerRadius, outerRadius, ring / rings);
        for (let segment = 0; segment < segments; segment++) {
          const angle = (segment / segments) * Math.PI * 2;
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;
          vertices.push(x, groundY(x, z, offset), z);
        }
      }

      const vertexIndex = (ring, segment) => ring * segments + ((segment + segments) % segments);
      for (let ring = 1; ring <= rings; ring++) {
        for (let segment = 0; segment < segments; segment++) {
          const innerA = vertexIndex(ring - 1, segment);
          const innerB = vertexIndex(ring - 1, segment + 1);
          const outerA = vertexIndex(ring, segment);
          const outerB = vertexIndex(ring, segment + 1);
          indices.push(innerA, outerA, outerB, innerA, outerB, innerB);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return geometry;
    }

    const shore = new THREE.Mesh(
      createTerrainRingGeometry(BEACH_START - 10, ISLAND_RADIUS - 1),
      new THREE.MeshStandardMaterial({ color: 0xd9c17b, roughness: 0.92 })
    );
    shore.receiveShadow = true;
    world.add(shore);

    function createIslandGeometry(radius, rings = 128, segments = 288) {
      const vertices = [0, terrainHeight(0, 0), 0];
      const centerColor = terrainColor(0, 0);
      const colors = [centerColor.r, centerColor.g, centerColor.b];
      const indices = [];

      for (let ring = 1; ring <= rings; ring++) {
        const ringRadius = (ring / rings) * radius;
        for (let segment = 0; segment < segments; segment++) {
          const angle = (segment / segments) * Math.PI * 2;
          const x = Math.cos(angle) * ringRadius;
          const z = Math.sin(angle) * ringRadius;
          vertices.push(x, terrainHeight(x, z), z);
          const color = terrainColor(x, z);
          colors.push(color.r, color.g, color.b);
        }
      }

      const vertexIndex = (ring, segment) => 1 + (ring - 1) * segments + ((segment + segments) % segments);
      for (let segment = 0; segment < segments; segment++) {
        indices.push(0, vertexIndex(1, segment), vertexIndex(1, segment + 1));
      }

      for (let ring = 2; ring <= rings; ring++) {
        for (let segment = 0; segment < segments; segment++) {
          const innerA = vertexIndex(ring - 1, segment);
          const innerB = vertexIndex(ring - 1, segment + 1);
          const outerA = vertexIndex(ring, segment);
          const outerB = vertexIndex(ring, segment + 1);
          indices.push(innerA, outerA, outerB, innerA, outerB, innerB);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return geometry;
    }

    const groundMaterial = new THREE.MeshStandardMaterial({ roughness: 0.94, side: THREE.DoubleSide, vertexColors: true });
    const ground = new THREE.Mesh(createIslandGeometry(ISLAND_RADIUS, 128, 288), groundMaterial);
    ground.receiveShadow = true;
    world.add(ground);

    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x5c6171, roughness: 0.86 });
    const roadGroup = new THREE.Group();
    const roadAngle = -0.26;
    const roadLength = scaled(450);
    const roadSegments = 44;
    for (let i = 0; i < roadSegments; i++) {
      const localZ = -roadLength / 2 + (i + 0.5) * (roadLength / roadSegments);
      const x = scaled(9) + Math.sin(roadAngle) * localZ;
      const z = scaled(-3) + Math.cos(roadAngle) * localZ;
      if (Math.hypot(x, z) > BEACH_START - 10) continue;
      const road = new THREE.Mesh(new THREE.BoxGeometry(8, 0.12, roadLength / roadSegments + 0.25), roadMaterial);
      road.position.set(x, groundY(x, z, 0.08), z);
      road.rotation.y = roadAngle;
      road.receiveShadow = true;
      roadGroup.add(road);
    }
    world.add(roadGroup);

    const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x7a4a24, roughness: 0.8 });
    const palmTrunkMaterial = new THREE.MeshStandardMaterial({ color: 0x9b6a35, roughness: 0.82 });
    const leafMaterials = [0x1f7d3a, 0x2fa84f, 0x4bbf58].map(color => new THREE.MeshStandardMaterial({ color, roughness: 0.78 }));
    const pineMaterial = new THREE.MeshStandardMaterial({ color: 0x174f38, roughness: 0.82 });
    const dryLeafMaterial = new THREE.MeshStandardMaterial({ color: 0x9f9a3a, roughness: 0.86 });
    const palmLeafMaterial = new THREE.MeshStandardMaterial({ color: 0x2f9b55, roughness: 0.78 });
    const jungleLeafMaterial = new THREE.MeshStandardMaterial({ color: 0x0f8a4d, roughness: 0.8 });
    const swampLeafMaterial = new THREE.MeshStandardMaterial({ color: 0x315b35, roughness: 0.88 });
    const cactusMaterial = new THREE.MeshStandardMaterial({ color: 0x2f8f4e, roughness: 0.86 });

    function createTree(x, z, scale = 1, biome = biomeAt(x, z)) {
      const tree = new THREE.Group();

      if (biome === 'desert') {
        const cactus = new THREE.Mesh(new THREE.CylinderGeometry(0.28 * scale, 0.34 * scale, 3.2 * scale, 9), cactusMaterial);
        cactus.position.y = 1.6 * scale;
        cactus.castShadow = true;
        tree.add(cactus);

        [-1, 1].forEach(side => {
          const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * scale, 0.18 * scale, 1.25 * scale, 8), cactusMaterial);
          arm.position.set(side * 0.48 * scale, 2.15 * scale, 0);
          arm.rotation.z = Math.PI / 2;
          arm.castShadow = true;
          tree.add(arm);
        });
      } else if (biome === 'beach') {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14 * scale, 0.24 * scale, 3.3 * scale, 8), palmTrunkMaterial);
        trunk.position.y = 1.65 * scale;
        trunk.rotation.z = (Math.random() - 0.5) * 0.22;
        trunk.castShadow = true;
        tree.add(trunk);

        for (let i = 0; i < 5; i++) {
          const frond = new THREE.Mesh(new THREE.ConeGeometry(0.26 * scale, 2.8 * scale, 6), palmLeafMaterial);
          frond.position.y = 3.35 * scale;
          frond.rotation.z = Math.PI / 2.8;
          frond.rotation.y = (i / 5) * Math.PI * 2;
          frond.castShadow = true;
          tree.add(frond);
        }
      } else {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22 * scale, 0.34 * scale, 2.6 * scale, 8), trunkMaterial);
        trunk.position.y = 1.3 * scale;
        trunk.castShadow = true;
        tree.add(trunk);

        const isPine = biome === 'forest' || biome === 'alpine' || biome === 'rock' || biome === 'tundra';
        const leaves = new THREE.Mesh(
          new THREE.ConeGeometry((isPine ? 1.2 : 1.35) * scale, (isPine ? 4.2 : 3.6) * scale, 10),
          isPine ? pineMaterial : (biome === 'savanna' ? dryLeafMaterial : (biome === 'jungle' ? jungleLeafMaterial : (biome === 'swamp' ? swampLeafMaterial : leafMaterials[Math.floor(Math.random() * leafMaterials.length)])))
        );
        leaves.position.y = (isPine ? 3.55 : 3.35) * scale;
        leaves.castShadow = true;
        tree.add(leaves);
      }

      tree.position.set(x, groundY(x, z, -0.06), z);
      world.add(tree);
    }

    let plantedTrees = 0;
    let treeAttempts = 0;
    const MAX_TREES = 520;
    const MAX_TREE_ATTEMPTS = 2200;
    while (plantedTrees < MAX_TREES && treeAttempts < MAX_TREE_ATTEMPTS) {
      treeAttempts++;
      const angle = Math.random() * Math.PI * 2;
      const radius = 18 + Math.random() * (ISLAND_RADIUS - 28);
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      const biome = biomeAt(x, z);
      const maxSlope = biome === 'beach' || biome === 'plains' || biome === 'swamp' || biome === 'desert' ? 0.7 : 1.2;
      if (Math.abs(x - scaled(9)) > scaled(10) && Math.hypot(x + scaled(38), z + scaled(26)) > scaled(31) && terrainSlope(x, z) < maxSlope && biome !== 'rock' && biome !== 'alpine') {
        const biomeScale = biome === 'beach' ? 0.9 : (biome === 'forest' || biome === 'jungle' ? 1.08 : (biome === 'desert' ? 0.78 : 1));
        createTree(x, z, (0.65 + Math.random() * 1.05) * biomeScale, biome);
        plantedTrees++;
      }
    }

    const reliefRockMaterial = new THREE.MeshStandardMaterial({ color: 0x6f756d, roughness: 0.96 });
    const reliefGroundMaterial = new THREE.MeshStandardMaterial({ color: 0x4f9a48, roughness: 0.94 });
    function createReliefCluster(x, z, scale = 1) {
      const reliefCluster = new THREE.Group();
      reliefCluster.position.set(x, groundY(x, z, -0.1), z);
      reliefCluster.rotation.y = Math.random() * Math.PI;

      const hill = new THREE.Mesh(new THREE.ConeGeometry(9 * scale, 4.8 * scale, 18), reliefGroundMaterial);
      hill.position.y = 1.05 * scale;
      hill.castShadow = true;
      hill.receiveShadow = true;
      reliefCluster.add(hill);

      for (let i = 0; i < 5; i++) {
        const rockRadius = (0.55 + Math.random() * 0.55) * scale;
        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(rockRadius), reliefRockMaterial);
        const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.4;
        const distance = (2.2 + Math.random() * 2.7) * scale;
        const localX = Math.cos(angle) * distance;
        const localZ = Math.sin(angle) * distance;
        const localGround = groundY(x + localX, z + localZ, rockRadius * 0.52) - reliefCluster.position.y;
        rock.position.set(localX, localGround, localZ);
        rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        rock.castShadow = true;
        rock.receiveShadow = true;
        reliefCluster.add(rock);
      }

      world.add(reliefCluster);
    }

    [[-168, 105, 1.7], [156, -102, 1.45], [12, -186, 1.15], [204, 54, 1.05], [-238, -96, 1.25], [232, 136, 1.1], [-36, 154, 1.55], [178, 24, 1.35]].forEach(([x, z, scale]) => createReliefCluster(scaled(x), scaled(z), scale));

    const wallMaterials = [0xffd166, 0xef476f, 0x54c6eb, 0x9b5de5].map(color => new THREE.MeshStandardMaterial({ color, roughness: 0.65 }));
    const roofMaterial = new THREE.MeshStandardMaterial({ color: 0x26324d, roughness: 0.72 });
    const foundationMaterial = new THREE.MeshStandardMaterial({ color: 0x6a6f78, roughness: 0.9 });

    function createHouse(x, z, colorIndex = 0) {
      const house = new THREE.Group();
      const foundation = new THREE.Mesh(new THREE.BoxGeometry(6.7, 0.8, 6.7), foundationMaterial);
      foundation.position.y = 0.25;
      foundation.castShadow = true;
      foundation.receiveShadow = true;
      house.add(foundation);

      const base = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 6), wallMaterials[colorIndex % wallMaterials.length]);
      base.position.y = 2.4;
      base.castShadow = true;
      base.receiveShadow = true;
      house.add(base);

      const roof = new THREE.Mesh(new THREE.ConeGeometry(5.2, 2.6, 4), roofMaterial);
      roof.position.y = 5.65;
      roof.rotation.y = Math.PI / 4;
      roof.castShadow = true;
      house.add(roof);

      const door = new THREE.Mesh(new THREE.BoxGeometry(1.25, 2.2, 0.08), new THREE.MeshStandardMaterial({ color: 0x1c2338 }));
      door.position.set(0, 1.45, 3.04);
      house.add(door);

      house.position.set(x, groundY(x, z, -0.22), z);
      house.rotation.y = Math.random() * 0.5 - 0.25;
      world.add(house);
    }

    [[-52, 32], [-20, 48], [60, -44], [88, 24], [-76, -20], [124, -76], [-124, 84], [144, 60], [26, 118], [-152, -58], [206, 118], [-224, -122], [188, -168], [-196, 156], [42, 214]].forEach(([x, z], index) => createHouse(scaled(x), scaled(z), index));

    const platformMaterial = new THREE.MeshStandardMaterial({ color: 0xd89a4b, roughness: 0.72 });
    for (let i = 0; i < 24; i++) {
      const x = scaled(-123 + i * 12);
      const z = scaled(156 + Math.sin(i) * 22);
      if (Math.hypot(x, z) > ISLAND_RADIUS - 18 || terrainSlope(x, z) > 0.9) continue;
      const platform = new THREE.Mesh(new THREE.BoxGeometry(5, 0.6, 5), platformMaterial);
      platform.position.set(x, groundY(x, z, 0.3), z);
      platform.castShadow = true;
      platform.receiveShadow = true;
      world.add(platform);
    }

    const playerBody = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.42, 1.15, 4, 10),
      new THREE.MeshStandardMaterial({ color: 0x243bff, roughness: 0.5 })
    );
    playerBody.castShadow = true;
    playerBody.visible = false;
    scene.add(playerBody);

    const keys = new Set();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    const forward = new THREE.Vector3();
    const right = new THREE.Vector3();
    const playerBodyOffset = new THREE.Vector3();
    const playerPosition = camera.position.clone();
    let yaw = 0;
    let pitch = 0;
    let smoothYaw = 0;
    let smoothPitch = 0;
    let isLocked = false;
    let canJump = false;
    let isFlying = false;
    let currentEyeHeight = 2.15;
    const STAND_EYE_HEIGHT = 2.15;
    const CROUCH_EYE_HEIGHT = 1.18;
    const WALK_SPEED = 9.8;
    const SPRINT_SPEED = 16.5;
    const CROUCH_SPEED = 4.8;
    const FLY_SPEED = 14.5;
    const FLY_SPRINT_SPEED = 24;
    const AUTO_EXPLORE_SPEED = 12.4;
    const AUTO_EXPLORE_LOOK_AHEAD = 10;
    const AUTO_EXPLORE_REACH_DISTANCE = 5.5;
    const CAMERA_POSITION_SMOOTHING = 16;
    const CAMERA_ROTATION_SMOOTHING = 24;
    let autoExploreEnabled = true;
    let autoExploreWaypointIndex = 0;

    function createAutoExploreWaypoints() {
      const waypoints = [{ x: 0, z: 0 }];
      const rings = [0.18, 0.34, 0.5, 0.66, 0.82, 0.95];
      rings.forEach((ring, ringIndex) => {
        const radius = (BEACH_START - 16) * ring;
        const pointCount = 8 + ringIndex * 4;
        const angleOffset = ringIndex * 0.47;
        for (let i = 0; i < pointCount; i++) {
          const angle = angleOffset + (i / pointCount) * Math.PI * 2;
          waypoints.push({
            x: Math.cos(angle) * radius,
            z: Math.sin(angle) * radius
          });
        }
      });
      waypoints.push({ x: 0, z: 0 });
      return waypoints;
    }

    const autoExploreWaypoints = createAutoExploreWaypoints();

    function hasManualMovementInput() {
      return keys.has('KeyW') || keys.has('KeyA') || keys.has('KeyS') || keys.has('KeyD');
    }

    document.addEventListener('click', () => {
      if (document.pointerLockElement !== document.body) {
        document.body.requestPointerLock();
      }
    });

    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === document.body;
    });

    document.addEventListener('mousemove', event => {
      if (!isLocked) return;
      yaw -= event.movementX * 0.0022;
      pitch -= event.movementY * 0.0022;
      pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
    });

    document.addEventListener('keydown', event => {
      if (['Space', 'ControlLeft', 'ControlRight', 'KeyP'].includes(event.code)) {
        event.preventDefault();
      }
      if (event.code === 'KeyP' && !event.repeat) {
        isFlying = !isFlying;
        velocity.y = 0;
        canJump = !isFlying;
      }
      if (event.code === 'KeyO' && !event.repeat) {
        autoExploreEnabled = !autoExploreEnabled;
        velocity.x = 0;
        velocity.z = 0;
      }
      keys.add(event.code);
      const isCrouching = keys.has('ControlLeft') || keys.has('ControlRight') || keys.has('KeyC');
      if (event.code === 'Space' && canJump && !isCrouching && !isFlying) {
        velocity.y = 8.2;
        canJump = false;
      }
    });

    document.addEventListener('keyup', event => keys.delete(event.code));

    const clock = new THREE.Clock();

    function updatePlayer(delta) {
      const wantsCrouchOrDescend = keys.has('ControlLeft') || keys.has('ControlRight') || keys.has('KeyC');
      const isCrouching = !isFlying && wantsCrouchOrDescend;
      const isSprinting = !isCrouching && (keys.has('ShiftLeft') || keys.has('ShiftRight'));
      const speed = isFlying ? (isSprinting ? FLY_SPRINT_SPEED : FLY_SPEED) : (isCrouching ? CROUCH_SPEED : (isSprinting ? SPRINT_SPEED : WALK_SPEED));
      currentEyeHeight = THREE.MathUtils.lerp(currentEyeHeight, isCrouching ? CROUCH_EYE_HEIGHT : STAND_EYE_HEIGHT, 1 - Math.exp(-12 * delta));

      direction.set(0, 0, 0);
      const manualMovementInput = hasManualMovementInput();
      const isAutoExploring = autoExploreEnabled && !manualMovementInput;

      if (isAutoExploring) {
        let target = autoExploreWaypoints[autoExploreWaypointIndex];
        let targetDistance = Math.hypot(target.x - playerPosition.x, target.z - playerPosition.z);
        if (targetDistance < AUTO_EXPLORE_REACH_DISTANCE) {
          autoExploreWaypointIndex = (autoExploreWaypointIndex + 1) % autoExploreWaypoints.length;
          target = autoExploreWaypoints[autoExploreWaypointIndex];
          targetDistance = Math.hypot(target.x - playerPosition.x, target.z - playerPosition.z);
        }

        if (targetDistance > 0.001) {
          const moveX = (target.x - playerPosition.x) / targetDistance;
          const moveZ = (target.z - playerPosition.z) / targetDistance;
          const nextX = playerPosition.x + moveX * AUTO_EXPLORE_SPEED * delta;
          const nextZ = playerPosition.z + moveZ * AUTO_EXPLORE_SPEED * delta;
          playerPosition.x = nextX;
          playerPosition.z = nextZ;
          const lookX = playerPosition.x + moveX * AUTO_EXPLORE_LOOK_AHEAD;
          const lookZ = playerPosition.z + moveZ * AUTO_EXPLORE_LOOK_AHEAD;
          yaw = Math.atan2(playerPosition.x - lookX, playerPosition.z - lookZ);
          const terrainDelta = groundY(lookX, lookZ, currentEyeHeight) - groundY(playerPosition.x, playerPosition.z, currentEyeHeight);
          pitch = THREE.MathUtils.clamp(-terrainDelta * 0.035 - 0.08, -0.42, 0.28);
        }
      } else {
        if (keys.has('KeyW')) direction.z += 1;
        if (keys.has('KeyS')) direction.z -= 1;
        if (keys.has('KeyA')) direction.x -= 1;
        if (keys.has('KeyD')) direction.x += 1;
        direction.normalize();

        forward.set(-Math.sin(yaw), 0, -Math.cos(yaw));
        right.set(Math.cos(yaw), 0, -Math.sin(yaw));
        playerPosition.addScaledVector(forward, direction.z * speed * delta);
        playerPosition.addScaledVector(right, direction.x * speed * delta);
      }

      const playerRadius = Math.hypot(playerPosition.x, playerPosition.z);
      const maxRadius = ISLAND_RADIUS - 4;
      if (playerRadius > maxRadius) {
        const correction = maxRadius / playerRadius;
        playerPosition.x *= correction;
        playerPosition.z *= correction;
      }

      if (isFlying) {
        const verticalDirection = (keys.has('Space') ? 1 : 0) - (wantsCrouchOrDescend ? 1 : 0);
        playerPosition.y += verticalDirection * speed * delta;
        playerPosition.y = THREE.MathUtils.clamp(playerPosition.y, groundY(playerPosition.x, playerPosition.z, STAND_EYE_HEIGHT + 0.35), WATER_LEVEL + 150);
        velocity.y = 0;
        canJump = false;
      } else {
        velocity.y -= 22 * delta;
        playerPosition.y += velocity.y * delta;

        const playerGroundY = groundY(playerPosition.x, playerPosition.z, currentEyeHeight);
        if (playerPosition.y < playerGroundY) {
          playerPosition.y = playerGroundY;
          velocity.y = 0;
          canJump = true;
        }
      }

      const positionBlend = 1 - Math.exp(-CAMERA_POSITION_SMOOTHING * delta);
      camera.position.lerp(playerPosition, positionBlend);
      smoothYaw = THREE.MathUtils.lerp(smoothYaw, yaw, 1 - Math.exp(-CAMERA_ROTATION_SMOOTHING * delta));
      smoothPitch = THREE.MathUtils.lerp(smoothPitch, pitch, 1 - Math.exp(-CAMERA_ROTATION_SMOOTHING * delta));
      camera.rotation.set(smoothPitch, smoothYaw, 0, 'YXZ');

      playerBody.scale.y = isCrouching ? 0.58 : 1;
      playerBodyOffset.set(0, -currentEyeHeight + 0.55, 0);
      playerBody.position.copy(playerPosition).add(playerBodyOffset);
    }

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.05);
      updatePlayer(delta);
      water.material.opacity = 0.62 + Math.sin(clock.elapsedTime * 1.8) * 0.06;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      resizeRenderer();
    });

    animate();
  </script>
</body>
</html>
