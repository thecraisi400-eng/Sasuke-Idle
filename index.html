<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinobi Character Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-void:     #060910;
  --bg-glass:    rgba(9,15,26,0.92);
  --border-dim:  rgba(0,245,255,0.10);
  --border-mid:  rgba(0,245,255,0.22);
  --cyan:        #00f5ff;
  --gold:        #ffc83c;
  --red-neon:    #ff2244;
  --green-neon:  #39ff8a;
  --blue-el:     #1e90ff;
  --text-hi:     #eaf4ff;
  --text-mid:    rgba(175,210,240,0.72);
  --text-lo:     rgba(110,155,195,0.50);
  --f-ui:        'Rajdhani', sans-serif;
  --f-hud:       'Orbitron', sans-serif;
}

body {
  background: var(--bg-void);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: var(--f-ui);
  color: var(--text-hi);
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 45% at 15% 20%, rgba(0,245,255,0.046) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 75%, rgba(255,200,60,0.028) 0%, transparent 70%),
    repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(0,245,255,0.016) 39px, rgba(0,245,255,0.016) 40px),
    repeating-linear-gradient(90deg,  transparent, transparent 39px, rgba(0,245,255,0.013) 39px, rgba(0,245,255,0.013) 40px);
  pointer-events: none; z-index: 0;
}

.sheet {
  width: 340px; height: 390px;
  background: var(--bg-glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-dim);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  position: relative; z-index: 1;
  overflow: hidden;
  animation: fadeIn .55s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:scale(.97) translateY(8px)} to{opacity:1;transform:none} }

.c { position:absolute; width:13px; height:13px; pointer-events:none; }
.c.tl{top:4px;left:4px; border-top:1.5px solid rgba(0,245,255,.48); border-left:1.5px solid rgba(0,245,255,.48);}
.c.tr{top:4px;right:4px; border-top:1.5px solid rgba(0,245,255,.48); border-right:1.5px solid rgba(0,245,255,.48);}
.c.bl{bottom:4px;left:4px; border-bottom:1.5px solid rgba(0,245,255,.48); border-left:1.5px solid rgba(0,245,255,.48);}
.c.br{bottom:4px;right:4px; border-bottom:1.5px solid rgba(0,245,255,.48); border-right:1.5px solid rgba(0,245,255,.48);}

.col-right {
  display: flex;
  flex-direction: column;
  flex: 1;
  height: 100%;
}

/* ── gear section — sin header de oro, más espacio para el grid ── */
.sec-gear {
  padding: 10px 10px 8px;
  flex-shrink: 0;
}

/* grid 3×2 — slots más altos ahora que no hay gold-tag */
.gear-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 84px);
  gap: 6px;
}

.gear-slot {
  border-radius: 7px;
  border: 1.5px solid var(--sb, rgba(100,130,160,.3));
  background: var(--sbg, rgba(10,18,30,.6));
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  position: relative; overflow: hidden;
  transition: transform .17s ease, box-shadow .18s ease;
}
.gear-slot:hover   { transform:translateY(-2px) scale(1.04); box-shadow:0 4px 18px var(--sg,rgba(0,245,255,.25)); z-index:2; }
.gear-slot:active  { transform:scale(.97); }
.gear-slot::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 55%); pointer-events:none; }

.s-icon  { font-size: 28px; line-height:1; filter:drop-shadow(0 0 5px var(--sg,rgba(0,245,255,.4))); }
.s-name  { font-size: 8.5px; font-weight:700; color:var(--text-mid); text-align:center; line-height:1.1; padding:0 3px; }
.s-lv    { font-family:var(--f-hud); font-size:9px; font-weight:700; color:var(--sc,var(--cyan)); text-shadow:0 0 5px var(--sg,rgba(0,245,255,.5)); }

.legendary-aura {
  position:absolute; inset:-1px; border-radius:8px; pointer-events:none;
  animation:legP 1.6s ease-in-out infinite alternate;
}
@keyframes legP {
  from{box-shadow:0 0 9px rgba(231,76,60,.55),0 0 18px rgba(255,200,60,.18);}
  to  {box-shadow:0 0 18px rgba(231,76,60,.85),0 0 30px rgba(255,200,60,.4);}
}
.gear-slot.legendary .particle {
  position:absolute; width:2px; height:2px; border-radius:50%;
  background:var(--gold); box-shadow:0 0 4px var(--gold);
  animation:pF var(--dur,2s) var(--delay,0s) ease-in-out infinite alternate; opacity:.7;
}
@keyframes pF{
  from{transform:translate(var(--tx,0px),var(--ty,0px));opacity:.2;}
  to  {transform:translate(calc(var(--tx,0px) + var(--dx,4px)),calc(var(--ty,0px) - 9px));opacity:.9;}
}

.h-div { height:1px; margin:0 10px; background:linear-gradient(to right,transparent,rgba(0,245,255,.22),transparent); flex-shrink:0; }

.sec-stats {
  flex:1; display:flex; flex-direction:column;
  padding:7px 10px 8px; gap:4px;
  overflow:hidden;
}

.stats-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px 6px;
  flex:1;
}

.stat-row {
  display:flex; align-items:center; gap:5px;
  background:rgba(0,245,255,.03);
  border:1px solid rgba(0,245,255,.09);
  border-radius:5px;
  padding:4px 7px;
}
.st-icon { font-size: 15px; line-height:1; flex-shrink:0; }
.st-key  { font-size: 10px; font-weight:700; color:var(--text-mid); text-transform:uppercase; letter-spacing:.3px; }
.st-val  { font-family:var(--f-hud); font-size:11px; font-weight:700; color:var(--text-hi); margin-left:auto; }
.st-val.crit  { color:var(--red-neon);  text-shadow:0 0 5px rgba(255,34,68,.45); }
.st-val.good  { color:var(--green-neon);}
.st-val.speed { color:var(--cyan);       text-shadow:0 0 5px rgba(0,245,255,.35); }

/* ─── MODAL ─── */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(3,7,16,.88); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; opacity:0; pointer-events:none;
  transition:opacity .22s ease;
}
.modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
  width: 290px;
  background: linear-gradient(160deg, rgba(8,16,34,.98) 0%, rgba(4,10,22,.98) 100%);
  border: 1px solid rgba(0,245,255,.18);
  border-radius: 14px;
  padding: 0;
  position: relative;
  transform: scale(.88) translateY(16px);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 60px rgba(0,0,0,.8), 0 0 30px rgba(0,245,255,.06);
  overflow: hidden;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }

.modal-topbar {
  height: 3px;
  background: linear-gradient(to right, transparent, var(--mac, var(--cyan)), transparent);
}

.modal-body { padding: 16px 16px 18px; }

.modal-x {
  position:absolute; top:10px; right:12px;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
  border-radius: 50%; width: 24px; height: 24px;
  cursor:pointer; color:var(--text-mid); font-size:11px; line-height:1;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; z-index: 2;
}
.modal-x:hover { color:var(--red-neon); border-color: rgba(255,34,68,.4); background: rgba(255,34,68,.08); }

.m-hdr {
  display:flex; align-items:center; gap:12px;
  margin-bottom: 14px;
}
.m-icon-wrap {
  width: 52px; height: 52px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(0,245,255,.08) 0%, rgba(0,245,255,.02) 100%);
  border: 1px solid var(--mac, rgba(0,245,255,.25));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--mag, rgba(0,245,255,.12));
}
.m-icon { font-size: 26px; filter: drop-shadow(0 0 8px var(--mag, rgba(0,245,255,.5))); }
.m-name { font-family:var(--f-hud); font-size:13px; font-weight:700; color:var(--mac,var(--cyan)); text-shadow:0 0 8px var(--mag,rgba(0,245,255,.35)); letter-spacing:.5px; line-height:1.2; }
.m-rar  { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--mac,var(--cyan)); opacity:.6; margin-top:2px; }
.m-level { font-family:var(--f-hud); font-size:10px; color:var(--text-lo); margin-top:3px; }

.m-sep {
  display: flex; align-items: center; gap: 8px;
  margin: 10px 0 8px;
}
.m-sep-line { flex:1; height:1px; background: rgba(0,245,255,.1); }
.m-sep-txt { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--text-lo); white-space:nowrap; }

.cost-row {
  display:flex; align-items:center; justify-content:space-between;
  background: linear-gradient(135deg, rgba(255,200,60,.08) 0%, rgba(255,200,60,.04) 100%);
  border: 1px solid rgba(255,200,60,.2);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
}
.cost-left { display:flex; flex-direction:column; }
.cost-label { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,200,60,.45); margin-bottom:2px; }
.cost-v { font-family:var(--f-hud); font-size:22px; font-weight:900; color:var(--gold); text-shadow:0 0 14px rgba(255,200,60,.5); line-height:1; }
.cost-icon { font-size:28px; opacity:.7; }

.cmp-section { display: flex; flex-direction: column; gap: 6px; }
.cmp-item {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 8px;
}
.cmp-lbl { font-size:9px; font-weight:600; color:var(--text-lo); letter-spacing:.5px; text-transform:uppercase; margin-bottom:5px; }
.cmp-v {
  font-family:var(--f-hud); font-size:13px; font-weight:700;
  text-align:center; padding:5px 8px; border-radius:6px;
}
.cmp-v.cur { background:rgba(255,255,255,.04); color:var(--text-mid); border:1px solid rgba(255,255,255,.08); }
.cmp-v.nxt { background:rgba(0,245,255,.08);  color:var(--cyan);      border:1px solid rgba(0,245,255,.22); }
.cmp-arr  { text-align:center; color:var(--text-lo); font-size:12px; }

.btn-upg {
  width:100%; margin-top:14px; padding:11px;
  background: linear-gradient(135deg, rgba(0,245,255,.15) 0%, rgba(0,245,255,.06) 100%);
  border: 1px solid rgba(0,245,255,.32); border-radius: 8px; cursor:pointer;
  font-family:var(--f-hud); font-size:12px; font-weight:700;
  color:var(--cyan); letter-spacing:3px; text-transform:uppercase;
  transition: all .2s; position:relative; overflow:hidden;
}
.btn-upg:hover {
  background: linear-gradient(135deg, rgba(0,245,255,.28) 0%, rgba(0,245,255,.12) 100%);
  box-shadow: 0 0 24px rgba(0,245,255,.22), inset 0 0 24px rgba(0,245,255,.06);
  transform: translateY(-1px);
}
.btn-upg:active { transform:scale(.97); }
.btn-upg::after {
  content:''; position:absolute; top:-50%; left:-60%; width:35%; height:200%;
  background:rgba(255,255,255,.07); transform:skewX(-22deg);
  transition:left .4s ease;
}
.btn-upg:hover::after { left:130%; }
.btn-upg:disabled {
  opacity:.45; cursor:not-allowed; transform:none;
  box-shadow:none;
}

.stat-bonus-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 5px;
}
.stat-bonus-item {
  background: rgba(0,245,255,.04);
  border: 1px solid rgba(0,245,255,.08);
  border-radius: 6px;
  padding: 5px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.sbi-key { font-size:8px; color:var(--text-lo); letter-spacing:.5px; text-transform:uppercase; }
.sbi-row { display:flex; align-items:center; justify-content:space-between; gap:4px; }
.sbi-cur { font-family:var(--f-hud); font-size:11px; font-weight:700; color:var(--text-mid); }
.sbi-arr { font-size:9px; color:var(--text-lo); }
.sbi-nxt { font-family:var(--f-hud); font-size:11px; font-weight:700; color:var(--cyan); }
</style>
</head>
<body>
<div class="sheet" id="sheet">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>

  <div class="col-right">

    <!-- EQUIPO — sin gold-tag -->
    <div class="sec-gear">
      <div class="gear-grid" id="gearGrid"></div>
    </div>

    <div class="h-div"></div>

    <!-- STATS -->
    <div class="sec-stats">
      <div class="stats-grid" id="statsGrid"></div>
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-topbar" id="mTopBar"></div>
      <div class="modal-body">
        <button class="modal-x" id="modalClose">✕</button>

        <div class="m-hdr">
          <div class="m-icon-wrap" id="mIconWrap">
            <div class="m-icon" id="mIcon">⚔</div>
          </div>
          <div>
            <div class="m-name" id="mName">—</div>
            <div class="m-rar"  id="mRar">—</div>
            <div class="m-level" id="mLevelDisp">—</div>
          </div>
        </div>

        <div class="m-sep"><div class="m-sep-line"></div><div class="m-sep-txt">Costo de Mejora</div><div class="m-sep-line"></div></div>
        <div class="cost-row">
          <div class="cost-left">
            <div class="cost-label">Oro requerido</div>
            <div class="cost-v" id="mCost">—</div>
          </div>
          <div class="cost-icon">◆</div>
        </div>

        <div class="m-sep"><div class="m-sep-line"></div><div class="m-sep-txt">Estadísticas</div><div class="m-sep-line"></div></div>
        <div class="stat-bonus-grid" id="statBonusGrid"></div>

        <button class="btn-upg" id="btnUpg">▲ MEJORAR</button>
      </div>
    </div>
  </div>
</div>

<script>
let playerGold = 24850;

const MULTIPLIERS = [1.4, 1.6, 1.8, 2.25, 2.35, 2.45, 2.50, 2.60, 2.70, 2.80];

const SLOT_DEFS = [
  {
    id:'main', icon:'🗡️', name:'Mano Principal',
    stats: [
      { key:'STR',     gain: 3,    unit:'',  fmt: v => Math.round(v) },
      { key:'C.DMG',   gain: 1.5,  unit:'%', fmt: v => v.toFixed(1)+'%' },
    ]
  },
  {
    id:'head', icon:'🪖', name:'Cabeza',
    stats: [
      { key:'INT', gain: 3,  unit:'',  fmt: v => Math.round(v) },
      { key:'MP',  gain: 8,  unit:'',  fmt: v => Math.round(v) },
    ]
  },
  {
    id:'torso', icon:'🛡️', name:'Torso',
    stats: [
      { key:'HP',  gain: 25, unit:'', fmt: v => Math.round(v) },
      { key:'DEF', gain: 4,  unit:'', fmt: v => Math.round(v) },
    ]
  },
  {
    id:'legs', icon:'👖', name:'Piernas',
    stats: [
      { key:'AGI', gain: 2,   unit:'',  fmt: v => Math.round(v) },
      { key:'LUK', gain: 0.5, unit:'',  fmt: v => v.toFixed(1) },
    ]
  },
  {
    id:'feet', icon:'🥾', name:'Pies',
    stats: [
      { key:'AGI', gain: 2,  unit:'', fmt: v => Math.round(v) },
      { key:'HP',  gain: 20, unit:'', fmt: v => Math.round(v) },
    ]
  },
  {
    id:'neck', icon:'📿', name:'Cuello',
    stats: [
      { key:'RES', gain: 0.2, unit:'%', fmt: v => v.toFixed(1)+'%' },
      { key:'MP',  gain: 6,   unit:'', fmt: v => Math.round(v) },
    ]
  },
];

const SLOTS = SLOT_DEFS.map(def => {
  const baseCost = Math.floor(Math.random() * 21) + 20;
  const mult = MULTIPLIERS[Math.floor(Math.random() * MULTIPLIERS.length)];
  return { ...def, level: 1, baseCost, multiplier: mult };
});

function getCostForLevel(slot, lvl) {
  return Math.round(slot.baseCost * Math.pow(slot.multiplier, lvl - 1));
}

function getStatValue(gain, level, key) {
  if (key === 'CRI') return Math.min(5.0, 0.0625 * level);
  return gain * level;
}

function getRar(lvl) {
  if (lvl<=5)  return {label:'Madera',     color:'#c8904a', glow:'rgba(139,94,60,.5)',    border:'#8b5e3c44', bg:'rgba(139,94,60,.14)'  };
  if (lvl<=15) return {label:'Aprendiz',   color:'#2ecc71', glow:'rgba(46,204,113,.45)', border:'#2ecc7144', bg:'rgba(46,204,113,.10)' };
  if (lvl<=30) return {label:'Chunin',     color:'#3498db', glow:'rgba(52,152,219,.45)', border:'#3498db44', bg:'rgba(52,152,219,.11)' };
  if (lvl<=45) return {label:'Jonin',      color:'#f1c40f', glow:'rgba(241,196,15,.50)', border:'#f1c40f44', bg:'rgba(241,196,15,.11)' };
  if (lvl<=60) return {label:'ANBU',       color:'#e74c3c', glow:'rgba(231,76,60,.50)',  border:'#e74c3c44', bg:'rgba(231,76,60,.12)'  };
  return {label:'Legendario',color:'#e74c3c',goldColor:'#ffc83c',glow:'rgba(231,76,60,.6)',border:'#e74c3c55',bg:'rgba(231,76,60,.15)',legendary:true};
}

const STATS = [
  { icon:'⚔️', key:'STR',     val:'284',  cls:''      },
  { icon:'💨', key:'AGI',     val:'197',  cls:'speed' },
  { icon:'🧠', key:'INT',     val:'156',  cls:''      },
  { icon:'✦',  key:'LUK',     val:'88',   cls:''      },
  { icon:'🛡️', key:'DEF',     val:'312',  cls:'good'  },
  { icon:'♾️',  key:'RES',     val:'241',  cls:''      },
  { icon:'◎',  key:'CRI',     val:'34%',  cls:'crit'  },
  { icon:'💥', key:'C.DMG',   val:'218%', cls:'crit'  },
  { icon:'〇', key:'EVA',     val:'22%',  cls:'speed' },
  { icon:'♥️',  key:'Rg HP',  val:'+145', cls:'good'  },
];

const sGrid = document.getElementById('statsGrid');
STATS.forEach(s => {
  const d = document.createElement('div');
  d.className = 'stat-row';
  d.innerHTML = `<span class="st-icon">${s.icon}</span><span class="st-key">${s.key}</span><span class="st-val ${s.cls}">${s.val}</span>`;
  sGrid.appendChild(d);
});

const gGrid = document.getElementById('gearGrid');
SLOTS.forEach(slot => {
  const rar = getRar(slot.level);
  const el  = document.createElement('div');
  el.className = 'gear-slot' + (rar.legendary?' legendary':'');
  el.style.cssText = `--sb:${rar.border};--sbg:${rar.bg};--sg:${rar.glow};--sc:${rar.legendary?(rar.goldColor||rar.color):rar.color};border-color:${rar.border};background:${rar.bg};`;

  let html = rar.legendary ? '<div class="legendary-aura"></div>' : '';
  if (rar.legendary) {
    for(let p=0;p<5;p++){
      const tx=(Math.random()*60-30).toFixed(0), ty=(Math.random()*40+8).toFixed(0),
            dx=(Math.random()*14-7).toFixed(0),
            dur=(1.4+Math.random()*1.6).toFixed(1), delay=(Math.random()*1.4).toFixed(1);
      html+=`<div class="particle" style="--tx:${tx}px;--ty:${ty}px;--dx:${dx}px;--dur:${dur}s;--delay:${delay}s;left:${14+p*16}%;top:${22+Math.random()*52}%"></div>`;
    }
  }
  const lc = rar.legendary?(rar.goldColor||rar.color):rar.color;
  html += `
    <div class="s-icon">${slot.icon}</div>
    <div class="s-name">${slot.name}</div>
    <div class="s-lv" style="color:${lc};text-shadow:0 0 6px ${rar.glow}">Lv.${slot.level}</div>
  `;
  el.innerHTML = html;
  el.addEventListener('click', ()=>openModal(slot));
  gGrid.appendChild(el);
  slot._el = el;
});

function updateGoldDisplay() {}

const overlay  = document.getElementById('modalOverlay');
const btnClose = document.getElementById('modalClose');
const btnUpg   = document.getElementById('btnUpg');
let active = null;

function openModal(slot) {
  active = slot;
  const rar  = getRar(slot.level);
  const cost = getCostForLevel(slot, slot.level);
  const nextLvl = slot.level + 1;

  document.getElementById('mIcon').textContent = slot.icon;
  document.getElementById('mName').textContent = slot.name;
  document.getElementById('mRar').textContent  = rar.label.toUpperCase();
  document.getElementById('mLevelDisp').textContent = `Nivel ${slot.level} → ${slot.level >= 80 ? 'MÁX' : nextLvl}`;
  document.getElementById('mCost').textContent = cost.toLocaleString();

  const m = document.getElementById('modal');
  m.style.borderColor = rar.color + '44';
  document.documentElement.style.setProperty('--mac', rar.color);
  document.documentElement.style.setProperty('--mag', rar.glow);
  document.getElementById('mTopBar').style.background = `linear-gradient(to right, transparent, ${rar.color}, transparent)`;
  document.getElementById('mIconWrap').style.borderColor = rar.color + '55';
  document.getElementById('mIconWrap').style.boxShadow = `0 0 20px ${rar.glow}`;

  const sbGrid = document.getElementById('statBonusGrid');
  sbGrid.innerHTML = '';
  slot.stats.forEach(st => {
    const curVal = getStatValue(st.gain, slot.level, st.key);
    const nxtVal = getStatValue(st.gain, nextLvl, st.key);
    const item = document.createElement('div');
    item.className = 'stat-bonus-item';
    item.innerHTML = `
      <div class="sbi-key">${st.key}</div>
      <div class="sbi-row">
        <span class="sbi-cur">${st.fmt(curVal)}</span>
        <span class="sbi-arr">→</span>
        <span class="sbi-nxt">${st.fmt(nxtVal)}</span>
      </div>
    `;
    sbGrid.appendChild(item);
  });

  if (slot.level >= 80) {
    btnUpg.textContent = '✦ NIVEL MÁXIMO';
    btnUpg.disabled = true;
  } else if (playerGold < cost) {
    btnUpg.textContent = '✕ ORO INSUFICIENTE';
    btnUpg.disabled = true;
  } else {
    btnUpg.textContent = '▲ MEJORAR';
    btnUpg.disabled = false;
  }

  overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); active = null; }

btnClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });

btnUpg.addEventListener('click', () => {
  if (!active || active.level >= 80) return;
  const cost = getCostForLevel(active, active.level);
  if (playerGold < cost) return;

  playerGold -= cost;

  active.level++;
  const rar = getRar(active.level);
  const el  = active._el;

  el.style.borderColor = rar.border;
  el.style.background  = rar.bg;
  el.style.setProperty('--sg', rar.glow);
  el.style.setProperty('--sb', rar.border);
  el.style.setProperty('--sbg', rar.bg);

  const lc = rar.legendary?(rar.goldColor||rar.color):rar.color;
  el.querySelector('.s-lv').textContent = `Lv.${active.level}`;
  el.querySelector('.s-lv').style.color = lc;
  el.querySelector('.s-lv').style.textShadow = `0 0 6px ${rar.glow}`;

  if (rar.legendary && !el.classList.contains('legendary')) el.classList.add('legendary');

  el.style.boxShadow = `0 0 26px ${rar.glow}`;
  setTimeout(()=>{ el.style.boxShadow=''; }, 700);

  btnUpg.textContent = '✓ ¡MEJORADO!';
  btnUpg.disabled = true;
  setTimeout(() => { openModal(active); }, 800);
});
</script>
</body>
</html>
