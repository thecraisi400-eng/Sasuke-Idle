<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mine Clicker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div id="level-block">
      <span id="level-label">Nivel 1</span>
      <div id="xp-bar-bg"><div id="xp-bar-fill"></div></div>
    </div>
    <div id="coins-block">
      <div class="coin-display">
        <span class="icon">💰</span>
        <span class="val" id="gold-count">0</span>
      </div>
      <div class="coin-display">
        <span class="icon">💲</span>
        <span class="val" id="silver-count">0</span>
      </div>
    </div>
    <div id="dps-display" class="dps-label">1 DPS</div>
  </div>

  <!-- CAVE AREA -->
  <div id="cave-area">
    <!-- Background layers -->
    <div id="cave-bg"></div>

    <!-- SVG cave walls -->
    <svg id="cave-walls" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- Deep tunnel left -->
      <ellipse cx="60" cy="150" rx="50" ry="80" fill="#050508" opacity="0.8"/>
      <!-- Deep tunnel right -->
      <ellipse cx="340" cy="150" rx="50" ry="80" fill="#050508" opacity="0.8"/>
      <!-- Wall texture left -->
      <path d="M0,0 L80,0 L70,30 L60,60 L55,120 L50,180 L60,240 L70,280 L80,300 L0,300 Z" fill="#0f0f20" opacity="0.9"/>
      <path d="M0,0 L50,0 L45,40 L40,100 L38,160 L42,220 L48,270 L50,300 L0,300 Z" fill="#0a0a18" opacity="0.7"/>
      <!-- Wall texture right -->
      <path d="M400,0 L320,0 L330,30 L340,60 L345,120 L350,180 L340,240 L330,280 L320,300 L400,300 Z" fill="#0f0f20" opacity="0.9"/>
      <path d="M400,0 L350,0 L355,40 L360,100 L362,160 L358,220 L352,270 L350,300 L400,300 Z" fill="#0a0a18" opacity="0.7"/>
      <!-- Rock veins - gold -->
      <path d="M30,80 L50,90 L40,110 L55,120" stroke="#c8960a" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M360,140 L375,150 L365,170" stroke="#c8960a" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M10,200 L25,210 L18,230 L30,240" stroke="#8888ff" stroke-width="1.5" fill="none" opacity="0.4"/>
      <!-- Moss patches -->
      <ellipse cx="25" cy="240" rx="18" ry="8" fill="#1a3a0f" opacity="0.6"/>
      <ellipse cx="375" cy="200" rx="16" ry="7" fill="#1a3a0f" opacity="0.5"/>
      <ellipse cx="10" cy="160" rx="12" ry="5" fill="#1a3a0f" opacity="0.4"/>
      <!-- Cracks -->
      <path d="M85,200 L90,220 L88,240" stroke="#050510" stroke-width="1.5" fill="none" opacity="0.7"/>
      <path d="M315,180 L310,205 L313,225" stroke="#050510" stroke-width="1.5" fill="none" opacity="0.7"/>
    </svg>

    <!-- Torch glows -->
    <div class="torch-glow left"></div>
    <div class="torch-glow right"></div>

    <!-- Left Torch -->
    <div class="torch left">
      <svg class="torch-flame" viewBox="0 0 14 22" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fg1" cx="50%" cy="80%" r="60%">
            <stop offset="0%" stop-color="#fff7aa"/>
            <stop offset="40%" stop-color="#ff8c00"/>
            <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="7" cy="14" rx="5" ry="8" fill="url(#fg1)" opacity="0.95"/>
        <ellipse cx="7" cy="10" rx="3" ry="6" fill="#fff7aa" opacity="0.7"/>
        <ellipse cx="6" cy="8" rx="2" ry="4" fill="#ffffff" opacity="0.4"/>
      </svg>
      <div class="torch-body"></div>
    </div>

    <!-- Right Torch -->
    <div class="torch right">
      <svg class="torch-flame" viewBox="0 0 14 22" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fg2" cx="50%" cy="80%" r="60%">
            <stop offset="0%" stop-color="#fff7aa"/>
            <stop offset="40%" stop-color="#ff8c00"/>
            <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="7" cy="14" rx="5" ry="8" fill="url(#fg2)" opacity="0.95"/>
        <ellipse cx="7" cy="10" rx="3" ry="6" fill="#fff7aa" opacity="0.7"/>
        <ellipse cx="6" cy="8" rx="2" ry="4" fill="#ffffff" opacity="0.4"/>
      </svg>
      <div class="torch-body"></div>
    </div>

    <!-- Stalactites -->
    <div id="stalactites">
      <div class="stalactite" style="border-left-width:9px;border-right-width:9px;border-top-width:32px;border-top-color:#1a1228;margin-top:0;"></div>
      <div class="stalactite" style="border-left-width:6px;border-right-width:6px;border-top-width:20px;border-top-color:#1e1630;margin-top:5px;"></div>
      <div class="stalactite" style="border-left-width:11px;border-right-width:11px;border-top-width:42px;border-top-color:#16102a;margin-top:0;"></div>
      <div class="stalactite" style="border-left-width:7px;border-right-width:7px;border-top-width:28px;border-top-color:#1a1228;margin-top:0;"></div>
      <div class="stalactite" style="border-left-width:5px;border-right-width:5px;border-top-width:18px;border-top-color:#1e1630;margin-top:8px;"></div>
      <div class="stalactite" style="border-left-width:10px;border-right-width:10px;border-top-width:36px;border-top-color:#16102a;margin-top:0;"></div>
      <div class="stalactite" style="border-left-width:8px;border-right-width:8px;border-top-width:25px;border-top-color:#1a1228;margin-top:3px;"></div>
    </div>

    <!-- Stalagmites -->
    <div id="stalagmites">
      <div class="stalagmite" style="border-left-width:7px;border-right-width:7px;border-bottom-width:22px;border-bottom-color:#1a1228;margin-bottom:28px;"></div>
      <div class="stalagmite" style="border-left-width:5px;border-right-width:5px;border-bottom-width:14px;border-bottom-color:#1e1630;margin-bottom:28px;"></div>
      <div class="stalagmite" style="border-left-width:4px;border-right-width:4px;border-bottom-width:10px;border-bottom-color:#16102a;margin-bottom:28px;"></div>
      <div class="stalagmite" style="border-left-width:8px;border-right-width:8px;border-bottom-width:28px;border-bottom-color:#1a1228;margin-bottom:28px;"></div>
      <div class="stalagmite" style="border-left-width:5px;border-right-width:5px;border-bottom-width:16px;border-bottom-color:#1e1630;margin-bottom:28px;"></div>
      <div class="stalagmite" style="border-left-width:6px;border-right-width:6px;border-bottom-width:20px;border-bottom-color:#16102a;margin-bottom:28px;"></div>
    </div>

    <!-- Ground -->
    <div id="ground"></div>

    <!-- Miner character -->
    <svg id="miner" viewBox="0 0 55 75" xmlns="http://www.w3.org/2000/svg">
      <!-- Legs -->
      <rect x="16" y="52" width="9" height="16" rx="3" fill="#3a5a8a"/>
      <rect x="27" y="52" width="9" height="16" rx="3" fill="#3a5a8a"/>
      <!-- Boots -->
      <rect x="14" y="65" width="12" height="7" rx="2" fill="#1a0f05"/>
      <rect x="25" y="65" width="12" height="7" rx="2" fill="#1a0f05"/>
      <!-- Body -->
      <rect x="14" y="32" width="24" height="22" rx="5" fill="#5a80ba"/>
      <!-- Belt -->
      <rect x="14" y="50" width="24" height="4" rx="1" fill="#2a1a08"/>
      <circle cx="26" cy="52" r="2" fill="#c8960a"/>
      <!-- Arms -->
      <rect x="5" y="33" width="10" height="7" rx="3" fill="#5a80ba"/>
      <rect x="37" y="33" width="10" height="7" rx="3" fill="#5a80ba"/>
      <!-- Hands -->
      <circle cx="8" cy="43" r="5" fill="#f0c090"/>
      <circle cx="44" cy="38" r="5" fill="#f0c090"/>
      <!-- Pickaxe (held by right hand) -->
      <!-- Handle -->
      <rect x="44" y="28" width="4" height="22" rx="2" fill="#8B4513" transform="rotate(-30, 46, 38)"/>
      <!-- Pickaxe head - proper shape -->
      <g transform="rotate(-30, 46, 38) translate(43, 22)">
        <!-- Main body of pickaxe head -->
        <rect x="-5" y="-3" width="14" height="5" rx="1.5" fill="#9aa0a8"/>
        <!-- Left spike (curved) -->
        <path d="M-5,-3 C-10,-5 -14,-2 -12,2 C-10,5 -6,3 -5,2 Z" fill="#8a9098"/>
        <!-- Right spike (pointed upward) -->
        <path d="M9,-3 C12,-6 15,-8 13,-10 C11,-12 8,-9 7,-6 L9,-3 Z" fill="#8a9098"/>
        <!-- Highlight -->
        <rect x="-3" y="-2.5" width="10" height="2" rx="1" fill="#c0c8d0" opacity="0.5"/>
      </g>
      <!-- Head -->
      <circle cx="26" cy="22" r="12" fill="#f0c090"/>
      <!-- Helmet -->
      <path d="M14,20 Q14,8 26,8 Q38,8 38,20 Z" fill="#ffd700"/>
      <rect x="14" y="18" width="24" height="5" rx="2" fill="#e6c200"/>
      <!-- Helmet light -->
      <circle cx="26" cy="16" r="4" fill="#ffffaa"/>
      <circle cx="26" cy="16" r="2.5" fill="#ffffff" opacity="0.8"/>
      <!-- Eyes -->
      <circle cx="21" cy="23" r="2.5" fill="#fff"/>
      <circle cx="31" cy="23" r="2.5" fill="#fff"/>
      <circle cx="21.5" cy="23.5" r="1.5" fill="#2a1a00"/>
      <circle cx="31.5" cy="23.5" r="1.5" fill="#2a1a00"/>
      <!-- Smile -->
      <path d="M22,28 Q26,31 30,28" stroke="#8a4a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

    <!-- Rock container -->
    <div id="rock-container">
      <div id="hp-bars">
        <div class="hp-bar-wrap">
          <div class="hp-bar-bg"></div>
          <div class="hp-bar-fill" id="hp-bar-fill" style="width:100%"></div>
          <div class="hp-bar-text" id="hp-bar-text">35 / 35</div>
        </div>
      </div>

      <!-- Rock SVG - clean, no cracks -->
      <svg id="rock" viewBox="0 0 130 110" xmlns="http://www.w3.org/2000/svg" onclick="clickRock()">
        <defs>
          <radialGradient id="rockGrad" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#a0a0b8"/>
            <stop offset="45%" stop-color="#707088"/>
            <stop offset="100%" stop-color="#383848"/>
          </radialGradient>
          <radialGradient id="rockGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,220,120,0.12)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <filter id="rockShadow">
            <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
          </filter>
          <filter id="rockGlowF">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>
        <!-- Main rock body - smooth, no cracks -->
        <path d="M20,85 C10,75 8,55 12,42 C16,28 28,16 42,12 C56,8 74,10 88,16 C102,22 115,34 118,50 C121,66 114,80 104,88 C94,96 78,100 62,100 C46,100 30,95 20,85 Z" 
              fill="url(#rockGrad)" filter="url(#rockShadow)"/>
        <!-- Glow overlay -->
        <path d="M20,85 C10,75 8,55 12,42 C16,28 28,16 42,12 C56,8 74,10 88,16 C102,22 115,34 118,50 C121,66 114,80 104,88 C94,96 78,100 62,100 C46,100 30,95 20,85 Z" 
              fill="url(#rockGlow)" opacity="0.5"/>
        <!-- Highlight top-left -->
        <ellipse cx="46" cy="36" rx="22" ry="14" fill="rgba(200,200,230,0.18)" transform="rotate(-20,46,36)"/>
        <!-- Small specular -->
        <ellipse cx="38" cy="28" rx="8" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(-25,38,28)"/>
        <!-- Subtle mineral veins (smooth, no cracks) -->
        <path d="M50,40 Q65,35 80,42 Q90,48 85,58" stroke="rgba(160,140,200,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M35,55 Q45,50 55,55 Q60,60 55,68" stroke="rgba(150,130,190,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Gold vein glow -->
        <path d="M70,60 Q80,55 88,62 Q92,68 87,74" stroke="rgba(255,200,50,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Impact flash overlay (hidden) -->
        <ellipse id="rock-flash" cx="65" cy="55" rx="50" ry="42" fill="white" opacity="0"/>
      </svg>
    </div>

    <!-- Particles container -->
    <div id="particles-container"></div>

    <!-- Level up popup -->
    <div id="levelup-popup">
      <h2>⬆ NIVEL <span id="popup-level">2</span></h2>
      <p>¡La roca se vuelve más resistente!</p>
    </div>
  </div>

  <!-- NAV MENU -->
  <div id="nav-menu">
    <div class="menu-btn btn-picks" onclick="switchSection('picks')">
      <span class="btn-index">1</span>
      <span class="btn-icon">⛏️</span>
      <span class="btn-name">Picos</span>
    </div>
    <div class="menu-btn btn-clans" onclick="switchSection('clans')">
      <span class="btn-index">2</span>
      <span class="btn-icon">🛡️</span>
      <span class="btn-name">Clanes</span>
    </div>
    <div class="menu-btn btn-battle" onclick="switchSection('battle')">
      <span class="btn-index">3</span>
      <span class="btn-icon">⚔️</span>
      <span class="btn-name">Batalla</span>
    </div>
    <div class="menu-btn btn-attrs" onclick="switchSection('attrs')">
      <span class="btn-index">4</span>
      <span class="btn-icon">✨</span>
      <span class="btn-name">Atributos</span>
    </div>
    <div class="menu-btn btn-arena" onclick="switchSection('arena')">
      <span class="btn-index">5</span>
      <span class="btn-icon">🏟️</span>
      <span class="btn-name">Arena PvP</span>
    </div>
    <div class="menu-btn btn-events" onclick="switchSection('events')">
      <span class="btn-index">6</span>
      <span class="btn-icon">🎪</span>
      <span class="btn-name">Eventos</span>
    </div>
    <div class="menu-btn btn-prestige" onclick="switchSection('prestige')">
      <span class="btn-index">7</span>
      <span class="btn-icon">🏆</span>
      <span class="btn-name">Prestigio</span>
    </div>
    <div class="menu-btn btn-pets" onclick="switchSection('pets')">
      <span class="btn-index">8</span>
      <span class="btn-icon">🐉</span>
      <span class="btn-name">Mascotas</span>
    </div>
    <div class="menu-btn btn-settings" onclick="switchSection('settings')">
      <span class="btn-index">9</span>
      <span class="btn-icon">⚙️</span>
      <span class="btn-name">Ajustes</span>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
