<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Vertical Android</title>
    <style>
        /* Estilos para centrar el modelo en tu navegador */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222; /* Fondo gris oscuro fuera del modelo para contrastar */
            font-family: sans-serif;
            color: #fff;
        }

        /* Contenedor principal con las medidas exactas del dispositivo */
        .android-mockup {
            width: 393px;
            height: 793px;
            background-color: #000000; /* Fondo negro absoluto solicitado */
            outline: 2px solid #444; /* Borde visual sin restar pixeles al contenido */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Primera división: exactamente 490px de alto */
        .seccion-superior {
            height: 490px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .escenario-recorte {
            --inicio-x: 7px;
            --inicio-y: 7px;
            --fin-x: 399px;
            --fin-y: 496px;
            width: calc(var(--fin-x) - var(--inicio-x) + 1px);
            height: calc(var(--fin-y) - var(--inicio-y) + 1px);
            position: relative;
            overflow: hidden;
            flex: none;
        }

        .escenario-recorte img {
            position: absolute;
            left: calc(-1 * var(--inicio-x));
            top: calc(-1 * var(--inicio-y));
            max-width: none;
            width: auto;
            height: auto;
        }

        /* Segunda división: el restante (793px - 490px = 303px) */
        .seccion-inferior {
            height: 303px;
            width: 100%;
            border-top: 1px solid #555; /* Línea divisoria visible */
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Texto opcional para identificar las áreas */
        .etiqueta {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="android-mockup">
        <!-- División hasta los 490px -->
        <div class="seccion-superior">
            <div class="escenario-recorte" aria-label="Recorte del escenario desde X 7, Y 7 hasta X 399, Y 496">
                <img src="assets/images/escenario/a1.webp" alt="Escenario recortado">
            </div>
        </div>
        
        <!-- División con el espacio restante -->
        <div class="seccion-inferior">
            <span class="etiqueta">Sección Inferior (303px)</span>
        </div>
    </div>

</body>
</html>
