<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sasuke Idle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">
    <div class="hero-section">
      <div class="hero-header">
        <div class="hero-photo">🥷</div>
        <div class="hero-info">
          <div class="hero-name">⚡ Sasuke Uchiha</div>
          <div class="hero-rank-row">
            <div class="badge">🎖️ Lv. <strong id="nivel">42</strong></div>
            <div class="badge rank">🏆 Kage</div>
            <div class="badge gold">💰 <span id="oro">12,450</span></div>
          </div>
          <div class="hero-stats-row">
            <div class="stat-chip"><span class="label">⚔️ ATK</span><span class="val" id="atk">847</span></div>
            <div class="stat-chip"><span class="label">🛡️ DEF</span><span class="val" id="def">623</span></div>
          </div>
        </div>
      </div>

      <div class="bars-section">
        <div class="bar-row">
          <div class="bar-icon">❤️</div>
          <div class="bar-label" style="color:#ff4757;">HP</div>
          <div class="bar-track"><div class="bar-fill hp" id="bar-hp" style="width:72%"></div></div>
          <div class="bar-numbers" id="num-hp">7,200 / 10,000</div>
          <div class="bar-pct hp" id="pct-hp">72%</div>
          <div class="regen-indicator" id="regen-hp">▲</div>
        </div>
        <div class="bar-row">
          <div class="bar-icon">💧</div>
          <div class="bar-label" style="color:#4fc3f7;">MP</div>
          <div class="bar-track"><div class="bar-fill mp" id="bar-mp" style="width:55%"></div></div>
          <div class="bar-numbers" id="num-mp">2,750 / 5,000</div>
          <div class="bar-pct mp" id="pct-mp">55%</div>
          <div class="regen-indicator" id="regen-mp">▲</div>
        </div>
        <div class="bar-row">
          <div class="bar-icon">⭐</div>
          <div class="bar-label" style="color:#ffd700;">EXP</div>
          <div class="bar-track"><div class="bar-fill exp" id="bar-exp" style="width:38%"></div></div>
          <div class="bar-numbers" id="num-exp">3,800 / 10,000</div>
          <div class="bar-pct exp" id="pct-exp">38%</div>
          <div style="width:10px"></div>
        </div>
      </div>
    </div>

    <div class="mission-box"></div>

    <div class="nav-grid">
      <button class="nav-btn active" type="button" data-nav><span class="n-icon">🦸</span><span class="n-label">HEROE</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">📜</span><span class="n-label">MISIONES</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">⚔️</span><span class="n-label">CLANES</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">🎯</span><span class="n-label">EVENTOS</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">🌀</span><span class="n-label">JUTSUS</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">🥊</span><span class="n-label">BATALLAS</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">🐉</span><span class="n-label">INVOCAC.</span></button>
      <button class="nav-btn" type="button" data-nav><span class="n-icon">⚙️</span><span class="n-label">AJUSTES</span></button>
    </div>
  </div>

  <script src="BotonHero.js"></script>
  <script src="script.js"></script>
</body>
</html>
