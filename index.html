<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leñador Idle</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>

<div id="game-wrapper">

  <!-- TOP SECTION -->
  <div id="top-section">

    <!-- Status Bar -->
    <div id="status-bar">
      <div class="status-item">
        <svg class="status-icon" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="#888" stroke="#555" stroke-width="1.5"/>
          <path d="M9,14 L11,11 L14,17 L17,11 L19,14" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="9" r="2" fill="#FFD700"/>
        </svg>
        <div class="status-texts">
          <span class="status-value" id="level-display">Nivel 1</span>
          <span class="status-label">Rango</span>
        </div>
      </div>
      <div class="status-item">
        <svg class="status-icon" viewBox="0 0 28 28" fill="none">
          <ellipse cx="10" cy="19" rx="6" ry="4" fill="#c8960a" stroke="#8B6000" stroke-width="1"/>
          <rect x="4" y="11" width="12" height="8" rx="2" fill="#f5c518" stroke="#c8960a" stroke-width="1"/>
          <ellipse cx="10" cy="11" rx="6" ry="3" fill="#ffe066" stroke="#c8960a" stroke-width="1"/>
          <ellipse cx="18" cy="16" rx="6" ry="4" fill="#c8960a" stroke="#8B6000" stroke-width="1"/>
          <rect x="12" y="8" width="12" height="8" rx="2" fill="#f5c518" stroke="#c8960a" stroke-width="1"/>
          <ellipse cx="18" cy="8" rx="6" ry="3" fill="#ffe066" stroke="#c8960a" stroke-width="1"/>
        </svg>
        <div class="status-texts">
          <span class="status-value" id="gold-display">0</span>
          <span class="status-label">Oro</span>
        </div>
      </div>
      <div class="status-item">
        <svg class="status-icon" viewBox="0 0 28 28" fill="none">
          <polygon points="14,4 19,10 17,20 14,22 11,20 9,10" fill="#00bfff" stroke="#0077cc" stroke-width="1.2" opacity="0.9"/>
          <polygon points="7,8 11,12 10,19 7,21 5,17 6,11" fill="#00d4ff" stroke="#0099dd" stroke-width="1" opacity="0.8"/>
          <polygon points="21,8 23,11 22,18 19,20 17,16 18,11" fill="#33ccff" stroke="#0088cc" stroke-width="1" opacity="0.7"/>
          <polygon points="14,5 18,9 16,14 14,15 12,14 10,9" fill="rgba(255,255,255,0.4)"/>
        </svg>
        <div class="status-texts">
          <span class="status-value" id="crystals-display">0</span>
          <span class="status-label">Cristales</span>
        </div>
      </div>
      <div class="status-item">
        <svg class="status-icon" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="11" fill="none" stroke="#ff6b35" stroke-width="2"/>
          <path d="M14 6 L14 14 L19 19" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="14" r="2" fill="#ff6b35"/>
          <path d="M8 4 L6 2 M20 4 L22 2" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M4 14 L2 13 M24 14 L26 13" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div class="status-texts">
          <span class="status-value" id="dps-display">0.5</span>
          <span class="status-label">DPS Auto</span>
        </div>
      </div>
    </div>

    <div id="time-bar">
      <div class="time-pill" id="day-display">Día: 1</div>
      <div class="time-pill" id="clock-display">6:00 AM</div>
    </div>

    <!-- Night overlay -->
    <div id="night-overlay"></div>

    <!-- Scene Canvas -->
    <canvas id="scene-canvas"></canvas>

    <div id="next-level-banner">PROXIMO NIVEL</div>

  </div>

  <!-- BOTTOM SECTION -->
  <div id="bottom-section">
    <div id="menu-grid">
      <button class="menu-btn" onclick="openModal('axe')">
        <div class="menu-emoji-icon">🪓</div>
        <span>MEJORAR HACHA</span>
      </button>

      <button class="menu-btn" onclick="openModal('attrs')">
        <svg viewBox="0 0 28 28" fill="none">
          <rect x="4" y="4" width="20" height="20" rx="5" fill="none" stroke="white" stroke-width="2"/>
          <circle cx="14" cy="12" r="4" fill="white"/>
          <path d="M6,24 C6,19 22,19 22,24" fill="white"/>
        </svg>
        <span>Atributos</span>
      </button>

      <button class="menu-btn" onclick="openModal('shop')">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M4,8 L6,18 L22,18 L24,8 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <line x1="4" y1="8" x2="24" y2="8" stroke="white" stroke-width="2"/>
          <circle cx="10" cy="22" r="2" fill="white"/>
          <circle cx="19" cy="22" r="2" fill="white"/>
          <path d="M10,8 L10,18 M14,8 L14,18 M18,8 L18,18" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
          <circle cx="21" cy="7" r="5" fill="#f5c518" stroke="#c8960a" stroke-width="1.2"/>
          <text x="21" y="10" font-size="7" fill="#8B6000" text-anchor="middle" font-weight="bold">$</text>
        </svg>
        <span>Tienda</span>
      </button>

      <button class="menu-btn" onclick="openModal('missions')">
        <svg viewBox="0 0 28 28" fill="none">
          <line x1="14" y1="4" x2="14" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="4" y1="14" x2="24" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M7,7 L21,21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M21,7 L7,21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>Misiones</span>
      </button>

      <button class="menu-btn" onclick="openModal('clans')">
        <svg viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="9" r="4" fill="white"/>
          <path d="M6,24 C6,18 22,18 22,24" fill="white"/>
          <circle cx="6" cy="12" r="3" fill="rgba(255,255,255,0.8)"/>
          <circle cx="22" cy="12" r="3" fill="rgba(255,255,255,0.8)"/>
          <path d="M0,24 C0,19 12,19 12,24" fill="rgba(255,255,255,0.6)"/>
          <path d="M16,24 C16,19 28,19 28,24" fill="rgba(255,255,255,0.6)"/>
        </svg>
        <span>Clanes</span>
      </button>

      <button class="menu-btn" onclick="openModal('skills')">
        <svg viewBox="0 0 28 28" fill="none">
          <rect x="6" y="4" width="14" height="18" rx="2" fill="none" stroke="white" stroke-width="2"/>
          <rect x="8" y="6" width="10" height="14" rx="1" fill="rgba(255,255,255,0.15)"/>
          <path d="M14,10 L15.5,13 L19,13.5 L16.5,16 L17,19.5 L14,18 L11,19.5 L11.5,16 L9,13.5 L12.5,13 Z" fill="#f5c518" stroke="#c8960a" stroke-width="0.5"/>
          <path d="M20,8 Q26,14 20,20" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="2,2"/>
        </svg>
        <span>Habilidades</span>
      </button>

      <button class="menu-btn" onclick="openModal('events')">
        <svg viewBox="0 0 28 28" fill="none">
          <rect x="4" y="6" width="20" height="18" rx="2" fill="none" stroke="white" stroke-width="2"/>
          <line x1="4" y1="11" x2="24" y2="11" stroke="white" stroke-width="1.5"/>
          <line x1="9" y1="4" x2="9" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="19" y1="4" x2="19" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <rect x="7" y="14" width="4" height="4" rx="1" fill="white" opacity="0.8"/>
          <rect x="12" y="14" width="4" height="4" rx="1" fill="white" opacity="0.8"/>
          <rect x="17" y="14" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
          <rect x="7" y="19" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
          <rect x="12" y="19" width="4" height="3" rx="1" fill="white" opacity="0.3"/>
        </svg>
        <span>Eventos</span>
      </button>

      <button class="menu-btn" onclick="openModal('prestige')">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M4,20 L4,14 L8,8 L14,6 L20,8 L24,14 L24,20 Z" fill="none" stroke="#f5c518" stroke-width="2" stroke-linejoin="round"/>
          <path d="M4,20 L8,14 L14,12 L20,14 L24,20" fill="rgba(245,197,24,0.2)" stroke="#f5c518" stroke-width="1.5"/>
          <circle cx="14" cy="16" r="4" fill="none" stroke="#f5c518" stroke-width="1.5"/>
          <path d="M14,12 L15.2,14.5 L18,15 L16,17 L16.5,20 L14,18.5 L11.5,20 L12,17 L10,15 L12.8,14.5 Z" fill="#f5c518"/>
        </svg>
        <span>Prestigio</span>
      </button>

      <button class="menu-btn" onclick="openModal('settings')">
        <svg viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="4" fill="none" stroke="white" stroke-width="2"/>
          <path d="M14,4 L15,7 L17,6 L18,8 L16,9 M24,14 L21,15 L22,17 L20,18 L19,16 M14,24 L13,21 L11,22 L10,20 L12,19 M4,14 L7,13 L6,11 L8,10 L9,12" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="14" cy="14" r="2" fill="white"/>
          <circle cx="14" cy="4" r="1.5" fill="white"/>
          <circle cx="24" cy="14" r="1.5" fill="white"/>
          <circle cx="14" cy="24" r="1.5" fill="white"/>
          <circle cx="4" cy="14" r="1.5" fill="white"/>
          <circle cx="20.5" cy="7.5" r="1.5" fill="white"/>
          <circle cx="20.5" cy="20.5" r="1.5" fill="white"/>
          <circle cx="7.5" cy="7.5" r="1.5" fill="white"/>
          <circle cx="7.5" cy="20.5" r="1.5" fill="white"/>
        </svg>
        <span>Ajustes</span>
      </button>
    </div>
  </div>
</div>

<!-- Modal Overlay -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title">Modal</span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
