<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Open World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;width:100vw;height:100vh;}
#gameContainer{position:relative;width:100vw;height:100vh;overflow:hidden;}
#worldCanvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#minimap{position:fixed;bottom:20px;right:20px;width:160px;height:160px;border:2px solid rgba(255,220,100,0.8);border-radius:4px;background:rgba(0,0,0,0.7);pointer-events:none;}
#minimapCanvas{width:160px;height:160px;}
#stats{position:fixed;top:20px;left:20px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,220,100,0.5);border-radius:8px;padding:12px 16px;color:#fff;min-width:180px;}
#stats h3{color:#ffd96a;font-size:13px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.bar-label{font-size:11px;color:#aaa;margin-bottom:3px;}
.bar-bg{background:rgba(255,255,255,0.1);border-radius:3px;height:8px;margin-bottom:8px;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s;}
#hpBar{background:linear-gradient(90deg,#e74c3c,#c0392b);}
#mpBar{background:linear-gradient(90deg,#2980b9,#1a6b9a);}
#expBar{background:linear-gradient(90deg,#f39c12,#d68910);}
#coordDisplay{position:fixed;bottom:20px;left:20px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,220,100,0.5);border-radius:6px;padding:8px 12px;color:#aaa;font-size:12px;}
#zoneDisplay{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid rgba(255,220,100,0.6);border-radius:6px;padding:8px 20px;color:#ffd96a;font-size:14px;font-weight:bold;letter-spacing:1px;transition:opacity 0.5s;}
#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 16px;color:#888;font-size:11px;text-align:center;}
#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
#loadingScreen h1{font-size:48px;color:#ffd96a;text-shadow:0 0 30px rgba(255,220,100,0.5);margin-bottom:10px;letter-spacing:4px;}
#loadingScreen p{color:#888;font-size:14px;margin-bottom:30px;}
#loadBar{width:300px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;}
#loadFill{height:100%;background:#ffd96a;border-radius:2px;width:0%;transition:width 0.1s;}
</style>
</head>
<body>
<div id="loadingScreen">
  <h1>⚔ OPEN WORLD ⚔</h1>
  <p>Generando mundo...</p>
  <div id="loadBar"><div id="loadFill"></div></div>
</div>
<div id="gameContainer">
  <canvas id="worldCanvas"></canvas>
</div>
<div id="ui">
  <div id="stats">
    <h3>🧙 Aventurero</h3>
    <div class="bar-label">❤ Vida <span id="hpVal">100/100</span></div>
    <div class="bar-bg"><div class="bar-fill" id="hpBar" style="width:100%"></div></div>
    <div class="bar-label">💧 Maná <span id="mpVal">80/80</span></div>
    <div class="bar-bg"><div class="bar-fill" id="mpBar" style="width:100%"></div></div>
    <div class="bar-label">⭐ Exp Nivel 1</div>
    <div class="bar-bg"><div class="bar-fill" id="expBar" style="width:10%"></div></div>
  </div>
  <div id="zoneDisplay">Praderas del Sur</div>
  <canvas id="minimapCanvas" width="160" height="160"></canvas>
  <div id="minimap" style="pointer-events:none;position:fixed;bottom:20px;right:20px;"></div>
  <div id="coordDisplay">X: 0 | Y: 0 | Zona: Praderas</div>
  <div id="controls">🎮 WASD para caminar libremente | Shift: correr | Click: marcar destino | Scroll: Zoom</div>
</div>

<script>
const canvas = document.getElementById('worldCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ─── WORLD CONSTANTS ───────────────────────────────────────────────
const WORLD_W = 6144;
const WORLD_H = 6144;
const TILE = 4;
const COLS = WORLD_W / TILE;
const ROWS = WORLD_H / TILE;

// ─── WORLD DATA ─────────────────────────────────────────────────────
let heightMap = new Float32Array(COLS * ROWS);
let biomeMap  = new Uint8Array(COLS * ROWS);
let worldImg  = null;

// ─── CAMERA ─────────────────────────────────────────────────────────
let cam = { x: WORLD_W/2 - canvas.width/2, y: WORLD_H/2 - canvas.height/2, zoom: 1 };
const MIN_ZOOM = 0.75, MAX_ZOOM = 1.45;
const THIRD_PERSON = true;

// ─── PLAYER ─────────────────────────────────────────────────────────
let player = {
  wx: WORLD_W/2, wy: WORLD_H/2,
  speed: 230, // pixels/sec
  targetX: WORLD_W/2, targetY: WORLD_H/2,
  moving: false,
  angle: -Math.PI/2,
  stepAnim: 0,
  path: [],
  hp: 100, maxHp: 100,
  mp: 80, maxMp: 80,
  exp: 10, expNext: 100,
  level: 1
};

// ─── OBJECTS (trees, shrubs, animals) ───────────────────────────────
let objects = [];
let animals = [];

// ─── THIRD-PERSON INPUT ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', (e)=>{
  keys[e.key.toLowerCase()] = true;
  if(['w','a','s','d','q','e','arrowup','arrowdown','arrowleft','arrowright','shift'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', (e)=>{ keys[e.key.toLowerCase()] = false; });

function canStandAt(wx, wy){
  let bx=Math.floor(wx/TILE), by=Math.floor(wy/TILE);
  if(bx<0||by<0||bx>=COLS||by>=ROWS) return false;
  return isWalkableBiome(biomeMap[by*COLS+bx]);
}

function tryMovePlayer(nx, ny){
  if(canStandAt(nx, ny)){ player.wx=nx; player.wy=ny; return true; }
  // Slide on one axis so rocks, riverbanks and cliffs feel solid but not sticky.
  if(canStandAt(nx, player.wy)){ player.wx=nx; return true; }
  if(canStandAt(player.wx, ny)){ player.wy=ny; return true; }
  return false;
}

function updateKeyboardMovement(dt){
  const forwardInput = (keys['w']||keys['arrowup'] ? 1 : 0) - (keys['s']||keys['arrowdown'] ? 1 : 0);
  const sideInput = (keys['d']||keys['arrowright'] ? 1 : 0) - (keys['a']||keys['arrowleft'] ? 1 : 0);
  if(forwardInput===0 && sideInput===0) return false;
  const forwardX = Math.cos(player.angle), forwardY = Math.sin(player.angle);
  const rightX = -Math.sin(player.angle), rightY = Math.cos(player.angle);
  let dx = forwardX * forwardInput + rightX * sideInput;
  let dy = forwardY * forwardInput + rightY * sideInput;
  const len = Math.hypot(dx, dy) || 1;
  dx /= len; dy /= len;
  player.angle = Math.atan2(dy, dx);
  const sprint = keys['shift'] ? 1.45 : 1;
  const spd = player.speed * sprint * dt;
  tryMovePlayer(player.wx + dx*spd, player.wy + dy*spd);
  player.stepAnim += dt * sprint;
  player.moving = false;
  return true;
}

// ─── NOISE ──────────────────────────────────────────────────────────
function smoothNoise(x, y, freq, seed){
  let xi = Math.floor(x * freq) ^ seed;
  let yi = Math.floor(y * freq) ^ (seed * 31);
  function h(n){ n=(n<<13)^n; return 1-(((n*(n*n*15731+789221)+1376312589)&0x7fffffff)/1073741824); }
  let fx = x * freq - Math.floor(x * freq);
  let fy = y * freq - Math.floor(y * freq);
  fx = fx*fx*(3-2*fx);
  fy = fy*fy*(3-2*fy);
  let v00=h(xi+yi*57), v10=h(xi+1+yi*57), v01=h(xi+(yi+1)*57), v11=h(xi+1+(yi+1)*57);
  return v00+(v10-v00)*fx + (v01-v00+( v10-v00-(v11-v00) )*fx)*fy;
}

function fbm(x, y, octaves, seed){
  let v=0, amp=0.5, freq=1, max=0;
  for(let i=0;i<octaves;i++){ v+=smoothNoise(x,y,freq,seed)*amp; max+=amp; amp*=0.5; freq*=2.1; }
  return v/max;
}

// ─── BIOME COLORS ───────────────────────────────────────────────────
// 0=deep water,1=river/lake,2=shore/wet bank,3=gravel,4=plain grass,5=tall grass,6=forest,7=cliff rock,8=snow,9=mountain,10=marsh
const BIOME_COLORS = [
  '#123052','#2878a9','#76956f','#9b8462','#7cae4d','#5e9440','#2f6f34',
  '#6f675e','#e8eadf','#938574','#4f6f52'
];
const BIOME_NAMES = ['Agua profunda','Río','Ribera','Grava','Pradera','Pasto alto','Bosque','Risco','Nieve','Montaña','Humedal'];
const BLOCKED_BIOMES = new Set([0, 1, 7, 8, 9]);
const ROAD_PATHS = [
  [[520, 3920], [1600, 3120], [2900, 3340], [4550, 2580], [5650, 3040]],
  [[1250, 1200], [2150, 2100], [3000, 3050], [3660, 4620], [5020, 5350]],
  [[940, 5060], [2050, 4300], [3150, 3800], [4680, 4380], [5520, 3820]]
];

// ─── REALISTIC TERRAIN HELPERS ───────────────────────────────────────
function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
function smoothstep(edge0, edge1, x){
  let t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}
function valueNoise01(x, y, freq, seed){ return (smoothNoise(x, y, freq, seed) + 1) * 0.5; }

function distToSegment(px, py, ax, ay, bx, by){
  const vx = bx - ax, vy = by - ay;
  const wx = px - ax, wy = py - ay;
  const c = clamp((wx * vx + wy * vy) / (vx * vx + vy * vy), 0, 1);
  const dx = px - (ax + vx * c), dy = py - (ay + vy * c);
  return Math.sqrt(dx * dx + dy * dy);
}

function riverDistance(nx, ny){
  // Curving rivers form a natural frontier around the playable plain.
  let north = Math.abs(ny - (0.185 + Math.sin(nx * Math.PI * 2.6) * 0.025 + fbm(nx * 5.3, 7.7, 3, 611) * 0.018));
  let south = Math.abs(ny - (0.815 + Math.sin(nx * Math.PI * 2.2 + 1.2) * 0.025 + fbm(nx * 4.8, 3.2, 3, 612) * 0.018));
  let west  = Math.abs(nx - (0.175 + Math.sin(ny * Math.PI * 2.4 + 0.4) * 0.022 + fbm(5.1, ny * 5.1, 3, 613) * 0.016));
  let east  = Math.abs(nx - (0.825 + Math.sin(ny * Math.PI * 2.1 + 2.1) * 0.022 + fbm(2.4, ny * 5.4, 3, 614) * 0.016));
  const central = Math.min(
    distToSegment(nx, ny, 0.20, 0.32, 0.50, 0.48),
    distToSegment(nx, ny, 0.50, 0.48, 0.80, 0.36),
    distToSegment(nx, ny, 0.47, 0.50, 0.38, 0.78)
  );
  return Math.min(north, south, west, east, central);
}

function terrainAt(nx, ny){
  const edge = Math.min(nx, ny, 1 - nx, 1 - ny);
  const rolling = valueNoise01(nx * 2.2, ny * 2.2, 1, 42) * 0.26 + valueNoise01(nx * 7.5, ny * 7.5, 1, 137) * 0.10;
  const meadow = valueNoise01(nx * 17.0, ny * 17.0, 1, 999) * 0.035;
  const mountainWall = Math.pow(1 - smoothstep(0.08, 0.29, edge), 2.4);
  const peaks = Math.max(0, fbm(nx * 8.0 + 23, ny * 8.0 - 19, 6, 770));
  const ridge = Math.pow(clamp(peaks, 0, 1), 2.1) * 0.34;
  const valley = 1 - Math.pow(Math.max(0, 1 - Math.hypot((nx - 0.52) * 1.6, (ny - 0.54) * 1.45)), 2) * 0.22;
  let h = 0.36 + rolling + meadow + mountainWall * 0.62 + ridge * mountainWall;
  h *= valley;

  const riverDist = riverDistance(nx, ny);
  const riverWidth = 0.013 + valueNoise01(nx * 9.0, ny * 9.0, 1, 404) * 0.006;
  const river = riverDist < riverWidth;
  const bank = riverDist < riverWidth * 2.3;
  if(river) h = Math.min(h, 0.10 + riverDist * 2.0);
  else if(bank) h = Math.min(h, 0.27 + riverDist * 2.6);

  const moisture = valueNoise01(nx * 5 + 100, ny * 5 + 100, 1, 214) * 0.7 + (bank ? 0.35 : 0);
  let b;
  if(river) b = 1;
  else if(bank) b = riverDist < riverWidth * 1.55 ? 2 : 3;
  else if(edge < 0.055 || h > 0.92) b = 8;
  else if(edge < 0.12 || h > 0.82) b = 9;
  else if(edge < 0.18 || h > 0.73) b = 7;
  else if(moisture > 0.78 && h < 0.43) b = 10;
  else if(h > 0.58) b = 6;
  else if(h > 0.45) b = 5;
  else b = 4;
  return { h: clamp(h, 0, 1), b, riverDist, riverWidth };
}

function isWalkableBiome(b){ return !BLOCKED_BIOMES.has(b); }

// ─── GENERATE WORLD ─────────────────────────────────────────────────
function generateWorld(progress){
  for(let iy=0; iy<ROWS; iy++){
    let ny = iy/ROWS;
    for(let ix=0; ix<COLS; ix++){
      let nx = ix/COLS;
      const t = terrainAt(nx, ny);
      heightMap[iy*COLS+ix] = t.h;
      biomeMap[iy*COLS+ix] = t.b;
    }
    if(iy % 50 === 0) progress(iy/ROWS);
  }
}

// ─── RENDER WORLD TO IMAGE ──────────────────────────────────────────
function renderWorldToImage(progress){
  const offCanvas = document.createElement('canvas');
  offCanvas.width = COLS; offCanvas.height = ROWS;
  const offCtx = offCanvas.getContext('2d');
  const img = offCtx.createImageData(COLS, ROWS);
  const d = img.data;

  for(let i=0; i<COLS*ROWS; i++){
    let b = biomeMap[i];
    let h = heightMap[i];
    let iy = Math.floor(i/COLS), ix = i%COLS;
    let col = hexToRgb(BIOME_COLORS[b]);
    let left = heightMap[iy*COLS+Math.max(0,ix-1)];
    let right = heightMap[iy*COLS+Math.min(COLS-1,ix+1)];
    let up = heightMap[Math.max(0,iy-1)*COLS+ix];
    let down = heightMap[Math.min(ROWS-1,iy+1)*COLS+ix];
    let macro = valueNoise01(ix/COLS*18, iy/ROWS*18, 1, 1200);
    let micro = valueNoise01(ix/COLS*110, iy/ROWS*110, 1, 1201);
    let streak = Math.sin((ix + iy*0.35) * 0.12) * 0.5 + 0.5;
    if(b===4 || b===5) col = mixRgb(col, hexToRgb(macro > 0.58 ? '#b6c96b' : '#466f2d'), 0.18 + micro*0.10);
    if(b===6) col = mixRgb(col, hexToRgb(macro > 0.52 ? '#1f4e28' : '#4f8738'), 0.20);
    if(b===3) col = mixRgb(col, hexToRgb('#c9ad79'), 0.35 + streak*0.12);
    if(b===7 || b===9) col = mixRgb(col, hexToRgb(macro > 0.55 ? '#b1a38e' : '#4c4944'), 0.28);
    if(b===10) col = mixRgb(col, hexToRgb('#223f32'), 0.30);
    // faux 3D hill-shading: light from north-west, darker south-east slopes.
    let slopeX = left - right;
    let slopeY = up - down;
    let hillShade = 0.86 + slopeX * 5.8 + slopeY * 4.8 + h * 0.34;
    let grain = smoothNoise(ix/COLS*70, iy/ROWS*70, 1, 555)*0.075 + smoothNoise(ix/COLS*190, iy/ROWS*190, 1, 556)*0.04;
    let shade = clamp(hillShade + grain, 0.38, 1.52);
    if(b===1){
      let sparkle = Math.sin(ix*0.19 + iy*0.11) * 0.06 + Math.cos(ix*0.04 - iy*0.13) * 0.05;
      col = mixRgb(col, hexToRgb('#6fbde3'), 0.18);
      shade = clamp(0.88 + sparkle, 0.68, 1.20);
    }
    if(b===7 || b===9) shade *= 0.78 + Math.abs(smoothNoise(ix/COLS*120, iy/ROWS*120, 1, 901))*0.36;
    d[i*4]   = Math.min(255, col.r * shade);
    d[i*4+1] = Math.min(255, col.g * shade);
    d[i*4+2] = Math.min(255, col.b * shade);
    d[i*4+3] = 255;
  }
  offCtx.putImageData(img, 0, 0);

  // scale to full world
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = WORLD_W; finalCanvas.height = WORLD_H;
  const fCtx = finalCanvas.getContext('2d');
  fCtx.imageSmoothingEnabled = true;
  fCtx.imageSmoothingQuality = 'high';
  fCtx.drawImage(offCanvas, 0, 0, WORLD_W, WORLD_H);
  paintWorldDetails(fCtx);

  worldImg = finalCanvas;
  progress(1);
}

function hexToRgb(hex){
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function mixRgb(a, b, t){
  return {
    r: a.r + (b.r - a.r) * t,
    g: a.g + (b.g - a.g) * t,
    b: a.b + (b.b - a.b) * t
  };
}

function paintWorldDetails(fCtx){
  fCtx.save();
  fCtx.lineCap = 'round';
  fCtx.lineJoin = 'round';
  for(const road of ROAD_PATHS){
    fCtx.strokeStyle = 'rgba(63, 43, 25, 0.30)';
    fCtx.lineWidth = 34;
    drawRoadPath(fCtx, road);
    fCtx.strokeStyle = 'rgba(177, 139, 89, 0.78)';
    fCtx.lineWidth = 22;
    drawRoadPath(fCtx, road);
    fCtx.strokeStyle = 'rgba(224, 194, 139, 0.20)';
    fCtx.lineWidth = 5;
    fCtx.setLineDash([30, 28]);
    drawRoadPath(fCtx, road);
    fCtx.setLineDash([]);
  }
  // Irregular meadow/soil patches keep the terrain from looking like flat color.
  for(let i=0;i<260;i++){
    const rng = mulberry32(7000 + i * 37);
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    const bx = Math.floor(x/TILE), by = Math.floor(y/TILE);
    if(bx<0||by<0||bx>=COLS||by>=ROWS) continue;
    const b = biomeMap[by*COLS+bx];
    if(b<4 || b>6) continue;
    fCtx.globalAlpha = 0.08 + rng()*0.08;
    fCtx.fillStyle = rng() < 0.45 ? '#d0b37c' : '#254d22';
    fCtx.beginPath();
    fCtx.ellipse(x, y, 35+rng()*95, 18+rng()*52, rng()*Math.PI, 0, Math.PI*2);
    fCtx.fill();
  }
  fCtx.restore();
}

function drawRoadPath(fCtx, points){
  fCtx.beginPath();
  fCtx.moveTo(points[0][0], points[0][1]);
  for(let i=1;i<points.length-1;i++){
    const midX = (points[i][0] + points[i+1][0]) / 2;
    const midY = (points[i][1] + points[i+1][1]) / 2;
    fCtx.quadraticCurveTo(points[i][0], points[i][1], midX, midY);
  }
  const last = points[points.length-1];
  fCtx.lineTo(last[0], last[1]);
  fCtx.stroke();
}

// ─── PLACE OBJECTS ──────────────────────────────────────────────────
function placeObjects(){
  objects = [];
  let rng = mulberry32(9999);

  // Dense natural dressing: trees, grass clumps, flowers, reeds and logs.
  for(let i=0; i<15000; i++){
    let wx = rng() * WORLD_W;
    let wy = rng() * WORLD_H;
    let bx = Math.floor(wx/TILE), by = Math.floor(wy/TILE);
    if(bx<0||by<0||bx>=COLS||by>=ROWS) continue;
    let b = biomeMap[by*COLS+bx];
    let type = null;
    let scale = 0.6 + rng()*0.9;

    if(b===6){
      type = rng()<0.58 ? 'pine' : (rng()<0.88 ? 'oak' : 'log');
      scale = 0.85 + rng()*1.15;
    } else if(b===5){
      type = rng()<0.28 ? 'oak' : (rng()<0.62 ? 'grassPatch' : (rng()<0.82 ? 'flowerPatch' : 'shrub'));
      scale = 0.45 + rng()*0.95;
    } else if(b===4){
      type = rng()<0.12 ? 'oak' : (rng()<0.52 ? 'grassPatch' : (rng()<0.78 ? 'flowerPatch' : 'shrub'));
      scale = 0.35 + rng()*0.85;
    } else if(b===2 || b===10){
      type = rng()<0.70 ? 'reeds' : 'swamptree';
      scale = 0.45 + rng()*0.8;
    } else if(b===3){
      type = rng()<0.40 ? 'driftwood' : (rng()<0.68 ? 'reeds' : 'boulder');
      scale = 0.45 + rng()*0.75;
    }
    if(type) objects.push({wx,wy,type,scale,z:wy,rot:rng()*Math.PI*2,tint:rng()});
  }

  // Heavy rocky silhouettes make the mountain wall feel tall instead of minimal.
  for(let i=0; i<2200; i++){
    let wx = rng() * WORLD_W;
    let wy = rng() * WORLD_H;
    let bx = Math.floor(wx/TILE), by = Math.floor(wy/TILE);
    if(bx<0||by<0||bx>=COLS||by>=ROWS) continue;
    let b = biomeMap[by*COLS+bx];
    if(b===7||b===9||b===8){
      objects.push({wx,wy,type:rng()<0.18?'cliffFace':'boulder',scale:0.7+rng()*1.8,z:wy,rot:rng()*Math.PI*2,tint:rng()});
    }
  }

  // Hand-placed points of interest like Fortnite-style open world landmarks.
  const landmarks = [
    {wx:2860, wy:3180, type:'cabin', scale:1.25},
    {wx:3270, wy:3260, type:'cabin', scale:1.05},
    {wx:4380, wy:2520, type:'watchtower', scale:1.15},
    {wx:1810, wy:4200, type:'barn', scale:1.20},
    {wx:5100, wy:3840, type:'camp', scale:1.10}
  ];
  for(const landmark of landmarks){
    objects.push({...landmark, z:landmark.wy, rot:0, tint:rng()});
  }

  // sort by depth
  objects.sort((a,b)=>a.z-b.z);

  // more ambient wildlife so the open world feels alive
  animals = [];
  for(let i=0; i<70; i++){
    let wx = rng() * WORLD_W;
    let wy = rng() * WORLD_H;
    let bx = Math.floor(wx/TILE), by = Math.floor(wy/TILE);
    if(bx<0||by<0||bx>=COLS||by>=ROWS) continue;
    let b = biomeMap[by*COLS+bx];
    let type;
    if(b===4||b===5) type = rng()<0.58?'deer':'rabbit';
    else if(b===6) type = rng()<0.38?'bear':'wolf';
    else if(b===3||b===2) type = 'seagull';
    else continue;
    animals.push({
      wx,wy,type,
      vx: (rng()-0.5)*30,
      vy: (rng()-0.5)*30,
      idle: rng()*5,
      idleMax: 3+rng()*6,
      dir: 1, stepAnim:0, hp:100
    });
  }
}

function mulberry32(a){
  return function(){
    a|=0; a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  }
}

// ─── DRAW OBJECTS ───────────────────────────────────────────────────
function drawTree(cx, cy, sc, type, obj={rot:0,tint:0}){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((type==='log'||type==='driftwood'||type==='cliffFace') ? obj.rot : 0);
  ctx.scale(sc, sc);

  if(type==='pine'){
    ctx.fillStyle='#573516';
    ctx.fillRect(-4,-2,8,24);
    const layers=[['#123f1e',34,-8],['#1e6a2b',28,-24],['#2b8a35',21,-39],['#5ca64d',13,-51]];
    for(let [c,w,y] of layers){
      ctx.fillStyle=c;
      ctx.beginPath(); ctx.moveTo(-w/2,y+22); ctx.lineTo(w/2,y+22); ctx.lineTo(0,y); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,210,0.10)';
      ctx.beginPath(); ctx.moveTo(-w/2+5,y+18); ctx.lineTo(0,y+3); ctx.lineTo(0,y+19); ctx.closePath(); ctx.fill();
    }
  } else if(type==='oak'){
    ctx.fillStyle='#61401e';
    ctx.fillRect(-4,-1,8,24);
    let g=ctx.createRadialGradient(-8,-28,3,0,-24,27);
    g.addColorStop(0,'#78a847'); g.addColorStop(0.55,'#3f7f35'); g.addColorStop(1,'#1d4d22');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,-25,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,230,150,0.16)';
    ctx.beginPath(); ctx.arc(-8,-34,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(9,35,12,0.18)';
    ctx.beginPath(); ctx.arc(9,-17,13,0,Math.PI*2); ctx.fill();
  } else if(type==='palmtree'){
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(8,-20,4,-38); ctx.stroke();
    for(let i=0;i<6;i++){
      let a=i*60*Math.PI/180 - Math.PI/2;
      ctx.save(); ctx.translate(4,-40); ctx.rotate(a);
      ctx.fillStyle=i%2?'#2f8d39':'#47b652';
      ctx.beginPath(); ctx.ellipse(12,0,16,4,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  } else if(type==='swamptree'){
    ctx.fillStyle='#3d2b1a';
    ctx.fillRect(-3,0,6,24);
    ctx.fillStyle='#314d28';
    ctx.beginPath(); ctx.arc(0,-19,16,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(38,55,28,0.55)'; ctx.lineWidth=2;
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*6,-10); ctx.quadraticCurveTo(i*10,3,i*4,13); ctx.stroke(); }
  } else if(type==='shrub'){
    ctx.fillStyle='#244f22';
    ctx.beginPath(); ctx.arc(0,-6,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4a8f3d';
    ctx.beginPath(); ctx.arc(-5,-9,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-10,6,0,Math.PI*2); ctx.fill();
  } else if(type==='grassPatch'){
    ctx.strokeStyle='#2f6f24'; ctx.lineWidth=2;
    for(let i=0;i<8;i++){
      const x=-10+i*3, bend=Math.sin(i+obj.tint*6)*5;
      ctx.beginPath(); ctx.moveTo(x,3); ctx.quadraticCurveTo(x+bend,-7,x+bend*0.4,-16-obj.tint*6); ctx.stroke();
    }
    ctx.strokeStyle='rgba(216,227,130,0.45)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-9,1); ctx.lineTo(-3,-14); ctx.moveTo(5,1); ctx.lineTo(9,-12); ctx.stroke();
  } else if(type==='flowerPatch'){
    ctx.strokeStyle='#3d742c'; ctx.lineWidth=1.5;
    for(let i=0;i<7;i++){
      const a=i*1.7+obj.tint, x=Math.cos(a)*10, y=Math.sin(a)*5;
      ctx.beginPath(); ctx.moveTo(x,2); ctx.lineTo(x*0.8,y-8); ctx.stroke();
      ctx.fillStyle=i%3===0?'#f4d35e':(i%3===1?'#e66b9d':'#fff2b6');
      ctx.beginPath(); ctx.arc(x*0.8,y-9,2.4,0,Math.PI*2); ctx.fill();
    }
  } else if(type==='reeds'){
    ctx.strokeStyle='#314d21'; ctx.lineWidth=2;
    for(let i=0;i<9;i++){
      const x=-9+i*2.3;
      ctx.beginPath(); ctx.moveTo(x,3); ctx.lineTo(x+Math.sin(i)*3,-18-randomish(i,obj.tint)*8); ctx.stroke();
      ctx.fillStyle='#7a5a25'; ctx.fillRect(x+Math.sin(i)*3-1,-23-randomish(i,obj.tint)*8,2,6);
    }
  } else if(type==='log'||type==='driftwood'){
    ctx.fillStyle=type==='log'?'#65411f':'#8d7350';
    ctx.fillRect(-18,-5,36,10);
    ctx.fillStyle='rgba(255,220,150,0.22)'; ctx.fillRect(-15,-4,28,2);
    ctx.strokeStyle='#3c2411'; ctx.lineWidth=2; ctx.strokeRect(-18,-5,36,10);
  } else if(type==='cabin'||type==='barn'){
    ctx.fillStyle='rgba(0,0,0,0.26)';
    ctx.beginPath(); ctx.ellipse(0,8,34,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=type==='barn'?'#8f3026':'#76512b';
    ctx.fillRect(-24,-22,48,30);
    ctx.fillStyle=type==='barn'?'#5b1d17':'#4b2b16';
    ctx.beginPath(); ctx.moveTo(-30,-22); ctx.lineTo(0,-46); ctx.lineTo(30,-22); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#e6c27a'; ctx.fillRect(-7,-8,14,16);
    ctx.fillStyle='rgba(120,190,230,0.70)'; ctx.fillRect(-18,-15,8,8); ctx.fillRect(10,-15,8,8);
  } else if(type==='watchtower'){
    ctx.strokeStyle='#5a3a1c'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-16,8); ctx.lineTo(-9,-42); ctx.moveTo(16,8); ctx.lineTo(9,-42); ctx.moveTo(-18,-8); ctx.lineTo(18,-8); ctx.stroke();
    ctx.fillStyle='#704720'; ctx.fillRect(-18,-52,36,18);
    ctx.fillStyle='#3a2410'; ctx.beginPath(); ctx.moveTo(-23,-52); ctx.lineTo(0,-67); ctx.lineTo(23,-52); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,225,128,0.8)'; ctx.fillRect(-5,-46,10,8);
  } else if(type==='camp'){
    ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.beginPath(); ctx.ellipse(0,3,28,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5c3a1c'; ctx.fillRect(-22,-2,17,7); ctx.fillRect(5,-2,17,7);
    ctx.fillStyle='#e56a2d'; ctx.beginPath(); ctx.moveTo(-5,-2); ctx.lineTo(0,-22); ctx.lineTo(7,-2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd36a'; ctx.beginPath(); ctx.moveTo(-1,-1); ctx.lineTo(3,-15); ctx.lineTo(8,-1); ctx.closePath(); ctx.fill();
  } else if(type==='rock'||type==='boulder'||type==='cliffFace'){
    let g=ctx.createLinearGradient(-15,-20,18,12);
    g.addColorStop(0,type==='cliffFace'?'#b8ab97':'#9c9388');
    g.addColorStop(0.55,type==='cliffFace'?'#726a61':'#68635d');
    g.addColorStop(1,'#383633');
    ctx.fillStyle=g;
    ctx.beginPath();
    if(type==='cliffFace') ctx.moveTo(-24,8), ctx.lineTo(-11,-30), ctx.lineTo(9,-24), ctx.lineTo(25,6), ctx.lineTo(8,18), ctx.closePath();
    else ctx.ellipse(0,-7,type==='boulder'?17:12,type==='boulder'?12:8,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,-13); ctx.lineTo(2,-18); ctx.lineTo(10,-9); ctx.stroke();
  }
  ctx.restore();
}

function randomish(i, seed){
  const v = Math.sin(i*12.9898 + seed*78.233) * 43758.5453;
  return v - Math.floor(v);
}

function drawAnimal(a, sx, sy, sc){
  ctx.save();
  ctx.translate(sx, sy);
  let s = a.stepAnim;

  if(a.type==='deer'){
    ctx.scale(sc*a.dir, sc);
    ctx.fillStyle='#b5651d';
    ctx.fillRect(-8,-2,16,10);
    ctx.fillRect(-3,-12,6,12);
    // legs
    let leg=Math.sin(s*5)*3;
    ctx.fillRect(-7,8,3,10+leg);
    ctx.fillRect(-2,8,3,8-leg);
    ctx.fillRect(3,8,3,10+leg);
    ctx.fillRect(7,8,3,8-leg);
    // head+antlers
    ctx.beginPath(); ctx.arc(10,-14,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#8B4513'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(13,-18); ctx.lineTo(16,-25); ctx.moveTo(16,-25); ctx.lineTo(14,-22); ctx.moveTo(16,-25); ctx.lineTo(19,-23); ctx.stroke();
  } else if(a.type==='rabbit'){
    ctx.scale(sc*a.dir, sc);
    ctx.fillStyle='#d4c8b0';
    ctx.beginPath(); ctx.ellipse(0,2,6,8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-5,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#b8a898';
    ctx.fillRect(3,-14,2,10); ctx.fillRect(6,-14,2,9);
    let bleg=Math.abs(Math.sin(s*6))*3;
    ctx.fillRect(-5,8,4,6+bleg); ctx.fillRect(2,8,4,6+bleg);
  } else if(a.type==='bear'){
    ctx.scale(sc*a.dir, sc);
    ctx.fillStyle='#6b4226';
    ctx.beginPath(); ctx.ellipse(0,0,14,10,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(14,-8,8,0,Math.PI*2); ctx.fill();
    let bleg=Math.sin(s*4)*4;
    ctx.fillRect(-12,8,6,12+bleg); ctx.fillRect(-4,8,6,10-bleg); ctx.fillRect(4,8,6,12+bleg);
    ctx.fillStyle='#3a2010'; ctx.beginPath(); ctx.arc(14,-8,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#6b4226'; ctx.beginPath(); ctx.arc(10,-14,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18,-14,4,0,Math.PI*2); ctx.fill();
  } else if(a.type==='wolf'){
    ctx.scale(sc*a.dir, sc);
    ctx.fillStyle='#7a7a8a';
    ctx.beginPath(); ctx.ellipse(0,0,12,7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11,-6,7,6,-0.2,0,Math.PI*2); ctx.fill();
    let wleg=Math.sin(s*5)*4;
    ctx.fillRect(-10,6,4,10+wleg); ctx.fillRect(-4,6,4,8-wleg); ctx.fillRect(3,6,4,10+wleg); ctx.fillRect(8,6,4,8-wleg);
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(10,-10,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(14,-10,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.quadraticCurveTo(-18,-5,-14,-10); ctx.strokeStyle='#7a7a8a'; ctx.lineWidth=4; ctx.stroke();
  } else if(a.type==='seagull'){
    ctx.scale(sc, sc);
    ctx.fillStyle='#ddd';
    let fly=Math.sin(s*3)*5;
    ctx.beginPath(); ctx.moveTo(-12,fly); ctx.quadraticCurveTo(-6,fly-8,0,fly); ctx.quadraticCurveTo(6,fly-8,12,fly); ctx.lineWidth=3; ctx.strokeStyle='#ccc'; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,fly+2,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f90'; ctx.fillRect(3,fly+2,5,2);
  }
  ctx.restore();
}

function drawPlayer(sx, sy, sc){
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(sc, sc);
  let s = player.stepAnim;
  let moving = player.moving;
  let dir = player.angle > Math.PI/2 && player.angle < Math.PI*1.5 ? -1 : 1;
  ctx.scale(dir, 1);

  // shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,24,12,4,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // cloak
  ctx.fillStyle='#5c3f96';
  ctx.beginPath(); ctx.moveTo(-12,6); ctx.lineTo(12,6); ctx.lineTo(14,32); ctx.lineTo(-14,32); ctx.closePath(); ctx.fill();

  // body/armor
  ctx.fillStyle='#4a4a6e';
  ctx.fillRect(-9,4,18,20);
  // armor highlights
  ctx.fillStyle='#6a6a9e';
  ctx.fillRect(-8,5,4,18); ctx.fillRect(4,5,4,18);

  // belt
  ctx.fillStyle='#8B6914';
  ctx.fillRect(-9,20,18,4);
  ctx.fillStyle='#ffd700';
  ctx.fillRect(-3,20,6,4);

  // legs
  let legSwing = moving ? Math.sin(s * 6) * 6 : 0;
  ctx.fillStyle='#2a2a4e';
  ctx.save(); ctx.translate(-4,26); ctx.rotate(legSwing*Math.PI/180);
  ctx.fillRect(-4,0,8,18); ctx.restore();
  ctx.save(); ctx.translate(4,26); ctx.rotate(-legSwing*Math.PI/180);
  ctx.fillRect(-4,0,8,18); ctx.restore();

  // boots
  ctx.fillStyle='#3a2010';
  ctx.fillRect(-9,40,9,6); ctx.fillRect(0,40,9,6);

  // arms
  let armSwing = moving ? Math.sin(s * 6) * 10 : 0;
  ctx.fillStyle='#4a4a6e';
  ctx.save(); ctx.translate(-12,8); ctx.rotate(-armSwing*Math.PI/180);
  ctx.fillRect(-4,0,8,18); ctx.restore();
  ctx.save(); ctx.translate(12,8); ctx.rotate(armSwing*Math.PI/180);
  ctx.fillRect(-4,0,8,18); ctx.restore();

  // hands
  ctx.fillStyle='#d4a88a';
  ctx.beginPath(); ctx.arc(-14,26,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(14,26,5,0,Math.PI*2); ctx.fill();

  // sword (right hand)
  ctx.strokeStyle='#ccc'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(16,28); ctx.lineTo(26,6); ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.fillRect(11,22,10,3);

  // head
  ctx.fillStyle='#d4a88a';
  ctx.beginPath(); ctx.arc(0,-8,12,0,Math.PI*2); ctx.fill();

  // hair/hood
  ctx.fillStyle='#5c3f96';
  ctx.beginPath(); ctx.arc(0,-10,13,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-6,-5,5,Math.PI,-0.2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-5,5,Math.PI+0.2,0); ctx.fill();

  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4,-8,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-8,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1aff';
  ctx.beginPath(); ctx.arc(-4,-8,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-8,2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

  {name:'Playa',check:(x,y)=>{let bx=Math.floor(x/TILE),by=Math.floor(y/TILE);let b=biomeMap[Math.min(ROWS-1,by)*COLS+Math.min(COLS-1,bx)];return b===3||b===2;}},
  {name:'Pantano Oscuro',check:(x,y)=>{let bx=Math.floor(x/TILE),by=Math.floor(y/TILE);return biomeMap[Math.min(ROWS-1,by)*COLS+Math.min(COLS-1,bx)]===10;}},
  {name:'Tierras Medias',check:()=>true},
];

let zoneTimer = 0;

function getZone(x, y){
  for(let z of ZONES){ if(z.check(x,y)) return z.name; }
  return 'Tierras Medias';
}

let mmImageData = null;
function renderMinimap(){
  if(!mmImageData){
    const mmW=160,mmH=160;
    mmImageData = mmCtx.createImageData(mmW,mmH);
    const d = mmImageData.data;
    for(let my=0;my<mmH;my++){
      for(let mx=0;mx<mmW;mx++){
        let wx=Math.floor(mx/mmW*COLS), wy=Math.floor(my/mmH*ROWS);
        let b = biomeMap[Math.min(ROWS-1,wy)*COLS+Math.min(COLS-1,wx)];
        let c = hexToRgb(BIOME_COLORS[b]);
        let i=(my*mmW+mx)*4;
        d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b; d[i+3]=255;
      }
    }
  }
  mmCtx.putImageData(mmImageData,0,0);
  // player dot
  let px=player.wx/WORLD_W*160, py=player.wy/WORLD_H*160;
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath(); mmCtx.arc(px,py,3,0,Math.PI*2); mmCtx.fill();
  mmCtx.strokeStyle='#ffd700'; mmCtx.lineWidth=1;
  mmCtx.beginPath(); mmCtx.arc(px,py,3,0,Math.PI*2); mmCtx.stroke();
  // camera rect
  mmCtx.strokeStyle='rgba(255,255,100,0.5)'; mmCtx.lineWidth=1;
  let cx=cam.x/WORLD_W*160, cy=cam.y/WORLD_H*160;
  let cw=canvas.width/(WORLD_W*cam.zoom)*160, ch=canvas.height/(WORLD_H*cam.zoom)*160;
  mmCtx.strokeRect(cx,cy,cw,ch);
}

// ─── WATER ANIMATION ────────────────────────────────────────────────
let waterTime = 0;

// ─── MAIN GAME LOOP ─────────────────────────────────────────────────
let lastTime = 0;
let gameRunning = false;

function updateAnimals(dt){
  for(let a of animals){
    a.idle -= dt;
    if(a.idle <= 0){
      a.vx = (Math.random()-0.5)*60;
      a.vy = (Math.random()-0.5)*60;
      a.dir = a.vx >= 0 ? 1 : -1;
      a.idle = a.idleMax;
    }
    let nx = a.wx + a.vx*dt;
    let ny = a.wy + a.vy*dt;
    let bx=Math.floor(nx/TILE), by=Math.floor(ny/TILE);
    if(bx>0&&by>0&&bx<COLS&&by<ROWS){
      let b = biomeMap[by*COLS+bx];
      if(isWalkableBiome(b)){ a.wx=nx; a.wy=ny; }
      else { a.vx=-a.vx; a.vy=-a.vy; }
    }
    if(a.vx!==0||a.vy!==0) a.stepAnim+=dt;
  }
}

function getThirdPersonCamera(){
  return {
    x: player.wx - Math.cos(player.angle)*180,
    y: player.wy - Math.sin(player.angle)*180,
    cos: Math.cos(player.angle),
    sin: Math.sin(player.angle),
    horizon: canvas.height * 0.34,
    focal: 420 * cam.zoom,
    height: 540 * cam.zoom,
    far: 1550
  };
}

function projectThirdPerson(wx, wy, vertical=0){
  const c = getThirdPersonCamera();
  const dx = wx - c.x, dy = wy - c.y;
  const forward = dx*c.cos + dy*c.sin;
  const side = -dx*c.sin + dy*c.cos;
  if(forward < 24 || forward > c.far || Math.abs(side) > 1300) return null;
  const scale = c.focal / (forward + c.focal);
  return {
    sx: canvas.width/2 + side*scale,
    sy: c.horizon + (c.height - vertical)*scale,
    scale, forward, side
  };
}

function roadDistanceAt(wx, wy){
  let best = Infinity;
  for(const road of ROAD_PATHS){
    for(let i=0;i<road.length-1;i++){
      best = Math.min(best, distToSegment(wx, wy, road[i][0], road[i][1], road[i+1][0], road[i+1][1]));
    }
  }
  return best;
}

function biomeColorAt(wx, wy){
  const bx = Math.floor(wx/TILE), by = Math.floor(wy/TILE);
  if(bx<0||by<0||bx>=COLS||by>=ROWS) return '#203820';
  const roadDist = roadDistanceAt(wx, wy);
  if(roadDist < 28) return roadDist < 18 ? '#b88d58' : '#806643';
  return BIOME_COLORS[biomeMap[by*COLS+bx]];
}

function drawThirdPersonSky(c){
  const sky = ctx.createLinearGradient(0,0,0,c.horizon+80);
  sky.addColorStop(0,'#6fb7ff');
  sky.addColorStop(0.55,'#b9dbff');
  sky.addColorStop(1,'#f2e4c3');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#7c8079';
  ctx.beginPath();
  ctx.moveTo(0,c.horizon+44);
  for(let x=0;x<=canvas.width;x+=90){
    const peak = c.horizon + 10 + Math.sin(x*0.014 + player.wx*0.001)*28 + Math.sin(x*0.031)*13;
    ctx.lineTo(x, peak);
  }
  ctx.lineTo(canvas.width,c.horizon+95);
  ctx.lineTo(0,c.horizon+95);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#e8edf2';
  ctx.fillRect(0,c.horizon+68,canvas.width,30);
  ctx.restore();
}

function drawThirdPersonTerrain(c){
  const ground = ctx.createLinearGradient(0,c.horizon,0,canvas.height);
  ground.addColorStop(0,'#6f8d50');
  ground.addColorStop(0.45,'#5c8f3c');
  ground.addColorStop(1,'#3e642a');
  ctx.fillStyle = ground;
  ctx.beginPath();
  ctx.moveTo(0,c.horizon+70);
  ctx.lineTo(canvas.width,c.horizon+70);
  ctx.lineTo(canvas.width,canvas.height);
  ctx.lineTo(0,canvas.height);
  ctx.closePath();
  ctx.fill();

  const forwardX = c.cos, forwardY = c.sin;
  const rightX = -c.sin, rightY = c.cos;
  const stepD = 90, stepS = 100;
  for(let d=c.far; d>=35; d-=stepD){
    for(let side=-1200; side<=1200; side+=stepS){
      const wx = c.x + forwardX*d + rightX*side;
      const wy = c.y + forwardY*d + rightY*side;
      const p1 = projectThirdPerson(wx, wy);
      const p2 = projectThirdPerson(wx + rightX*stepS, wy + rightY*stepS);
      const p3 = projectThirdPerson(wx + forwardX*stepD + rightX*stepS, wy + forwardY*stepD + rightY*stepS);
      const p4 = projectThirdPerson(wx + forwardX*stepD, wy + forwardY*stepD);
      if(!p1||!p2||!p3||!p4) continue;
      ctx.globalAlpha = d > 1000 ? 0.48 : 0.78;
      ctx.fillStyle = biomeColorAt(wx + rightX*stepS*0.5, wy + rightY*stepS*0.5);
      ctx.beginPath();
      ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.lineTo(p3.sx,p3.sy); ctx.lineTo(p4.sx,p4.sy);
      ctx.closePath(); ctx.fill();
      if(d<650){
        ctx.globalAlpha = 0.10;
        ctx.strokeStyle = '#e6d59b';
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawThirdPersonObjects(){
  const c = getThirdPersonCamera();
  const visible = [];
  for(const obj of objects){
    const p = projectThirdPerson(obj.wx, obj.wy);
    if(!p || p.sx < -160 || p.sx > canvas.width+160 || p.sy < -120 || p.sy > canvas.height+180) continue;
    visible.push({obj,p});
  }
  visible.sort((a,b)=>b.p.forward-a.p.forward);
  for(const {obj,p} of visible){
    const sc = obj.scale * clamp(p.scale*3.0, 0.18, 2.45);
    ctx.globalAlpha = clamp(1 - (p.forward-1050)/650, 0.35, 1);
    ctx.fillStyle='rgba(0,0,0,0.24)';
    ctx.beginPath(); ctx.ellipse(p.sx, p.sy, 16*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = clamp(1 - (p.forward-1250)/550, 0.42, 1);
    drawTree(p.sx, p.sy, sc, obj.type, obj);
  }
  ctx.globalAlpha = 1;

  for(const a of animals){
    const p = projectThirdPerson(a.wx, a.wy);
    if(!p) continue;
    drawAnimal(a, p.sx, p.sy, clamp(p.scale*2.2, 0.35, 1.35));
  }
}

function drawThirdPersonPlayer(){
  const sx = canvas.width/2;
  const sy = canvas.height - 98;
  const sc = 2.35 * cam.zoom;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(sc, sc);
  const walk = Math.sin(player.stepAnim*9);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0,29,18,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2b2340'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,12); ctx.lineTo(-9+walk*3,29); ctx.moveTo(7,12); ctx.lineTo(9-walk*3,29); ctx.stroke();
  ctx.fillStyle='#5c3f96';
  ctx.fillRect(-13,-16,26,32);
  ctx.fillStyle='#362358'; ctx.fillRect(-11,-10,22,11);
  ctx.strokeStyle='#c9c9d1'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(14,-8); ctx.lineTo(24,-31); ctx.stroke();
  ctx.fillStyle='#d2a37e'; ctx.beginPath(); ctx.arc(0,-27,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#221629'; ctx.beginPath(); ctx.arc(0,-31,11,Math.PI,0); ctx.fill();
  ctx.restore();
}

function renderThirdPersonScene(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const c = getThirdPersonCamera();
  drawThirdPersonSky(c);
  drawThirdPersonTerrain(c);
  drawThirdPersonObjects();

  if(player.moving){
    const p = projectThirdPerson(player.targetX, player.targetY);
    if(p){
      ctx.save();
      ctx.globalAlpha=0.85;
      ctx.fillStyle='#ffd96a';
      ctx.beginPath(); ctx.arc(p.sx,p.sy,8*p.scale+3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  drawThirdPersonPlayer();
}

function gameLoop(timestamp){
  if(!gameRunning){ requestAnimationFrame(gameLoop); return; }
  let dt = Math.min((timestamp - lastTime)/1000, 0.05);
  lastTime = timestamp;
  waterTime += dt;

  // ── UPDATE PLAYER ─────
  const keyboardMoved = updateKeyboardMovement(dt);
  if(!keyboardMoved && player.moving){
    let dx = player.targetX - player.wx;
    let dy = player.targetY - player.wy;
    let dist = Math.sqrt(dx*dx+dy*dy);
    player.angle = Math.atan2(dy, dx);
    if(dist < 5){
      player.moving = false;
      player.wx = player.targetX;
      player.wy = player.targetY;
    } else {
      let spd = player.speed * dt;
      if(spd > dist) spd = dist;
      player.wx += (dx/dist)*spd;
      player.wy += (dy/dist)*spd;
      player.stepAnim += dt;

      // check biome under player
      let bx=Math.floor(player.wx/TILE), by=Math.floor(player.wy/TILE);
      if(bx>=0&&by>=0&&bx<COLS&&by<ROWS){
        let b=biomeMap[by*COLS+bx];
        if(!isWalkableBiome(b)){ // water, cliffs, mountains: stop and go back
          tryMovePlayer(player.wx - (dx/dist)*spd*2, player.wy - (dy/dist)*spd*2);
          player.moving = false;
        }
      }
    }
  }

  updateAnimals(dt);

  // ── CAMERA FOLLOW ─────
  let targetCamX = player.wx - canvas.width/(2*cam.zoom);
  let targetCamY = player.wy - canvas.height/(2*cam.zoom);
  cam.x += (targetCamX - cam.x) * 5 * dt;
  cam.y += (targetCamY - cam.y) * 5 * dt;

  // clamp camera
  cam.x = Math.max(0, Math.min(WORLD_W - canvas.width/cam.zoom, cam.x));
  cam.y = Math.max(0, Math.min(WORLD_H - canvas.height/cam.zoom, cam.y));

  // ── ZONE ─────
  zoneTimer -= dt;
  let z = getZone(player.wx, player.wy);
  if(z !== currentZone){
    currentZone = z;
    document.getElementById('zoneDisplay').textContent = z;
    document.getElementById('zoneDisplay').style.opacity=1;
    zoneTimer = 3;
  }
  if(zoneTimer<=0) document.getElementById('zoneDisplay').style.opacity=0.4;

  document.getElementById('coordDisplay').textContent =
    `X: ${Math.floor(player.wx)} | Y: ${Math.floor(player.wy)} | ${currentZone}`;

  // ── DRAW ─────
  if(THIRD_PERSON){
    renderThirdPersonScene();
  }

  // minimap
  renderMinimap();

  requestAnimationFrame(gameLoop);
}

// ─── CLICK TO MOVE ───────────────────────────────────────────────────
canvas.addEventListener('click', (e)=>{
  let wx = cam.x + e.clientX/cam.zoom;
  let wy = cam.y + e.clientY/cam.zoom;
  let bx=Math.floor(wx/TILE), by=Math.floor(wy/TILE);
  if(bx<0||by<0||bx>=COLS||by>=ROWS) return;
  let b=biomeMap[by*COLS+bx];
  if(!isWalkableBiome(b)){ return; } // can't walk on rivers, cliffs or mountains
  setTarget(wx, wy);
});

// ─── ZOOM ─────────────────────────────────────────────────────────────
canvas.addEventListener('wheel', (e)=>{
  e.preventDefault();
  let delta = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, cam.zoom * delta));
},{passive:false});

// ─── RESIZE ───────────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ─── ASYNC INIT ───────────────────────────────────────────────────────
async function init(){
  let fill = document.getElementById('loadFill');

  // Generate height/biome maps
  fill.style.width = '5%';
  await new Promise(r=>setTimeout(r,10));

  generateWorld((p)=>{ fill.style.width = (5+p*45)+'%'; });
  fill.style.width = '50%';
  await new Promise(r=>setTimeout(r,10));

  renderWorldToImage((p)=>{ fill.style.width = (50+p*30)+'%'; });
  fill.style.width = '80%';
  await new Promise(r=>setTimeout(r,10));

  placeObjects();
  fill.style.width = '90%';
  await new Promise(r=>setTimeout(r,10));

  // find a good spawn (grass biome)
  let spawnFound = false;
  let rng2 = mulberry32(12345);
  for(let t=0;t<1000;t++){
    let sx = rng2()*WORLD_W*0.6 + WORLD_W*0.2;
    let sy = rng2()*WORLD_H*0.6 + WORLD_H*0.2;
    let bx=Math.floor(sx/TILE), by=Math.floor(sy/TILE);
    if(bx>=0&&by>=0&&bx<COLS&&by<ROWS){
      let b=biomeMap[by*COLS+bx];
      if(b>=4&&b<=5){ player.wx=sx; player.wy=sy; player.targetX=sx; player.targetY=sy; spawnFound=true; break; }
    }
  }

  fill.style.width = '100%';
  await new Promise(r=>setTimeout(r,300));
  document.getElementById('loadingScreen').style.display='none';

  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// ─── FIX: run init in chunks so browser doesn't freeze ───────────────
async function chunkedInit(){
  // Step 1: height map
  document.getElementById('loadFill').style.width='5%';
  await new Promise(r=>requestAnimationFrame(r));

  for(let iy=0;iy<ROWS;iy++){
    let ny=iy/ROWS;
    for(let ix=0;ix<COLS;ix++){
      let nx=ix/COLS;
      const t = terrainAt(nx, ny);
      heightMap[iy*COLS+ix] = t.h;
      biomeMap[iy*COLS+ix] = t.b;
    }
    if(iy%100===0){
      document.getElementById('loadFill').style.width=(5+iy/ROWS*35)+'%';
      await new Promise(r=>requestAnimationFrame(r));
    }
  }

  document.getElementById('loadFill').style.width='40%';
  await new Promise(r=>requestAnimationFrame(r));

  // Step 2: render image
  renderWorldToImage(p=>{ document.getElementById('loadFill').style.width=(40+p*30)+'%'; });
  await new Promise(r=>requestAnimationFrame(r));

  document.getElementById('loadFill').style.width='75%';
  await new Promise(r=>requestAnimationFrame(r));

  // Step 3: place objects
  placeObjects();

  document.getElementById('loadFill').style.width='88%';
  await new Promise(r=>requestAnimationFrame(r));

  // Render minimap
  renderMinimap();

  document.getElementById('loadFill').style.width='95%';
  await new Promise(r=>requestAnimationFrame(r));

  // Spawn player
  let rng2=mulberry32(12345);
  for(let t=0;t<2000;t++){
    let sx=rng2()*WORLD_W*0.6+WORLD_W*0.2;
    let sy=rng2()*WORLD_H*0.6+WORLD_H*0.2;
    let bx=Math.floor(sx/TILE),by=Math.floor(sy/TILE);
    if(bx>=0&&by>=0&&bx<COLS&&by<ROWS){
      let b=biomeMap[by*COLS+bx];
      if(b>=4&&b<=5){ player.wx=sx; player.wy=sy; player.targetX=sx; player.targetY=sy; break; }
    }
  }

  document.getElementById('loadFill').style.width='100%';
  await new Promise(r=>setTimeout(r,400));
  document.getElementById('loadingScreen').style.display='none';

  gameRunning=true;
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

chunkedInit();
</script>
